<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mes Bacs - Potager 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>
    <header>
        <h1>🍱 Espace Culture</h1>
    </header>

    <div class="container">
        <div class="section-title">🏠 Serres de démarrage</div>
        
        <div class="zone-card" id="card-serre-int">
            <div class="zone-header">
                <span>Serre Intérieure</span>
                <span class="badge" id="badge-serre-int">0</span>
            </div>
            <div class="zone-content" id="serre-int"></div>
        </div>

        <div class="zone-card" id="card-serre-ext">
            <div class="zone-header">
                <span>Serre Extérieure</span>
                <span class="badge" id="badge-serre-ext">0</span>
            </div>
            <div class="zone-content" id="serre-ext"></div>
        </div>

        <div class="section-title">🌳 Bacs & Pleine Terre</div>
        <div id="bacs-container">
            <div class="empty-msg">Analyse des bacs en cours...</div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item active-nav"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="autres.html" class="nav-item"><span class="nav-icon">🗂️</span>Autres</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');
        const bacsReference = ["Bac A", "Bac B", "Bac C", "Bac D", "Bac E"];

        async function init() {
            if(!token) return;
            try {
                const [resS, resJ] = await Promise.all([
                    fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                
                const seeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
                
                renderBacs(seeds, journal);
            } catch (e) { 
                console.error(e);
                document.getElementById('bacs-container').innerHTML = `<div class="empty-msg">Erreur de chargement.</div>`;
            }
        }

        function renderBacs(seeds, journal) {
            let inventory = {};

            // Trier le journal par ordre chronologique
            const sortedJournal = journal.sort((a,b) => new Date(a.date) - new Date(b.date));

            sortedJournal.forEach(entry => {
                const seedId = entry.seedId;
                if(!seedId) return;

                const qty = parseInt(entry.quantite) || 0;
                // on unifie : action dans "emplacement" ou dans "bac"
                const lieu = entry.bac || entry.emplacement;

                if(entry.action === 'Semis' || entry.action === 'Repiquage' || entry.action === 'Plantation') {
                    if(!inventory[lieu]) inventory[lieu] = {};
                    inventory[lieu][seedId] = (inventory[lieu][seedId] || 0) + qty;

                    // Si c'est une plantation, on présume qu'elle vient des serres, on doit la déduire
                    if (entry.action === 'Plantation') {
                        if (inventory['Serre intérieure'] && inventory['Serre intérieure'][seedId]) {
                            inventory['Serre intérieure'][seedId] = Math.max(0, inventory['Serre intérieure'][seedId] - qty);
                        } else if (inventory['Serre extérieure'] && inventory['Serre extérieure'][seedId]) {
                            inventory['Serre extérieure'][seedId] = Math.max(0, inventory['Serre extérieure'][seedId] - qty);
                        }
                    }
                }
                else if (entry.action === 'Arrachage') {
                    if (lieu && inventory[lieu]) {
                        if (qty > 0) {
                            inventory[lieu][seedId] = Math.max(0, (inventory[lieu][seedId] || 0) - qty);
                        } else {
                            inventory[lieu][seedId] = 0; // vide complet si pas de quantité (qty=0)
                        }
                    }
                }
            });

            // Fonction utilitaire de rendu pour chaque zone
            const renderZone = (lieu, isSerre) => {
                const items = inventory[lieu] || {};
                const activeSeeds = Object.keys(items).filter(id => items[id] > 0);
                
                let html = "";
                activeSeeds.forEach((id, idx) => {
                    const s = seeds.find(item => String(item.id) === String(id)) || { id: id, identite: { nom_commun: "Inconnu", variete: "" } };
                    const extraClass = idx >= 3 ? 'extra-item' : '';
                    html += `
                        <div class="item ${extraClass}" onclick="window.location.href='fiche-semence.html?id=${s.id}'">
                            <div class="item-info">
                                <div class="item-name">${s.identite.nom_commun}</div>
                                <div class="item-variety">${s.identite.variete}</div>
                            </div>
                            <div class="item-qty">x${items[id]}</div>
                        </div>`;
                });

                if (activeSeeds.length > 3) html += `<button class="toggle-btn" onclick="toggleZone(this, ${activeSeeds.length - 3})">Afficher plus (${activeSeeds.length - 3}) ↓</button>`;
                if(activeSeeds.length === 0) html = `<p class="empty-msg">Zone vide</p>`;
                
                return { count: activeSeeds.length, html: html };
            };

            // Remplir Serres
            const serreInt = renderZone('Serre intérieure', true);
            document.getElementById('badge-serre-int').innerText = serreInt.count;
            document.getElementById('serre-int').innerHTML = serreInt.html;

            const serreExt = renderZone('Serre extérieure', true);
            document.getElementById('badge-serre-ext').innerText = serreExt.count;
            document.getElementById('serre-ext').innerHTML = serreExt.html;

            // Remplir Bacs
            const bacsContainer = document.getElementById('bacs-container');
            const sortedBacs = [...bacsReference, ...Object.keys(inventory).filter(b => !bacsReference.includes(b) && b !== 'Serre intérieure' && b !== 'Serre extérieure')];
            
            bacsContainer.innerHTML = sortedBacs.map(bacName => {
                const zone = renderZone(bacName, false);
                if(zone.count === 0 && !bacsReference.includes(bacName)) return ""; // Masquer les zones "Autres" vides

                return `
                    <div class="zone-card">
                        <div class="zone-header">
                            <span>${bacName}</span>
                            <span class="badge">${zone.count}</span>
                        </div>
                        <div class="zone-content">${zone.html}</div>
                    </div>`;
            }).join('');
        }

        function toggleZone(btn, count) {
            const card = btn.closest('.zone-card');
            const isExpanded = card.classList.toggle('is-expanded');
            btn.innerText = isExpanded ? "Replier ↑" : `Afficher plus (${count}) ↓`;
        }

        window.onload = init;
    </script>
</body>
</html>
