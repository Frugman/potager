<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Journal - Potager 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/frugman/potager/main/favicon.png">
</head>
<body>

    <header>
        <h1>📖 Journal de bord</h1>
    </header>

    <div class="container">
        <div class="journal-card">
            <div class="note-meta">📝 Nouvelle observation</div>
            
            <label>Plante concernée</label>
            <select id="note-seed">
                <option value="">📝 Note générale</option>
            </select>

            <label>Date de l'observation</label>
            <input type="date" id="note-date">

            <label>Observation détaillée</label>
            <textarea id="note-text" rows="3" placeholder="Décrivez ce que vous remarquez (croissance, parasites, fleurs...)"></textarea>

            <div onclick="document.getElementById('file-input').click()" class="photo-btn">📸 Ajouter une photo</div>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="processPhoto(this)">
            
            <img id="preview-img" style="display:none;">
            
            <button class="save-btn" id="btnSaveNote" onclick="saveQuickNote()">ENREGISTRER LA NOTE</button>
        </div>

        <div class="section-title">Chronologie des notes</div>
        <div id="journal-list">
            <div class="empty-msg">Chargement du journal...</div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item active-nav"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');
        let allSeeds = [], base64Photo = "", photoName = "";

        async function init() {
            if(!token) return;
            document.getElementById('note-date').valueAsDate = new Date();
            
            try {
                // Chargement des semences pour le menu déroulant
                const resS = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                allSeeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                
                const sel = document.getElementById('note-seed');
                allSeeds.sort((a,b)=>a.identite.nom_commun.localeCompare(b.identite.nom_commun)).forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">${s.identite.nom_commun} - ${s.identite.variete}</option>`;
                });
                
                loadJournal();
            } catch(e) { console.error("Erreur lors de l'initialisation :", e); }
        }

        // Gestion et compression de la photo (500px max pour économiser le stockage GitHub)
        function processPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        const max = 500; 

                        if (width > height) {
                            if (width > max) { height *= max / width; width = max; }
                        } else {
                            if (height > max) { width *= max / height; height = max; }
                        }

                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const data = canvas.toDataURL('image/jpeg', 0.7);
                        
                        const preview = document.getElementById('preview-img');
                        preview.src = data;
                        preview.style.display = 'block';
                        base64Photo = data.split(',')[1];
                        photoName = `IMG_${Date.now()}.jpg`;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function loadJournal() {
            try {
                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json?t=${Date.now()}`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
                
                document.getElementById('journal-list').innerHTML = journal.reverse().map(n => {
                    const s = allSeeds.find(i => String(i.id) === String(n.seedId)) || { identite: { nom_commun: "Note Générale", variete: "" } };
                    
                    return `
                    <div class="journal-card" onclick="window.location.href='modifier-journal.html?id=${n.id}'">
                        <div class="note-meta">${n.date} • ${n.action} ${n.action==='Récolte'?'🧺':''}</div>
                        <div class="note-title">${s.identite.nom_commun} <span style="font-weight:400; font-size:14px; color:var(--text-secondary);">${s.identite.variete}</span></div>
                        
                        ${n.quantite ? `<div style="margin: 8px 0;"><span class="badge">+ ${n.quantite} récolté(s)</span></div>` : ''}
                        
                        ${n.note ? `<div class="note-content">${n.note}</div>` : ''}
                        
                        ${n.photo ? `<img src="${n.photo}" class="journal-img">` : ''}
                        
                        ${n.bac || n.emplacement ? `<div style="margin-top:10px;"><span style="font-size:12px; opacity:0.6;">📍 ${n.bac || n.emplacement}</span></div>` : ''}
                    </div>`;
                }).join('');
            } catch (e) {
                document.getElementById('journal-list').innerHTML = `<div class="empty-msg">Aucune note trouvée.</div>`;
            }
        }

        async function saveQuickNote() {
            const text = document.getElementById('note-text').value;
            if(!text && !base64Photo) return;
            
            const btn = document.getElementById('btnSaveNote');
            const originalText = btn.innerText;
            btn.innerText = "⏳ SYNCHRONISATION..."; btn.disabled = true;

            try {
                let photoUrl = "";
                if(base64Photo) {
                    const path = `photos/${photoName}`;
                    await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, { 
                        method: 'PUT', 
                        headers: { 'Authorization': `Bearer ${token}` }, 
                        body: JSON.stringify({ message: "Photo journal", content: base64Photo }) 
                    });
                    photoUrl = `https://raw.githubusercontent.com/${user}/${repo}/master/${path}`;
                }

                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const dataJ = await resJ.json();
                let journal = JSON.parse(decodeURIComponent(escape(atob(dataJ.content))));
                
                journal.push({ 
                    id: Date.now(), 
                    date: document.getElementById('note-date').value, 
                    action: "Note", 
                    seedId: document.getElementById('note-seed').value, 
                    note: text, 
                    photo: photoUrl 
                });
                
                await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { 
                    method: 'PUT', 
                    headers: { 'Authorization': `Bearer ${token}` }, 
                    body: JSON.stringify({ 
                        message: "Nouvelle note journal", 
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2)))), 
                        sha: dataJ.sha 
                    }) 
                });
                
                location.reload();
            } catch(e) { 
                alert("Erreur lors de l'enregistrement sur GitHub");
                btn.innerText = originalText; btn.disabled = false;
            }
        }
        window.onload = init;
    </script>
</body>
</html>
