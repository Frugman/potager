<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Journal - Potager 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header><h1>📖 Journal de bord</h1></header>

    <div class="quick-note">
        <h3>📝 Note rapide</h3>
        <label>Plante</label>
        <select id="note-seed"><option value="">📝 Note générale</option></select>
        <label>Date</label>
        <input type="date" id="note-date">
        <label>Observation</label>
        <textarea id="note-text" rows="2" placeholder="Ce que j'ai remarqué..."></textarea>

        <div onclick="document.getElementById('file-input').click()" class="photo-btn">📸 Ajouter une photo</div>
        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="processPhoto(this)">
        <img id="preview-img" src="">
        
        <button class="btn-add" id="btnSaveNote" onclick="saveQuickNote()">ENREGISTRER</button>
    </div>

    <div id="journal-list"></div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item active-nav"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        let allSeeds = [], base64Photo = "", photoName = "";

        async function init() {
            if(!token) return;
            document.getElementById('note-date').valueAsDate = new Date();
            const resS = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            allSeeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
            const sel = document.getElementById('note-seed');
            allSeeds.sort((a,b)=>a.identite.nom_commun.localeCompare(b.identite.nom_commun)).forEach(s => {
                sel.innerHTML += `<option value="${s.id}">${s.identite.nom_commun} - ${s.identite.variete}</option>`;
            });
            loadJournal();
        }

        function processPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height, max = 1024;
                        if (width > max) { height *= max / width; width = max; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const data = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('preview-img').src = data;
                        document.getElementById('preview-img').style.display = 'block';
                        base64Photo = data.split(',')[1];
                        photoName = `IMG_${Date.now()}.jpg`;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function loadJournal() {
            const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
            document.getElementById('journal-list').innerHTML = journal.reverse().map(n => {
                const s = allSeeds.find(i => i.id === n.seedId) || { identite: { nom_commun: "Note Générale", variete: "" } };
                return `
                <div class="entry-card" onclick="window.location.href='modifier-journal.html?id=${n.id}'">
                    <div class="entry-header">
                        <span class="entry-type">${n.action} ${n.action==='Récolte'?'🧺':''}</span>
                        <span class="entry-date">${n.date}</span>
                    </div>
                    <span class="entry-title">${s.identite.nom_commun} ${s.identite.variete}</span>
                    ${n.quantite ? `<div style="margin-bottom:10px;"><span class="qty-badge">+ ${n.quantite}</span> <span style="font-size:12px;color:#888;">récolté(s)</span></div>` : ''}
                    ${n.note ? `<div class="entry-text">${n.note}</div>` : ''}
                    ${n.photo ? `<img src="${n.photo}" class="entry-img">` : ''}
                    <div style="margin-top:8px;">${n.bac || n.emplacement ? `<span class="badge">📍 ${n.bac || n.emplacement}</span>` : ''}</div>
                </div>`;
            }).join('');
        }

        async function saveQuickNote() {
            const text = document.getElementById('note-text').value;
            if(!text && !base64Photo) return;
            const btn = document.getElementById('btnSaveNote');
            btn.innerText = "⏳..."; btn.disabled = true;

            let photoUrl = "";
            if(base64Photo) {
                const path = `photos/${photoName}`;
                await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ message: "Photo journal", content: base64Photo }) });
                photoUrl = `https://raw.githubusercontent.com/${user}/${repo}/master/${path}`;
            }

            const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            const dataJ = await resJ.json();
            let journal = JSON.parse(decodeURIComponent(escape(atob(dataJ.content))));
            journal.push({ id: Date.now(), date: document.getElementById('note-date').value, action: "Note", seedId: document.getElementById('note-seed').value, note: text, photo: photoUrl });
            
            await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ message: "Note", content: btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2)))), sha: dataJ.sha }) });
            location.reload();
        }
        window.onload = init;
    </script>
</body>
</html>
