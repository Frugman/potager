<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Journal - Potager 2026</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; padding-bottom: 110px; font-size: 16px; }
        header { margin-bottom: 20px; }
        h1 { font-size: 24px; margin: 0; }
        .quick-note { background: #111; padding: 15px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; }
        .quick-note h3 { font-size: 14px; color: var(--accent); margin: 0 0 12px 0; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid var(--border); border-radius: 10px; font-size: 15px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        label { display: block; margin-bottom: 5px; font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; }
        .photo-btn { width: 100%; padding: 12px; background: #333; border: 2px dashed #555; border-radius: 10px; color: #aaa; font-weight: bold; text-align: center; cursor: pointer; margin-bottom: 10px; font-size: 14px; }
        #preview-img { width: 100%; border-radius: 10px; margin-bottom: 10px; display: none; border: 1px solid #333; }
        .btn-add { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; min-height: 44px; margin-top: 5px; font-size: 16px; }
        .entry-card { background: var(--card-bg); border-radius: 16px; padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; }
        .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .entry-date { font-size: 12px; color: #777; font-weight: bold; }
        .entry-type { font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase; border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; }
        .entry-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; display: block; }
        .entry-text { font-size: 14px; color: #aaa; line-height: 1.4; white-space: pre-wrap; }
        .entry-img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-top: 12px; border: 1px solid #333; }
        .badge { background: #222; padding: 4px 8px; border-radius: 6px; font-size: 11px; color: #888; border: 1px solid #333; margin-top: 8px; display: inline-block; margin-right: 5px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: #111; border-top: 2px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #fff; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .nav-icon { font-size: 26px; }
        .active-nav { color: var(--accent); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header><h1>📖 Journal de bord</h1></header>

    <div class="quick-note">
        <h3>📝 Note rapide</h3>
        <label>Plante concernée</label>
        <select id="note-seed"><option value="">📝 Note générale</option></select>
        <label>Date</label>
        <input type="date" id="note-date">
        <label>Observation</label>
        <textarea id="note-text" rows="2" placeholder="Ce que j'ai remarqué..."></textarea>

        <div onclick="document.getElementById('file-input').click()" class="photo-btn">📸 Prendre / Choisir une photo</div>
        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="processPhoto(this)">
        <img id="preview-img" src="">
        
        <button class="btn-add" id="btnSaveNote" onclick="saveQuickNote()">ENREGISTRER LA NOTE</button>
    </div>

    <div id="journal-list"><p style="text-align:center; padding:40px; color:#666;">Chargement...</p></div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item active-nav"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        let allSeeds = [], base64Photo = "", photoName = "";

        async function init() {
            if(!token) return;
            document.getElementById('note-date').valueAsDate = new Date();
            const resS = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            allSeeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
            const sel = document.getElementById('note-seed');
            allSeeds.sort((a,b)=>a.identite.nom_commun.localeCompare(b.identite.nom_commun)).forEach(s => {
                sel.innerHTML += `<option value="${s.id}">${s.identite.nom_commun} - ${s.identite.variete}</option>`;
            });
            loadJournal();
        }

        function processPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height, max = 1024;
                        if (width > max) { height *= max / width; width = max; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedData = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('preview-img').src = compressedData;
                        document.getElementById('preview-img').style.display = 'block';
                        base64Photo = compressedData.split(',')[1];
                        photoName = `IMG_${Date.now()}.jpg`;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function loadJournal() {
            const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
            const list = document.getElementById('journal-list');
            list.innerHTML = journal.reverse().map(n => {
                const s = allSeeds.find(i => i.id === n.seedId) || { identite: { nom_commun: "Note Générale", variete: "" } };
                return `<div class="entry-card" onclick="window.location.href='modifier-journal.html?id=${n.id}'">
                    <div class="entry-header"><span class="entry-type">${n.action}</span><span class="entry-date">${n.date}</span></div>
                    <span class="entry-title">${s.identite.nom_commun} ${s.identite.variete}</span>
                    ${n.note ? `<div class="entry-text">${n.note}</div>` : ''}
                    ${n.photo ? `<img src="${n.photo}" class="entry-img">` : ''}
                    <div style="margin-top:5px;">${n.bac || n.emplacement ? `<span class="badge">📍 ${n.bac || n.emplacement}</span>` : ''}</div>
                </div>`;
            }).join('');
        }

        async function saveQuickNote() {
            const text = document.getElementById('note-text').value;
            if(!text && !base64Photo) return;
            const btn = document.getElementById('btnSaveNote');
            btn.innerText = "⏳ Envoi..."; btn.disabled = true;

            let photoUrl = "";
            if(base64Photo) {
                const path = `photos/${photoName}`;
                await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message: "Photo journal", content: base64Photo })
                });
                photoUrl = `https://raw.githubusercontent.com/${user}/${repo}/master/${path}`;
            }

            const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            const dataJ = await resJ.json();
            let journal = JSON.parse(decodeURIComponent(escape(atob(dataJ.content))));
            journal.push({ id: Date.now(), date: document.getElementById('note-date').value, action: "Note", seedId: document.getElementById('note-seed').value, note: text, photo: photoUrl });
            
            await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, {
                method: 'PUT', headers: { 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ message: "Note rapide photo", content: btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2)))), sha: dataJ.sha })
            });
            location.reload();
        }
        window.onload = init;
    </script>
</body>
</html>
