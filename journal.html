<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Journal - Potager 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>

    <header>
        <h1>📖 Journal de bord</h1>
    </header>

    <div class="container">
        <div class="journal-col">
            <div class="journal-card" style="cursor:default;">
                <div class="note-meta">📝 Nouvelle entrée</div>
            
            <div class="type-grid" style="margin-top: 10px;">
                <div class="type-btn" onclick="selectAction(this, 'Semis')"><span>🌱</span>Semis</div>
                <div class="type-btn" onclick="selectAction(this, 'Repiquage')"><span>🪴</span>Repiq.</div>
                <div class="type-btn" onclick="selectAction(this, 'Plantation')"><span>🚜</span>Plant.</div>
                <div class="type-btn" onclick="selectAction(this, 'Récolte')"><span>🧺</span>Récolte</div>
                <div class="type-btn" onclick="selectAction(this, 'Arrachage')" style="color:var(--danger-red); border-color:var(--danger-red);"><span>🗑️</span>Arrachage</div>
                <div class="type-btn active" onclick="selectAction(this, 'Note')"><span>📝</span>Note</div>
            </div>

            <div id="express-form">
                <label>Plante concernée</label>
                <select id="val-seed" onchange="checkAssociations()">
                    <option value="">📝 Note générale</option>
                </select>

                <label>Date de l'événement</label>
                <input type="date" id="val-date">

                <div id="extra-fields"></div>

                <label>Observation détaillée</label>
                <textarea id="val-note" rows="3" placeholder="Description de l'action ou de l'observation..."></textarea>

                <div onclick="document.getElementById('file-input').click()" class="photo-btn">📸 Ajouter une photo</div>
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="processPhoto(this)">
                
                <img id="preview-img" style="display:none;">
                
                <button class="save-btn" id="btnSaveNote" onclick="saveEntry()">ENREGISTRER L'ENTRÉE</button>
            </div>
        </div>
        </div>

        <div class="journal-col">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div class="section-title" style="margin-bottom: 0;">Chronologie des notes</div>
                <select id="filter-month" onchange="renderFilteredJournal()" style="background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none; cursor:pointer;">
                    <option value="all">Tous les mois</option>
                    <option value="01">Janvier</option>
                    <option value="02">Février</option>
                    <option value="03">Mars</option>
                    <option value="04">Avril</option>
                    <option value="05">Mai</option>
                    <option value="06">Juin</option>
                    <option value="07">Juillet</option>
                    <option value="08">Août</option>
                    <option value="09">Septembre</option>
                    <option value="10">Octobre</option>
                    <option value="11">Novembre</option>
                    <option value="12">Décembre</option>
                </select>
            </div>
            <div id="journal-list">
                <div class="empty-msg">Chargement du journal...</div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item desktop-only active-nav"><span class="nav-icon">📖</span>Journal</a>
        <a href="meteo.html" class="nav-item desktop-only"><span class="nav-icon">🌦️</span>Météo</a>
        <a href="autres.html" class="nav-item"><span class="nav-icon">🗂️</span>Autres</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');
        let globalSeeds = [], globalJournal = [];
        let base64Photo = "", photoName = "", currentType = "Note";

        async function init() {
            if(!token) return;
            document.getElementById('val-date').valueAsDate = new Date();
            
            try {
                const resS = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                globalSeeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                
                const sel = document.getElementById('val-seed');
                globalSeeds.sort((a,b)=>a.identite.nom_commun.localeCompare(b.identite.nom_commun)).forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">${s.identite.nom_commun} - ${s.identite.variete}</option>`;
                });
                
                loadJournal();
            } catch(e) { console.error("Erreur init:", e); }
        }

        function checkAssociations() {
            const seedId = document.getElementById('val-seed').value;
            const locEl = document.getElementById('val-loc');
            let alertEl = document.getElementById('assoc-alert');
            
            if(!alertEl) {
                alertEl = document.createElement('div');
                alertEl.id = 'assoc-alert';
                alertEl.style.display = 'none';
                alertEl.style.background = 'rgba(255,82,82,0.1)';
                alertEl.style.borderLeft = '4px solid var(--danger-red)';
                alertEl.style.padding = '10px';
                alertEl.style.marginTop = '15px';
                alertEl.style.marginBottom = '15px';
                alertEl.style.borderRadius = '4px';
                alertEl.style.fontSize = '12px';
                const ef = document.getElementById('extra-fields');
                if(ef) ef.insertAdjacentElement('afterend', alertEl);
            }
            
            if(!seedId || !locEl || !locEl.value || (currentType !== 'Semis' && currentType !== 'Plantation' && currentType !== 'Repiquage')) {
                alertEl.style.display = 'none';
                return;
            }

            const currentSeed = globalSeeds.find(s => String(s.id) === String(seedId));
            if(!currentSeed) { alertEl.style.display = 'none'; return; }

            const loc = locEl.value;
            const currentYear = new Date().getFullYear();
            
            const activePlantsInLoc = [];
            globalJournal.forEach(j => {
                if((j.bac === loc || j.emplacement === loc) && new Date(j.date).getFullYear() === currentYear && j.seedId) {
                    if(j.action === 'Semis' || j.action === 'Plantation' || j.action === 'Repiquage') {
                        activePlantsInLoc.push(j.seedId);
                    }
                    if(j.action === 'Arrachage' || j.action === 'Récolte') {
                        const idx = activePlantsInLoc.lastIndexOf(j.seedId);
                        if(idx > -1) activePlantsInLoc.splice(idx, 1);
                    }
                }
            });

            if(activePlantsInLoc.length === 0) { alertEl.style.display = 'none'; return; }

            let conflicts = [];
            const activeSeeds = activePlantsInLoc.map(id => globalSeeds.find(s => String(s.id) === String(id))).filter(Boolean);
            
            activeSeeds.forEach(aS => {
                let nameA = aS.identite.nom_commun.toLowerCase();
                let nameCur = currentSeed.identite.nom_commun.toLowerCase();
                
                if(currentSeed.particularites?.mauvais_compagnons?.some(m => nameA.includes(m.toLowerCase()) || m.toLowerCase().includes(nameA))) {
                    conflicts.push(aS.identite.nom_commun);
                }
                else if(aS.particularites?.mauvais_compagnons?.some(m => nameCur.includes(m.toLowerCase()) || m.toLowerCase().includes(nameCur))) {
                    conflicts.push(aS.identite.nom_commun);
                }
            });

            if(conflicts.length > 0) {
                const uniq = [...new Set(conflicts)].join(', ');
                alertEl.innerHTML = `<strong style="color:var(--danger-red);">⚠️ ALERTE COMPAGNONNAGE</strong><br>L'ajout de <b>${currentSeed.identite.nom_commun}</b> est une très mauvaise idée à côté de : <b>${uniq}</b> (actuellement présente(s) dans <b>${loc}</b>). Leurs croissances risquent de se perturber fortement.`;
                alertEl.style.display = 'block';
            } else {
                alertEl.style.display = 'none';
            }
        }

        function selectAction(btn, type) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentType = type;
            let form = document.getElementById('express-form');
            if(form) form.classList.remove('hidden');
            let html = "";
            if(type === 'Semis' || type === 'Repiquage' || type === 'Plantation' || type === 'Arrachage') {
                html = `
                    <label>Lieu / Destination</label>
                    <select id="val-loc" onchange="checkAssociations()">
                        <option>Serre intérieure</option><option>Serre extérieure</option>
                        <option>Bac A</option><option>Bac B</option><option>Bac C</option>
                        <option>Bac D</option><option>Bac E</option><option>Pleine terre</option><option>Autre</option>
                    </select>
                `;
                if(type === 'Semis' || type === 'Repiquage') {
                    html += `
                        <label>Contenant</label>
                        <select id="val-cont">
                            <option>Pleine terre (sans contenant)</option><option>Plaque de semis</option>
                            <option>Godet</option><option>Caissette</option><option>Pot individuel</option><option>Autre</option>
                        </select>
                    `;
                }
                html += `
                    <label>Quantité</label>
                    <input type="number" id="val-qty" placeholder="${type === 'Arrachage' ? 'Vide = vider tout' : 'Nombre'}">
                `;
            } else if(type === 'Récolte') {
                html = `
                    <label>Quantité récoltée</label>
                    <div class="grid-2">
                        <input type="number" id="val-qty" placeholder="Nombre">
                        <select id="val-unit">
                            <option value="unités">Produit(s)</option>
                            <option value="kg">kg</option>
                            <option value="g">g</option>
                        </select>
                    </div>
                `;
            }
            document.getElementById('extra-fields').innerHTML = html;
            checkAssociations();
        }

        function processPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height, max = 500; 
                        if (width > height) { if (width > max) { height *= max / width; width = max; } } 
                        else { if (height > max) { width *= max / height; height = max; } }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const data = canvas.toDataURL('image/jpeg', 0.7);
                        const preview = document.getElementById('preview-img');
                        preview.src = data; preview.style.display = 'block';
                        base64Photo = data.split(',')[1];
                        photoName = `IMG_${Date.now()}.jpg`;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function loadJournal() {
            try {
                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json?t=${Date.now()}`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
                globalJournal = journal;
                globalJournal.reverse(); // On inverse une seule fois à la source
                renderFilteredJournal(); // On passe au rendu
            } catch (e) {
                document.getElementById('journal-list').innerHTML = `<div class="empty-msg">Aucune entrée trouvée.</div>`;
            }
        }

        function renderFilteredJournal() {
            const m = document.getElementById('filter-month').value;
            let filtered = globalJournal;
            if(m !== 'all') {
                filtered = globalJournal.filter(j => j.date && j.date.split('-')[1] === m);
            }
            if(filtered.length === 0) {
                document.getElementById('journal-list').innerHTML = `<div class="empty-msg">Aucune entrée pour cette période.</div>`;
                return;
            }
            
            document.getElementById('journal-list').innerHTML = filtered.map(n => {
                const s = globalSeeds.find(i => String(i.id) === String(n.seedId)) || { identite: { nom_commun: "Note Générale", variete: "" } };
                const icon = n.action === 'Récolte' ? '🧺' : (n.action === 'Semis' ? '🌱' : (n.action === 'Plantation' ? '🚜' : '📝'));
                
                return `
                <div class="journal-card" onclick="window.location.href='modifier-journal.html?id=${n.id}'">
                    <div class="journal-content-wrap">
                        <div class="journal-text">
                            <div class="note-meta">${n.date} • ${n.action} ${icon}</div>
                            <div class="note-title">${s.identite.nom_commun} <span style="font-weight:400; font-size:14px; color:var(--text-secondary);">${s.identite.variete}</span></div>
                            
                            ${n.quantite ? `<div style="margin: 8px 0;"><span class="badge">+ ${n.quantite} ${n.unite || 'unité(s)'}</span></div>` : ''}
                        </div>
                        ${n.photo ? `<img src="${n.photo}" class="journal-thumb" onclick="event.stopPropagation(); openImageModal(this.src)">` : ''}
                    </div>
                    
                    ${n.note ? `<div class="note-content" style="margin-top:12px;">${n.note}</div>` : ''}
                    
                    <div style="margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
                        ${n.bac ? `<span style="font-size:12px; opacity:0.6;">🍱 ${n.bac}</span>` : ''}
                        ${n.emplacement ? `<span style="font-size:12px; opacity:0.6;">📍 ${n.emplacement}</span>` : ''}
                        ${n.contenant ? `<span style="font-size:12px; opacity:0.6;">📦 ${n.contenant}</span>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        async function saveEntry() {
            const text = document.getElementById('val-note').value;
            // Ne pas empêcher de sauver un repiquage sans texte si action physique
            if(currentType === 'Note' && !text && !base64Photo) return;
            
            const btn = document.getElementById('btnSaveNote');
            const originalText = btn.innerText;
            btn.innerText = "⏳ SYNCHRONISATION..."; btn.disabled = true;

            try {
                let photoUrl = "";
                if(base64Photo) {
                    const path = `photos/${photoName}`;
                    await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, { 
                        method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }, 
                        body: JSON.stringify({ message: "Photo journal", content: base64Photo }) 
                    });
                    photoUrl = `https://raw.githubusercontent.com/${user}/${repo}/master/${path}`;
                }

                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const dataJ = await resJ.json();
                let journal = JSON.parse(decodeURIComponent(escape(atob(dataJ.content))));
                
                journal.push({ 
                    id: Date.now(), 
                    date: document.getElementById('val-date').value, 
                    action: currentType, 
                    seedId: document.getElementById('val-seed').value, 
                    note: text, 
                    photo: photoUrl,
                    quantite: parseInt(document.getElementById('val-qty')?.value) || 0,
                    unite: document.getElementById('val-unit')?.value || "",
                    bac: document.getElementById('val-bac')?.value || "",
                    emplacement: document.getElementById('val-loc')?.value || "",
                    contenant: document.getElementById('val-cont')?.value || ""
                });
                
                await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { 
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }, 
                    body: JSON.stringify({ message: `Ajout ${currentType}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2)))), sha: dataJ.sha }) 
                });
                
                location.reload();
            } catch(e) { 
                alert("Erreur lors de l'enregistrement");
                btn.innerText = originalText; btn.disabled = false;
            }
        }
        
        function openImageModal(src) {
            const m = document.createElement('div');
            m.className = 'image-modal';
            m.onclick = () => m.remove();
            const close = document.createElement('span');
            close.className = 'image-modal-close';
            close.innerHTML = '&times;';
            const img = document.createElement('img');
            img.src = src;
            img.className = 'image-modal-content';
            m.appendChild(close);
            m.appendChild(img);
            document.body.appendChild(m);
        }

        window.onload = init;
    </script>
</body>
</html>
