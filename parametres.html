<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramètres Connexion</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #4CAF50;
            --error: #ff4444;
            --border: #444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 120px; /* Espace pour la nav-bar fixe */
            font-size: 16px; /* CDC 5.0 */
        }

        header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 30px;
            margin-right: 15px;
            padding: 0;
            cursor: pointer;
        }

        h1 { font-size: 22px; margin: 0; }

        .instruction {
            background: #111;
            padding: 15px;
            border-left: 4px solid var(--accent);
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .form-group { margin-bottom: 25px; }

        label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 16px; color: #aaa; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 18px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .save-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            min-height: 44px; /* Zone tactile CDC 5.0 */
        }

        .reset-btn {
            width: 100%;
            background: none;
            color: var(--error);
            border: 1px solid var(--error);
            padding: 15px;
            border-radius: 15px;
            font-size: 14px;
            margin-top: 40px;
            cursor: pointer;
            min-height: 44px; /* Zone tactile CDC 5.0 */
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }

        /* Barre de navigation universelle */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85px;
            background: #111;
            border-top: 2px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-height: 44px; /* Zone tactile CDC 5.0 */
        }

        .nav-icon {
            font-size: 28px;
            margin-bottom: 2px;
        }

        .active-nav {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <h1>Configuration API</h1>
    </header>

    <div class="instruction">
        Tes identifiants sont stockés <strong>uniquement sur cet appareil</strong> (navigateur). Ils ne sont jamais envoyés sur un autre serveur que GitHub.
    </div>

    <div class="form-group">
        <label>Pseudo GitHub</label>
        <input type="text" id="gh_user" placeholder="ex: MonPseudo">
    </div>

    <div class="form-group">
        <label>Nom du dépôt</label>
        <input type="text" id="gh_repo" placeholder="ex: mon-potager">
    </div>

    <div class="form-group">
        <label>Token Secret (PAT)</label>
        <input type="password" id="gh_token" placeholder="github_pat_...">
    </div>

    <button class="save-btn" onclick="saveSettings()">ENREGISTRER LA CONFIGURATION</button>

    <div id="statusMsg" class="status">✅ Configuration sauvegardée !</div>

    <button class="reset-btn" onclick="clearSettings()">EFFACER LES DONNÉES SUR CET APPAREIL</button>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>Accueil
        </a>
        <a href="bacs.html" class="nav-item">
            <span class="nav-icon">🍱</span>Bacs
        </a>
        <a href="agenda.html" class="nav-item">
            <span class="nav-icon">📅</span>Agenda
        </a>
        <a href="journal.html" class="nav-item">
            <span class="nav-icon">📖</span>Journal
        </a>
        <a href="parametres.html" class="nav-item active-nav">
            <span class="nav-icon">⚙️</span>Réglages
        </a>
    </nav>

    <script>
        // Charger les données existantes au démarrage
        window.onload = function() {
            document.getElementById('gh_user').value = localStorage.getItem('gh_user') || '';
            document.getElementById('gh_repo').value = localStorage.getItem('gh_repo') || '';
            document.getElementById('gh_token').value = localStorage.getItem('gh_token') || '';
        }

        function saveSettings() {
            const user = document.getElementById('gh_user').value.trim();
            const repo = document.getElementById('gh_repo').value.trim();
            const token = document.getElementById('gh_token').value.trim();

            if(!user || !repo || !token) {
                alert("Remplis tous les champs avant de valider !");
                return;
            }

            localStorage.setItem('gh_user', user);
            localStorage.setItem('gh_repo', repo);
            localStorage.setItem('gh_token', token);

            const msg = document.getElementById('statusMsg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        function clearSettings() {
            if(confirm("Veux-tu vraiment effacer tes accès sur cet appareil ?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
