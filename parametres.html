<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paramètres Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="#" onclick="window.history.length > 1 ? window.history.back() : window.location.href='autres.html'; return false;" class="back-btn">←</a>
        <h1>Configuration API</h1>
    </header>

    <div class="instruction">
        Tes identifiants sont stockés <strong>uniquement sur cet appareil</strong> (navigateur). Ils ne sont jamais envoyés sur un autre serveur que GitHub.
    </div>

    <div class="form-group">
        <label>Pseudo GitHub</label>
        <input type="text" id="gh_user" placeholder="ex: MonPseudo">
    </div>

    <div class="form-group">
        <label>Nom du dépôt</label>
        <input type="text" id="gh_repo" placeholder="ex: mon-potager">
    </div>

    <div class="form-group">
        <label>Token Secret (PAT)</label>
        <input type="password" id="gh_token" placeholder="github_pat_...">
    </div>

    <button class="save-btn" onclick="saveSettings()">ENREGISTRER LA CONFIGURATION</button>

    <div id="statusMsg" class="status">✅ Configuration sauvegardée !</div>

    <button class="reset-btn" onclick="clearSettings()">EFFACER LES DONNÉES SUR CET APPAREIL</button>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item active-nav"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item desktop-only"><span class="nav-icon">📖</span>Journal</a>
        <a href="meteo.html" class="nav-item desktop-only"><span class="nav-icon">🌦️</span>Météo</a>
        <a href="autres.html" class="nav-item"><span class="nav-icon">🗂️</span>Autres</a>
    </nav>

    <script>
        // Charger les données existantes au démarrage
        window.onload = function() {
            document.getElementById('gh_user').value = localStorage.getItem('gh_user') || '';
            document.getElementById('gh_repo').value = localStorage.getItem('gh_repo') || '';
            document.getElementById('gh_token').value = localStorage.getItem('gh_token') || '';
        }

        function saveSettings() {
            const user = document.getElementById('gh_user').value.trim();
            const repo = document.getElementById('gh_repo').value.trim();
            const token = document.getElementById('gh_token').value.trim();

            if(!user || !repo || !token) {
                alert("Remplis tous les champs avant de valider !");
                return;
            }

            localStorage.setItem('gh_user', user);
            localStorage.setItem('gh_repo', repo);
            localStorage.setItem('gh_token', token);

            const msg = document.getElementById('statusMsg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        function clearSettings() {
            if(confirm("Veux-tu vraiment effacer tes accès sur cet appareil ?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
