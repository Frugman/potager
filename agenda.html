<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Agenda Dynamique</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #333; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
            padding-bottom: 100px; 
            font-size: 16px; /* Conforme CDC 5.0 */
        }
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
        }
        h1 { font-size: 22px; margin: 0; }
        
        /* Filtre en haut à droite */
        #filter-tasks {
            background: var(--card-bg);
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            min-height: 44px; /* Zone tactile CDC 5.0 */
        }

        .month-separator { 
            font-size: 18px; 
            font-weight: bold; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin: 30px 0 15px 0; 
            padding-bottom: 10px; 
            border-bottom: 1px solid #222; 
        }
        
        .timeline { position: relative; padding-left: 20px; border-left: 2px solid #222; margin-left: 10px; }
        
        .event-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 15px; 
            border: 1px solid var(--border); 
            margin-bottom: 15px; 
            position: relative; 
        }
        
        .event-card::before { 
            content: ''; 
            position: absolute; 
            left: -27px; 
            top: 20px; 
            width: 12px; 
            height: 12px; 
            background: var(--accent); 
            border-radius: 50%; 
            border: 3px solid var(--bg); 
        }
        
        .event-date { font-size: 13px; font-weight: bold; color: var(--accent); margin-bottom: 5px; }
        .event-title { font-size: 17px; font-weight: bold; display: block; }
        .event-subtitle { font-size: 14px; color: #888; margin-top: 2px; }
        
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; 
            background: #111; border-top: 2px solid var(--border); 
            display: flex; justify-content: space-around; align-items: center; z-index: 100; 
        }
        .nav-item { color: #fff; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .nav-icon { font-size: 26px; margin-bottom: 2px; }
        .active-nav { color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <h1>📅 Agenda</h1>
        <select id="filter-tasks" onchange="renderAgenda()">
            <option value="Tous">Tout voir</option>
            <option value="Levée">🌱 Levées</option>
            <option value="Repiquage">🪴 Repiquages</option>
            <option value="Plantation">🚜 Plantations</option>
            <option value="Récolte">🧺 Récoltes</option>
        </select>
    </header>

    <div id="agenda-container">
        <p style="text-align:center; padding:40px; color:#666;">Calcul des étapes...</p>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>Accueil
        </a>
        <a href="repertoire.html" class="nav-item">
            <span class="nav-icon">📚</span>Semences
        </a>
        <a href="bacs.html" class="nav-item">
            <span class="nav-icon">🍱</span>Bacs
        </a>
        <a href="agenda.html" class="nav-item active-nav">
            <span class="nav-icon">📅</span>Agenda
        </a>
        <a href="journal.html" class="nav-item">
            <span class="nav-icon">📖</span>Journal
        </a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        let upcomingTasks = [];

        function addDays(date, days) {
            const result = new Date(date);
            result.setDate(result.getDate() + parseInt(days));
            return result;
        }

        async function loadData() {
            if (!token) return;
            try {
                const resSeeds = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const seeds = JSON.parse(decodeURIComponent(escape(atob((await resSeeds.json()).content))));
                
                const resJournal = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const journal = JSON.parse(decodeURIComponent(escape(atob((await resJournal.json()).content))));

                const today = new Date();
                today.setHours(0,0,0,0);
                upcomingTasks = [];

                journal.forEach(entry => {
                    if (entry.action === 'Semis') {
                        const seed = seeds.find(s => s.id === entry.seedId);
                        if (!seed || !seed.delais) return;

                        const dSemis = new Date(entry.date);
                        // Label combiné : Nom Commun - Variété
                        const plantLabel = `${seed.identite.nom_commun} - ${seed.identite.variete}`;

                        const steps = [
                            { date: addDays(dSemis, seed.delais.levee), task: "🌱 Levée attendue", type: "Levée" },
                            { date: addDays(addDays(dSemis, seed.delais.levee), seed.delais.repiquage), task: "🪴 Repiquage à faire", type: "Repiquage" },
                            { date: addDays(addDays(addDays(dSemis, seed.delais.levee), seed.delais.repiquage), seed.delais.plantation), task: "🚜 Plantation finale", type: "Plantation" },
                            { date: addDays(addDays(addDays(addDays(dSemis, seed.delais.levee), seed.delais.repiquage), seed.delais.plantation), seed.delais.maturite), task: "🧺 Début récolte", type: "Récolte" }
                        ];

                        steps.forEach(s => {
                            if (s.date >= today) {
                                upcomingTasks.push({ ...s, plant: plantLabel });
                            }
                        });
                    }
                });

                upcomingTasks.sort((a, b) => a.date - b.date);
                renderAgenda();

            } catch (e) { console.error(e); }
        }

        function renderAgenda() {
            const filter = document.getElementById('filter-tasks').value;
            const container = document.getElementById('agenda-container');
            const filtered = filter === "Tous" ? upcomingTasks : upcomingTasks.filter(t => t.type === filter);
            
            if (filtered.length === 0) {
                container.innerHTML = "<p style='color:#666; text-align:center; padding:40px;'>Aucune tâche trouvée pour ce filtre.</p>";
                return;
            }

            let html = "";
            let currentMonthYear = "";

            filtered.forEach(u => {
                const monthYear = u.date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }).toUpperCase();
                
                if (monthYear !== currentMonthYear) {
                    if (currentMonthYear !== "") html += `</div>`;
                    currentMonthYear = monthYear;
                    html += `<div class="month-separator">${currentMonthYear}</div><div class="timeline">`;
                }

                html += `
                    <div class="event-card">
                        <div class="event-date">${u.date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' })}</div>
                        <span class="event-title">${u.task}</span>
                        <span class="event-subtitle">${u.plant}</span>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        window.onload = loadData;
    </script>
</body>
</html>
