<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda & Soins - Potager 2026</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; padding-bottom: 110px; font-size: 16px; }
        
        header { display: flex; align-items: center; margin-bottom: 25px; }
        header h1 { font-size: 24px; margin: 0; }

        .filters { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-btn, select { 
            background: #222; color: #fff; border: 1px solid var(--border); 
            padding: 10px 15px; border-radius: 12px; font-size: 13px; font-weight: bold; outline: none;
        }
        select { appearance: none; padding-right: 30px; }

        .month-title { color: var(--accent); font-size: 18px; text-transform: uppercase; letter-spacing: 2px; margin: 40px 0 20px; font-weight: 900; }
        
        .timeline { position: relative; padding-left: 20px; border-left: 2px solid #222; margin-left: 10px; }
        
        .task-card { 
            background: var(--card-bg); border-radius: 16px; padding: 15px; 
            margin-bottom: 15px; border: 1px solid var(--border); position: relative;
            cursor: pointer; transition: transform 0.1s;
        }
        .task-card:active { transform: scale(0.98); }
        .task-card::before { 
            content: ''; position: absolute; left: -31px; top: 22px; 
            width: 12px; height: 12px; background: var(--accent); border-radius: 50%; border: 4px solid var(--bg);
        }

        .task-date { font-size: 12px; color: var(--accent); margin-bottom: 5px; font-weight: bold; }
        .task-title { font-size: 16px; font-weight: bold; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .task-plant { font-size: 13px; color: #888; }
        .past-task { opacity: 0.5; filter: grayscale(1); }
        .past-task::before { background: #555; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: #111; border-top: 2px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #fff; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .nav-icon { font-size: 26px; }
        .active-nav { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>🗓️ Agenda & Soins</h1>
    </header>

    <div class="filters">
        <button class="filter-btn" onclick="toggleHistory()">VOIR L'HISTORIQUE</button>
        <select id="actionFilter" onchange="renderAgenda()">
            <option value="all">Toutes les actions</option>
            <option value="Semis">🌱 Semis / Levée</option>
            <option value="Entretien">✂️ Soins & Taille</option>
            <option value="Plantation">🚜 Plantation</option>
            <option value="Récolte">🧺 Récolte</option>
        </select>
    </div>

    <div id="agenda-container">
        <p style="text-align:center; padding:40px; color:#666;">Calcul de votre calendrier...</p>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item active-nav"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');
        
        let allTasks = [];
        let showHistory = false;

        function addDays(dateStr, days) {
            let d = new Date(dateStr);
            d.setDate(d.getDate() + parseInt(days));
            return d;
        }

        function toggleHistory() {
            showHistory = !showHistory;
            event.target.innerText = showHistory ? "MASQUER L'HISTORIQUE" : "VOIR L'HISTORIQUE";
            renderAgenda();
        }

        async function loadData() {
            if(!token) return;
            try {
                const [resS, resJ] = await Promise.all([
                    fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                const seeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));

                calculateTasks(seeds, journal);
            } catch (e) { console.error(e); }
        }

        function calculateTasks(seeds, journal) {
            allTasks = [];
            const today = new Date();
            today.setHours(0,0,0,0);

            // Pour chaque semis enregistré dans le journal
            journal.filter(j => j.action === 'Semis').forEach(entry => {
                const seed = seeds.find(s => String(s.id) === String(entry.seedId));
                if (!seed) return;

                const semisDate = entry.date;

                // 1. Étapes de croissance théoriques
                const etapes = [
                    { d: seed.delais?.levee, t: "🌱 Levée attendue", cat: "Semis" },
                    { d: (seed.delais?.levee || 0) + (seed.delais?.repiquage || 0), t: "🪴 Repiquage", cat: "Semis" },
                    { d: (seed.delais?.levee || 0) + (seed.delais?.repiquage || 0) + (seed.delais?.plantation || 0), t: "🚜 Plantation", cat: "Plantation" },
                    { d: (seed.delais?.levee || 0) + (seed.delais?.repiquage || 0) + (seed.delais?.plantation || 0) + (seed.delais?.maturite || 0), t: "🧺 Récolte estimée", cat: "Récolte" }
                ];

                etapes.forEach(et => {
                    if(et.d > 0) {
                        allTasks.push({
                            date: addDays(semisDate, et.d),
                            title: et.t,
                            plant: `${seed.identite.nom_commun} - ${seed.identite.variete}`,
                            seedId: seed.id,
                            category: et.cat
                        });
                    }
                });

                // 2. Tâches d'entretien spécifiques
                if (seed.taches_entretien) {
                    seed.taches_entretien.forEach(te => {
                        let baseDate = semisDate;
                        
                        // Si la base est la plantation, on cherche si elle a déjà été faite
                        if (te.base === 'plantation') {
                            const realPlantation = journal.find(j => j.seedId === entry.seedId && j.action === 'Plantation');
                            if (realPlantation) baseDate = realPlantation.date;
                            else baseDate = addDays(semisDate, (seed.delais?.levee || 0) + (seed.delais?.repiquage || 0) + (seed.delais?.plantation || 0));
                        } 
                        else if (te.base === 'levee') {
                            baseDate = addDays(semisDate, seed.delais?.levee || 0);
                        }

                        allTasks.push({
                            date: addDays(baseDate, te.delai),
                            title: te.label,
                            plant: `${seed.identite.nom_commun} - ${seed.identite.variete}`,
                            seedId: seed.id,
                            category: "Entretien"
                        });
                    });
                }
            });

            renderAgenda();
        }

        function renderAgenda() {
            const container = document.getElementById('agenda-container');
            const filter = document.getElementById('actionFilter').value;
            const today = new Date();
            today.setHours(0,0,0,0);

            // Filtrage
            let filtered = allTasks.filter(t => {
                const isFuture = t.date >= today;
                const matchCat = filter === 'all' || t.category === filter;
                return (showHistory ? true : isFuture) && matchCat;
            });

            // Tri chronologique
            filtered.sort((a, b) => a.date - b.date);

            if (filtered.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding:40px; color:#666;">Aucune tâche programmée.</p>`;
                return;
            }

            let html = "";
            let currentMonth = "";

            filtered.forEach(t => {
                const taskMonth = t.date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
                if (taskMonth !== currentMonth) {
                    if (currentMonth !== "") html += `</div>`;
                    html += `<div class="month-title">${taskMonth}</div><div class="timeline">`;
                    currentMonth = taskMonth;
                }

                const isPast = t.date < today;
                html += `
                    <div class="task-card ${isPast ? 'past-task' : ''}" onclick="window.location.href='fiche-semence.html?id=${t.seedId}'">
                        <div class="task-date">${t.date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' })}</div>
                        <div class="task-title">${t.title}</div>
                        <div class="task-plant">${t.plant}</div>
                    </div>
                `;
            });

            container.innerHTML = html + "</div>";
        }

        window.onload = loadData;
    </script>
</body>
</html>
