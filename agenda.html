<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda & Soins - Potager 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🗓️ Agenda & Soins</h1>
    </header>

    <div class="container">
        <div class="card">
            <div class="note-meta">Options d'affichage</div>
            
            <div class="grid-2" style="margin-bottom: 15px;">
                <button class="filter-btn" id="toggleHistBtn" onclick="toggleHistory()" style="margin-bottom:0;">VOIR L'HISTORIQUE</button>
                <select id="actionFilter" onchange="renderAgenda()" style="margin-bottom:0;">
                    <option value="all">Toutes les actions</option>
                    <option value="Semis">🌱 Semis / Levée</option>
                    <option value="Entretien">✂️ Soins & Taille</option>
                    <option value="Plantation">🚜 Plantation</option>
                    <option value="Récolte">🧺 Récolte</option>
                </select>
            </div>
            <select id="filter-month" onchange="renderAgenda()" style="width: 100%; background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none; cursor:pointer;">
                <option value="all">Tous les mois</option>
                <option value="01">Janvier</option>
                <option value="02">Février</option>
                <option value="03">Mars</option>
                <option value="04">Avril</option>
                <option value="05">Mai</option>
                <option value="06">Juin</option>
                <option value="07">Juillet</option>
                <option value="08">Août</option>
                <option value="09">Septembre</option>
                <option value="10">Octobre</option>
                <option value="11">Novembre</option>
                <option value="12">Décembre</option>
            </select>
        </div>

        <div id="agenda-container">
            <div class="empty-msg">Calcul de votre calendrier...</div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item active-nav"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item desktop-only"><span class="nav-icon">📖</span>Journal</a>
        <a href="meteo.html" class="nav-item desktop-only"><span class="nav-icon">🌦️</span>Météo</a>
        <a href="autres.html" class="nav-item"><span class="nav-icon">🗂️</span>Autres</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');
        
        let allTasks = [];
        let showHistory = false;

        function addDays(dateStr, days) {
            let d = new Date(dateStr);
            d.setDate(d.getDate() + parseInt(days));
            return d;
        }

        function getClosestSaturday(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = day === 6 ? 0 : (day <= 2 ? -day - 1 : 6 - day);
            date.setDate(date.getDate() + diff);
            date.setHours(0,0,0,0);
            return date;
        }

        function toggleHistory() {
            showHistory = !showHistory;
            document.getElementById('toggleHistBtn').innerText = showHistory ? "MASQUER L'HISTORIQUE" : "VOIR L'HISTORIQUE";
            renderAgenda();
        }

        async function loadData() {
            if(!token) return;
            try {
                const [resS, resJ] = await Promise.all([
                    fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                const seeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));

                calculateTasks(seeds, journal);
            } catch (e) { 
                console.error(e); 
                document.getElementById('agenda-container').innerHTML = `<div class="empty-msg">Erreur de chargement.</div>`;
            }
        }

        const glossaryWords = ['stratifier', 'scarifier', 'poquet', 'plomber', 'gourmand', 'ébourgeonner', 'pincer', 'étêter', 'étreter', 'éclaircir', 'diriger', 'butter', 'biner', 'sarcler', 'pailler', 'arroser', 'nettoyer', 'palisser'];
        function getLexiqueBadge(text) {
            if(!text) return "";
            if(glossaryWords.some(w => text.toLowerCase().includes(w))) {
                return ` <a href="lexique.html" class="nav-icon" title="Voir l'Antisèche" style="text-decoration:none; filter:grayscale(100%); font-size:12px;" onclick="event.stopPropagation();">💡</a>`;
            }
            return "";
        }

        function calculateTasks(seeds, journal) {
            allTasks = [];
            const today = new Date();
            today.setHours(0,0,0,0);

            // Pour chaque semis enregistré dans le journal
            // 1. Calculs depuis les Semis
            journal.filter(j => j.action === 'Semis').forEach(entry => {
                const seed = seeds.find(s => String(s.id) === String(entry.seedId));
                if (!seed) return;

                const semisDate = entry.date;

                const isDirectSowing = entry.contenant === 'Pleine terre (sans contenant)';
                const etapes = [];
                

                if (!isDirectSowing && seed.delais?.repiquage > 0) {
                    etapes.push({ d: (seed.delais?.levee || 0) + seed.delais.repiquage, t: "🪴 Repiquage recommandé", cat: "Semis" });
                }
                if (!isDirectSowing && seed.delais?.plantation > 0) {
                    etapes.push({ d: (seed.delais?.levee || 0) + (seed.delais?.repiquage || 0) + seed.delais.plantation, t: "🚜 Plantation en bac", cat: "Plantation" });
                }
                if (seed.delais?.maturite > 0) {
                    etapes.push({ d: (seed.delais?.levee || 0) + (isDirectSowing ? 0 : seed.delais?.repiquage || 0) + (isDirectSowing ? 0 : seed.delais?.plantation || 0) + seed.delais.maturite, t: "🧺 Récolte estimée", cat: "Récolte" });
                }

                etapes.forEach(et => {
                    if(et.d > 0) {
                        allTasks.push({
                            date: getClosestSaturday(addDays(semisDate, et.d)),
                            title: et.t,
                            plant: `${seed.identite.nom_commun} - ${seed.identite.variete}`,
                            seedId: seed.id,
                            category: et.cat
                        });
                    }
                });

                if (seed.taches_entretien) {
                    seed.taches_entretien.forEach(te => {
                        let baseDate = semisDate;
                        if (te.base === 'plantation') {
                            const realPlantation = journal.find(j => String(j.seedId) === String(entry.seedId) && j.action === 'Plantation');
                            if (realPlantation) baseDate = realPlantation.date;
                            else baseDate = addDays(semisDate, (seed.delais?.levee || 0) + (seed.delais?.repiquage || 0) + (seed.delais?.plantation || 0));
                        } 
                        else if (te.base === 'levee') {
                            baseDate = addDays(semisDate, seed.delais?.levee || 0);
                        }

                        const occ = te.occurences || 1;
                        const freq = te.frequence || 0;
                        const badge = getLexiqueBadge(te.label);
                        for(let i=0; i<occ; i++) {
                            allTasks.push({
                                date: getClosestSaturday(addDays(baseDate, te.delai + (i * freq))),
                                title: `✂️ ${te.label}${badge}`,
                                plant: `${seed.identite.nom_commun} - ${seed.identite.variete}`,
                                seedId: seed.id,
                                category: "Entretien"
                            });
                        }
                    });
                }
            });

            // 2. Calculs depuis les Plantations directes (plants achetés sans semis)
            journal.filter(j => j.action === 'Plantation').forEach(entry => {
                const seed = seeds.find(s => String(s.id) === String(entry.seedId));
                if (!seed) return;
                const planDate = new Date(entry.date);
                const hasRecentSemis = journal.some(s => s.action === 'Semis' && String(s.seedId) === String(entry.seedId) && 
                                      new Date(s.date) <= planDate && (planDate - new Date(s.date)) < 100 * 24 * 60 * 60 * 1000);
                
                if(!hasRecentSemis) {
                    if (seed.delais?.maturite > 0) {
                        allTasks.push({
                            date: getClosestSaturday(addDays(entry.date, seed.delais.maturite)),
                            title: "🧺 Récolte estimée (Achat)",
                            plant: `${seed.identite.nom_commun} - ${seed.identite.variete}`,
                            seedId: seed.id,
                            category: "Récolte"
                        });
                    }
                    if (seed.taches_entretien) {
                        seed.taches_entretien.filter(te => te.base === 'plantation').forEach(te => {
                            const occ = te.occurences || 1;
                            const freq = te.frequence || 0;
                            const badge = getLexiqueBadge(te.label);
                            for(let i=0; i<occ; i++) {
                                allTasks.push({
                                    date: getClosestSaturday(addDays(entry.date, te.delai + (i * freq))),
                                    title: `✂️ ${te.label}${badge}`,
                                    plant: `${seed.identite.nom_commun} - ${seed.identite.variete}`,
                                    seedId: seed.id,
                                    category: "Entretien"
                                });
                            }
                        });
                    }
                }
            });

            // 3. Semis Idéal Conseillé (Regroupement)
            const recoGroups = {};
            const cy = today.getFullYear();
            seeds.forEach(s => {
                if(s.conseil_semis && s.conseil_semis.date) {
                    const hasSemis = journal.some(j => j.action === 'Semis' && String(j.seedId) === String(s.id) && new Date(j.date).getFullYear() === cy);
                    if(!hasSemis) {
                        const d = new Date(s.conseil_semis.date); d.setFullYear(cy);
                        const k = d.getTime() + "|" + s.conseil_semis.texte;
                        if(!recoGroups[k]) recoGroups[k] = { date: d, t: s.conseil_semis.texte, p: [], ids: [] };
                        recoGroups[k].p.push(s.identite.nom_commun + (s.identite.variete ? ` ${s.identite.variete}` : ''));
                        recoGroups[k].ids.push(s.id);
                    }
                }
            });
            Object.values(recoGroups).forEach(g => {
                allTasks.push({
                    date: getClosestSaturday(g.date), title: "🎯 Prévision de Semis", plant: g.p.join(', '), seedId: g.ids[0], category: "Semis", desc: g.t
                });
            });

            renderAgenda();
        }

        function renderAgenda() {
            const container = document.getElementById('agenda-container');
            const filter = document.getElementById('actionFilter').value;
            const filterMonth = document.getElementById('filter-month').value;
            const today = new Date();
            today.setHours(0,0,0,0);

            let filtered = allTasks.filter(t => {
                const isFuture = t.date >= today;
                const matchCat = filter === 'all' || t.category === filter;
                const taskMonth = String(t.date.getMonth() + 1).padStart(2, '0');
                const matchMonth = filterMonth === 'all' || taskMonth === filterMonth;
                return (showHistory ? true : isFuture) && matchCat && matchMonth;
            });

            filtered.sort((a, b) => a.date - b.date);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-msg">Aucune tâche prévue.</div>`;
                return;
            }

            let html = "";
            let currentMonth = "";

            filtered.forEach(t => {
                const taskMonth = t.date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
                
                if (taskMonth !== currentMonth) {
                    if (currentMonth !== "") html += `</div>`; // Fermer la timeline précédente
                    html += `<div class="month-title">${taskMonth}</div><div class="timeline">`;
                    currentMonth = taskMonth;
                }

                const isPast = t.date < today;
                html += `
                    <div class="task-card ${isPast ? 'past-task' : ''}" onclick="window.location.href='fiche-semence.html?id=${t.seedId}'">
                        <div class="task-date">${t.date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' })}</div>
                        <div class="task-title">${t.title}</div>
                        <div class="task-plant">${t.plant}</div>
                        ${t.desc ? `<div style="margin-top:8px; font-size:12px; color:#FFA500; padding:8px; background:rgba(255,165,0,0.05); border-left:2px solid #FFA500; font-style:italic;">💡 ${t.desc}</div>` : ''}
                    </div>
                `;
            });

            container.innerHTML = html + "</div>";
        }

        window.onload = loadData;
    </script>
</body>
</html>
