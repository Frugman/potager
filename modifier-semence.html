<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modifier Semence</title>
    <style>
        :root { --bg: #000000; --card-bg: #1a1a1a; --text: #ffffff; --accent: #4CAF50; --border: #444; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; padding-bottom: 120px; }
        header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { background: none; border: none; color: var(--text); font-size: 30px; margin-right: 15px; cursor: pointer; }
        section { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
        h2 { font-size: 16px; color: var(--accent); margin-top: 0; margin-bottom: 20px; text-transform: uppercase; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 16px; }
        input, select, textarea { width: 100%; padding: 16px; background: #000; border: 2px solid var(--border); border-radius: 10px; color: #fff; font-size: 18px; box-sizing: border-box; outline: none; }
        .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .month-btn { padding: 10px 2px; background: #000; border: 1px solid var(--border); border-radius: 6px; color: #fff; text-align: center; font-size: 12px; cursor: pointer; }
        .month-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }
        .save-btn { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--accent); color: white; border: none; padding: 22px; border-radius: 15px; font-size: 20px; font-weight: bold; z-index: 100; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header>
        <button id="btnCancel" class="back-btn">←</button>
        <h1>Modifier la fiche</h1>
    </header>

    <form id="editForm">
        <section>
            <h2>Identité</h2>
            <div class="form-group"><label>Nom commun</label><input type="text" id="nom_commun"></div>
            <div class="form-group"><label>Variété</label><input type="text" id="variete"></div>
        </section>

        <section>
            <h2>Culture</h2>
            <div class="form-group">
                <label>Période de semis</label>
                <div class="month-grid" id="semisMonths">
                    <div class="month-btn" onclick="this.classList.toggle('active')">Jan</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Fév</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Mar</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Avr</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Mai</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Juin</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Juil</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Août</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Sep</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Oct</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Nov</div>
                    <div class="month-btn" onclick="this.classList.toggle('active')">Déc</div>
                </div>
            </div>
        </section>

        <button type="button" class="save-btn" id="submitBtn" onclick="updateSeed()">ENREGISTRER LES MODIFICATIONS</button>
    </form>

    <script>
        const params = new URLSearchParams(window.location.search);
        const seedId = params.get('id');
        const user = localStorage.getItem('gh_user');
        const repo = localStorage.getItem('gh_repo');
        const token = localStorage.getItem('gh_token');

        document.getElementById('btnCancel').onclick = () => window.location.href = `fiche-semence.html?id=${seedId}`;

        async function loadSeedData() {
            const url = `https://api.github.com/repos/${user}/${repo}/contents/semences.json`;
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            const semences = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            const s = semences.find(i => i.id === seedId);

            if (s) {
                document.getElementById('nom_commun').value = s.identite.nom_commun;
                document.getElementById('variete').value = s.identite.variete;
                
                // Activer les mois
                const monthBtns = document.querySelectorAll('.month-btn');
                monthBtns.forEach(btn => {
                    if ((s.culture?.periode_semis || []).includes(btn.innerText)) btn.classList.add('active');
                });
            }
        }

        async function updateSeed() {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "⏳ MISE À JOUR...";
            btn.disabled = true;

            const url = `https://api.github.com/repos/${user}/${repo}/contents/semences.json`;
            
            try {
                const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const fileData = await getRes.json();
                const sha = fileData.sha;
                let semences = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

                const index = semences.findIndex(i => i.id === seedId);
                if (index !== -1) {
                    semences[index].identite.nom_commun = document.getElementById('nom_commun').value;
                    semences[index].identite.variete = document.getElementById('variete').value;
                    semences[index].culture.periode_semis = Array.from(document.querySelectorAll('.month-btn.active')).map(b => b.innerText);
                }

                const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(semences, null, 2))));
                
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Mise à jour de ${semences[index].identite.variete}`,
                        content: updatedContent,
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    alert("✅ Fiche mise à jour !");
                    window.location.href = `fiche-semence.html?id=${seedId}`;
                }
            } catch (e) {
                alert("Erreur : " + e.message);
                btn.disabled = false;
            }
        }

        window.onload = loadSeedData;
    </script>
</body>
</html>
