<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modifier Semence</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; padding-bottom: 120px; font-size: 16px; }
        header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { background: none; border: none; color: #fff; font-size: 30px; margin-right: 15px; cursor: pointer; }
        section { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
        h2 { font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #aaa; }
        input, select, textarea { width: 100%; padding: 15px; background: #000; border: 2px solid var(--border); border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .month-btn { padding: 10px 2px; background: #000; border: 1px solid var(--border); border-radius: 6px; color: #fff; text-align: center; font-size: 12px; cursor: pointer; min-height: 44px; display: flex; align-items: center; justify-content: center;}
        .month-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }
        .check-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .check-item input { width: 25px; height: 25px; }
        .save-btn { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--accent); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: bold; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <button id="cancel" class="back-btn">←</button>
        <h1>Modifier Fiche</h1>
    </header>

    <form id="editForm">
        <section>
            <h2>Identité</h2>
            <div class="form-group"><label>Nom commun</label><input type="text" id="nom_commun"></div>
            <div class="form-group"><label>Variété</label><input type="text" id="variete"></div>
            <div class="form-group"><label>Famille Botanique</label><input type="text" id="famille"></div>
            <div class="form-group"><label>Description</label><textarea id="description" rows="2"></textarea></div>
        </section>
        <section>
            <h2>Culture & Calendrier</h2>
            <div class="month-grid" id="semisMonths">
                <div class="month-btn">Jan</div><div class="month-btn">Fév</div><div class="month-btn">Mar</div><div class="month-btn">Avr</div>
                <div class="month-btn">Mai</div><div class="month-btn">Juin</div><div class="month-btn">Juil</div><div class="month-btn">Août</div>
                <div class="month-btn">Sep</div><div class="month-btn">Oct</div><div class="month-btn">Nov</div><div class="month-btn">Déc</div>
            </div>
            <div class="check-group" style="margin-top:20px">
                <label class="check-item"><input type="checkbox" class="soins-cb" value="Tuteur"> Tuteur</label>
                <label class="check-item"><input type="checkbox" class="soins-cb" value="Mildiou"> Mildiou</label>
                <label class="check-item"><input type="checkbox" class="soins-cb" value="Pincement"> Pincement</label>
            </div>
        </section>
        <button type="button" class="save-btn" id="btnUpdate" onclick="update()">ENREGISTRER</button>
    </form>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        let semences = [], sha = "";

        document.getElementById('cancel').onclick = () => window.location.href = `fiche-semence.html?id=${id}`;
        document.querySelectorAll('.month-btn').forEach(b => b.onclick = () => b.classList.toggle('active'));

        async function load() {
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json(); sha = data.sha;
            semences = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            const s = semences.find(i => i.id === id);
            if (s) {
                document.getElementById('nom_commun').value = s.identite.nom_commun;
                document.getElementById('variete').value = s.identite.variete;
                document.getElementById('famille').value = s.identite.famille || '';
                document.getElementById('description').value = s.identite.description || '';
                document.querySelectorAll('.month-btn').forEach(b => { if((s.culture?.periode_semis || []).includes(b.innerText)) b.classList.add('active'); });
                document.querySelectorAll('.soins-cb').forEach(cb => { if((s.particularites?.soins || []).includes(cb.value)) cb.checked = true; });
            }
        }

        async function update() {
            const btn = document.getElementById('btnUpdate'); btn.innerText = "⏳..."; btn.disabled = true;
            const idx = semences.findIndex(i => i.id === id);
            semences[idx].identite.nom_commun = document.getElementById('nom_commun').value;
            semences[idx].identite.variete = document.getElementById('variete').value;
            semences[idx].identite.famille = document.getElementById('famille').value;
            semences[idx].identite.description = document.getElementById('description').value;
            semences[idx].culture.periode_semis = Array.from(document.querySelectorAll('#semisMonths .active')).map(b => b.innerText);
            semences[idx].particularites.soins = Array.from(document.querySelectorAll('.soins-cb:checked')).map(cb => cb.value);

            try {
                const putRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Maj ${id}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(semences, null, 2)))), sha: sha })
                });
                if (putRes.ok) window.location.href = `fiche-semence.html?id=${id}`;
            } catch (e) { alert(e.message); btn.disabled = false; }
        }
        window.onload = load;
    </script>
</body>
</html>
