<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modifier la fiche - Potager 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/frugman/potager/main/favicon.png">
</head>
<body>
    <header>
        <a href="autres.html" class="nav-item"><span class="nav-icon">🗂️</span>Autres</a>
        <h1>Modifier la fiche</h1>
    </header>

    <div class="container">
        <form id="editForm">
            <div class="card">
                <div class="note-meta">1. Identité de la plante</div>
                
                <label>Nom commun</label>
                <input type="text" id="nom_commun" required placeholder="Ex: Tomate">

                <label>Variété</label>
                <input type="text" id="variete" required placeholder="Ex: Noire de Crimée">

                <div class="grid-2">
                    <div>
                        <label>Famille</label>
                        <input type="text" id="famille" placeholder="Solanacées">
                    </div>
                    <div>
                        <label>Provenance</label>
                        <input type="text" id="provenance" placeholder="Kokopelli">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="note-meta">2. Moteur Agenda (Délais en jours)</div>
                <p style="font-size: 11px; color: var(--text-secondary); margin-bottom: 15px;">
                    Modifiez ces valeurs pour ajuster les calculs automatiques de l'agenda.
                </p>
                
                <div class="grid-2">
                    <div>
                        <label>Levée</label>
                        <input type="number" id="d_levee">
                    </div>
                    <div>
                        <label>Repiquage</label>
                        <input type="number" id="d_repiquage">
                    </div>
                </div>
                <div class="grid-2">
                    <div>
                        <label>Plantation</label>
                        <input type="number" id="d_plantation">
                    </div>
                    <div>
                        <label>Maturité</label>
                        <input type="number" id="d_maturite">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="note-meta">3. Soins & Tâches spécifiques</div>
                
                <div id="tasks-container"></div>
                
                <button type="button" class="filter-btn" style="margin-top:10px; border-style: dashed;" onclick="addTask()">
                    ➕ AJOUTER UNE TÂCHE
                </button>
            </div>

            <button type="button" class="save-btn" id="btnSave" onclick="save()">
                METTRE À JOUR LA FICHE
            </button>
        </form>
    </div>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        let currentSha = "";

        async function load() {
            if(!token || !id) return;
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const data = await res.json();
                currentSha = data.sha;
                const seeds = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                const s = seeds.find(item => String(item.id) === String(id));

                if(s) {
                    document.getElementById('nom_commun').value = s.identite.nom_commun;
                    document.getElementById('variete').value = s.identite.variete;
                    document.getElementById('famille').value = s.identite.famille || "";
                    document.getElementById('provenance').value = s.identite.provenance || "";
                    document.getElementById('d_levee').value = s.delais.levee;
                    document.getElementById('d_repiquage').value = s.delais.repiquage;
                    document.getElementById('d_plantation').value = s.delais.plantation;
                    document.getElementById('d_maturite').value = s.delais.maturite;

                    if(s.taches_entretien) {
                        s.taches_entretien.forEach(t => addTask(t.label, t.delai, t.base));
                    }
                }
            } catch(e) { console.error(e); }
        }

        function addTask(label = "", delai = 0, base = "semis") {
            const container = document.getElementById('tasks-container');
            const div = document.createElement('div');
            // Utilisation du style 'item' pour les tâches
            div.style.padding = "15px";
            div.style.background = "rgba(255,255,255,0.02)";
            div.style.borderRadius = "12px";
            div.style.border = "1px solid var(--border-color)";
            div.style.marginBottom = "10px";
            div.style.position = "relative";
            
            div.innerHTML = `
                <div style="position:absolute; right:10px; top:10px; color:var(--danger-red); font-weight:bold; cursor:pointer;" onclick="this.parentElement.remove()">✕</div>
                <label>Libellé de la tâche</label>
                <input type="text" class="t-label" value="${label}" placeholder="Ex: Taille, Pincement...">
                
                <div class="grid-2">
                    <div>
                        <label>Délai (j)</label>
                        <input type="number" class="t-delai" value="${delai}">
                    </div>
                    <div>
                        <label>Référence</label>
                        <select class="t-base">
                            <option value="semis" ${base==='semis'?'selected':''}>Après semis</option>
                            <option value="plantation" ${base==='plantation'?'selected':''}>Après plant.</option>
                        </select>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        async function save() {
            const btn = document.getElementById('btnSave'); 
            btn.innerText = "⏳ SYNCHRONISATION..."; btn.disabled = true;

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const data = await res.json();
                let seeds = JSON.parse(decodeURIComponent(escape(atob(data.content))));

                const tasks = [];
                document.querySelectorAll('#tasks-container > div').forEach(el => {
                    const label = el.querySelector('.t-label').value;
                    if(label) {
                        tasks.push({
                            label: label,
                            delai: parseInt(el.querySelector('.t-delai').value) || 0,
                            base: el.querySelector('.t-base').value
                        });
                    }
                });

                const index = seeds.findIndex(s => String(s.id) === String(id));
                if(index !== -1) {
                    seeds[index].identite.nom_commun = document.getElementById('nom_commun').value;
                    seeds[index].identite.variete = document.getElementById('variete').value;
                    seeds[index].identite.famille = document.getElementById('famille').value;
                    seeds[index].identite.provenance = document.getElementById('provenance').value;
                    seeds[index].delais = {
                        levee: parseInt(document.getElementById('d_levee').value) || 0,
                        repiquage: parseInt(document.getElementById('d_repiquage').value) || 0,
                        plantation: parseInt(document.getElementById('d_plantation').value) || 0,
                        maturite: parseInt(document.getElementById('d_maturite').value) || 0
                    };
                    seeds[index].taches_entretien = tasks;
                }

                await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: `Update ${id}`, 
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(seeds, null, 2)))), 
                        sha: data.sha 
                    })
                });
                window.location.href = `fiche-semence.html?id=${id}`;
            } catch(e) { 
                alert("Erreur lors de la mise à jour"); 
                btn.innerText = "REESSAYER"; btn.disabled = false;
            }
        }
        window.onload = load;
    </script>
</body>
</html>
