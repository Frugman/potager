<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajouter une Semence</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; padding-bottom: 120px; font-size: 16px; }
        header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { background: none; border: none; color: #fff; font-size: 30px; margin-right: 15px; cursor: pointer; }
        section { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
        h2 { font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #aaa; }
        input, select, textarea { width: 100%; padding: 15px; background: #000; border: 2px solid var(--border); border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .month-btn { padding: 10px 2px; background: #000; border: 1px solid var(--border); border-radius: 6px; color: #fff; text-align: center; font-size: 12px; cursor: pointer; min-height: 44px; display: flex; align-items: center; justify-content: center;}
        .month-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }
        .check-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .check-item input { width: 25px; height: 25px; }
        .save-btn { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--accent); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: bold; z-index: 100; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header>
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <h1>Nouvelle Semence</h1>
    </header>

    <form id="seedForm">
        <section>
            <h2>1. Identité & Origine</h2>
            <div class="form-group"><label>Nom commun</label><input type="text" id="nom_commun" required></div>
            <div class="form-group"><label>Variété</label><input type="text" id="variete" required></div>
            <div class="form-group"><label>Famille Botanique</label><input type="text" id="famille"></div>
            <div class="form-group">
                <label>Provenance</label>
                <select id="provenance" onchange="document.getElementById('prov_autre').classList.toggle('hidden', this.value !== 'Autre')">
                    <option value="Kokopelli">Kokopelli</option>
                    <option value="Récolte personnelle">Récolte personnelle</option>
                    <option value="Autre">Ajout libre (préciser...)</option>
                </select>
                <input type="text" id="prov_autre" class="hidden" style="margin-top:10px" placeholder="Précisez la provenance">
            </div>
            <div class="row">
                <div class="form-group"><label>Durée germinative (ans)</label><input type="number" id="duree_germ"></div>
                <div class="form-group"><label>Cycle maturité (jours)</label><input type="number" id="cycle_mat"></div>
            </div>
            <div class="form-group"><label>Description</label><textarea id="description" rows="2"></textarea></div>
        </section>

        <section>
            <h2>2. Culture & Espacement</h2>
            <div class="form-group">
                <label>Style de semis</label>
                <select id="style_semis">
                    <option>Graine à graine</option><option>En poquet</option><option>En ligne</option><option>À la volée</option>
                </select>
            </div>
            <div class="row">
                <div class="form-group"><label>Profondeur</label><input type="text" id="profondeur"></div>
                <div class="form-group"><label>T° Levée</label><input type="text" id="temp_levee"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Dist. sur rang (cm)</label><input type="number" id="dist_rang"></div>
                <div class="form-group"><label>Dist. entre rangs (cm)</label><input type="number" id="dist_inter"></div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Exposition</label>
                    <select id="exposition"><option>Plein soleil</option><option>Mi-ombre</option><option>Ombre</option></select>
                </div>
                <div class="form-group">
                    <label>Besoins Eau</label>
                    <select id="eau"><option>Moyen</option><option>Faible</option><option>Fort</option></select>
                </div>
            </div>
        </section>

        <section>
            <h2>3. Calendrier & Soins</h2>
            <label>Mois de Semis</label>
            <div class="month-grid" id="semisMonths">
                <div class="month-btn" onclick="this.classList.toggle('active')">Jan</div><div class="month-btn" onclick="this.classList.toggle('active')">Fév</div>
                <div class="month-btn" onclick="this.classList.toggle('active')">Mar</div><div class="month-btn" onclick="this.classList.toggle('active')">Avr</div>
                <div class="month-btn" onclick="this.classList.toggle('active')">Mai</div><div class="month-btn" onclick="this.classList.toggle('active')">Juin</div>
                <div class="month-btn" onclick="this.classList.toggle('active')">Juil</div><div class="month-btn" onclick="this.classList.toggle('active')">Août</div>
                <div class="month-btn" onclick="this.classList.toggle('active')">Sep</div><div class="month-btn" onclick="this.classList.toggle('active')">Oct</div>
                <div class="month-btn" onclick="this.classList.toggle('active')">Nov</div><div class="month-btn" onclick="this.classList.toggle('active')">Déc</div>
            </div>
            <label style="margin-top:20px">Soins spécifiques</label>
            <div class="check-group">
                <label class="check-item"><input type="checkbox" class="soins-cb" value="Tuteur"> Tuteur</label>
                <label class="check-item"><input type="checkbox" class="soins-cb" value="Mildiou"> Mildiou</label>
                <label class="check-item"><input type="checkbox" class="soins-cb" value="Pincement"> Pincement</label>
            </div>
            <div class="form-group" style="margin-top:20px"><label>Cultures associées</label><input type="text" id="associes" placeholder="ex: Basilic, Souci"></div>
        </section>

        <button type="button" class="save-btn" id="btnSave" onclick="save()">ENREGISTRER LA FICHE</button>
    </form>

    <script>
        async function save() {
            const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
            if(!token) return;
            const btn = document.getElementById('btnSave');
            btn.innerText = "⏳ ENREGISTREMENT..."; btn.disabled = true;

            const newSeed = {
                id: "seed-" + Date.now(),
                identite: {
                    nom_commun: document.getElementById('nom_commun').value,
                    variete: document.getElementById('variete').value,
                    famille: document.getElementById('famille').value,
                    provenance: document.getElementById('provenance').value === 'Autre' ? document.getElementById('prov_autre').value : document.getElementById('provenance').value,
                    duree_germ: document.getElementById('duree_germ').value,
                    description: document.getElementById('description').value
                },
                culture: {
                    style_semis: document.getElementById('style_semis').value,
                    profondeur: document.getElementById('profondeur').value,
                    temp_levee: document.getElementById('temp_levee').value,
                    dist_rang: document.getElementById('dist_rang').value,
                    dist_inter: document.getElementById('dist_inter').value,
                    exposition: document.getElementById('exposition').value,
                    eau: document.getElementById('eau').value,
                    periode_semis: Array.from(document.querySelectorAll('#semisMonths .active')).map(b => b.innerText)
                },
                particularites: {
                    cycle_mat: document.getElementById('cycle_mat').value,
                    soins: Array.from(document.querySelectorAll('.soins-cb:checked')).map(cb => cb.value),
                    associes: document.getElementById('associes').value
                },
                recolte: { historique: { "2026": "-" } }
            };

            try {
                const url = `https://api.github.com/repos/${user}/${repo}/contents/semences.json`;
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                let semences = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                semences.push(newSeed);
                const putRes = await fetch(url, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Ajout ${newSeed.identite.variete}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(semences, null, 2)))), sha: data.sha })
                });
                if (putRes.ok) window.location.href = 'index.html';
            } catch (e) { alert(e.message); btn.disabled = false; }
        }
    </script>
</body>
</html>
