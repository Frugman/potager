<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nouvelle Semence - Calculateur</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; padding-bottom: 120px; font-size: 16px; }
        header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { background: none; border: none; color: #fff; font-size: 30px; margin-right: 15px; cursor: pointer; }
        section { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
        h2 { font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #aaa; }
        input, select, textarea { width: 100%; padding: 15px; background: #000; border: 2px solid var(--border); border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .save-btn { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--accent); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: bold; z-index: 100; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <header>
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <h1>Paramétrage Semence</h1>
    </header>

    <form id="seedForm">
        <section>
            <h2>1. Identité</h2>
            <div class="form-group"><label>Nom commun</label><input type="text" id="nom_commun" required></div>
            <div class="form-group"><label>Variété</label><input type="text" id="variete" required></div>
            <div class="form-group"><label>Famille Botanique</label><input type="text" id="famille"></div>
        </section>

        <section>
            <h2>2. Délais de Culture (en jours)</h2>
            <p style="font-size:12px; color:#888; margin-bottom:15px;">Ces délais servent à calculer ton agenda automatiquement.</p>
            <div class="row">
                <div class="form-group"><label>Semis → Levée</label><input type="number" id="d_levee" placeholder="ex: 7"></div>
                <div class="form-group"><label>Levée → Repiquage</label><input type="number" id="d_repiquage" placeholder="ex: 21"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Repiquage → Plant.</label><input type="number" id="d_plantation" placeholder="ex: 14"></div>
                <div class="form-group"><label>Plant. → Récolte</label><input type="number" id="d_maturite" placeholder="ex: 60"></div>
            </div>
        </section>

        <section>
            <h2>3. Paramètres Statiques</h2>
            <div class="row">
                <div class="form-group">
                    <label>Exposition</label>
                    <select id="exposition"><option>Plein soleil</option><option>Mi-ombre</option><option>Ombre</option></select>
                </div>
                <div class="form-group">
                    <label>Besoins Eau</label>
                    <select id="eau"><option>Moyen</option><option>Faible</option><option>Fort</option></select>
                </div>
            </div>
            <div class="form-group"><label>Description / Notes</label><textarea id="description" rows="2"></textarea></div>
        </section>

        <button type="button" class="save-btn" id="btnSave" onclick="save()">CRÉER LA FICHE</button>
    </form>

    <script>
        async function save() {
            const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
            if(!token) return;
            const btn = document.getElementById('btnSave');
            btn.innerText = "⏳ ENREGISTREMENT..."; btn.disabled = true;

            const newSeed = {
                id: "seed-" + Date.now(),
                identite: {
                    nom_commun: document.getElementById('nom_commun').value,
                    variete: document.getElementById('variete').value,
                    famille: document.getElementById('famille').value,
                    description: document.getElementById('description').value
                },
                delais: {
                    levee: parseInt(document.getElementById('d_levee').value) || 0,
                    repiquage: parseInt(document.getElementById('d_repiquage').value) || 0,
                    plantation: parseInt(document.getElementById('d_plantation').value) || 0,
                    maturite: parseInt(document.getElementById('d_maturite').value) || 0
                },
                culture: {
                    exposition: document.getElementById('exposition').value,
                    eau: document.getElementById('eau').value
                }
            };

            try {
                const url = `https://api.github.com/repos/${user}/${repo}/contents/semences.json`;
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                let semences = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                semences.push(newSeed);
                await fetch(url, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Fiche ${newSeed.identite.variete}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(semences, null, 2)))), sha: data.sha })
                });
                window.location.href = 'index.html';
            } catch (e) { alert(e.message); btn.disabled = false; }
        }
    </script>
</body>
</html>
