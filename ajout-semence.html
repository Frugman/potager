<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajouter / Modifier - Potager 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/frugman/potager/main/favicon.png">
</head>
<body>

    <header>
        <a href="repertoire.html" class="back-btn">←</a>
        <h1 id="form-title">Nouvelle Semence</h1>
    </header>

    <div class="container">
        <div class="card">
            <div class="note-meta">1. Identité de la plante</div>
            
            <label>Plante (Nom commun)</label>
            <input type="text" id="nom_commun" placeholder="Ex: Bourrache, Tomate...">

            <label>Variété</label>
            <input type="text" id="variete" placeholder="Ex: À fleurs bleues">

            <div class="grid-2">
                <div>
                    <label>Provenance</label>
                    <input type="text" id="provenance" placeholder="Kokopelli...">
                </div>
                <div>
                    <label>Type / Rôle</label>
                    <input type="text" id="role" placeholder="Grimpante...">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="note-meta">2. Conseils de culture</div>
            
            <label>Exposition</label>
            <select id="exposition">
                <option value="Soleil">☀️ Plein Soleil</option>
                <option value="Mi-ombre">⛅ Mi-ombre</option>
                <option value="Ombre">☁️ Ombre</option>
            </select>

            <label>Besoin en eau</label>
            <select id="eau">
                <option value="Normal">💧 Normal</option>
                <option value="Faible">🌵 Faible</option>
                <option value="Important">💧💧 Élevé</option>
            </select>

            <label>Distance entre plants (cm)</label>
            <input type="number" id="distance" placeholder="Ex: 30">
        </div>

        <div class="card">
            <div class="note-meta">3. Délais de croissance (jours)</div>
            <p style="font-size: 11px; color: var(--text-secondary); margin-bottom: 15px;">
                Ces valeurs calculent automatiquement vos tâches dans l'agenda.
            </p>
            
            <div class="grid-2">
                <div>
                    <label>Levée</label>
                    <input type="number" id="levee" placeholder="Jours">
                </div>
                <div>
                    <label>Repiquage</label>
                    <input type="number" id="repiquage" placeholder="Jours">
                </div>
            </div>
            <div class="grid-2">
                <div>
                    <label>Plantation</label>
                    <input type="number" id="plantation" placeholder="Jours">
                </div>
                <div>
                    <label>Maturité</label>
                    <input type="number" id="maturite" placeholder="Jours">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="note-meta">4. Observations & Notes</div>
            <label>Notes spécifiques</label>
            <textarea id="notes" rows="4" placeholder="Conseils particuliers pour cette variété..."></textarea>
        </div>

        <button class="save-btn" id="btnSave" onclick="handleSave()">ENREGISTRER LA FICHE</button>
        <div id="status-msg" style="text-align: center; margin-top: 15px; font-weight: bold;"></div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item active-nav"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="autres.html" class="nav-item"><span class="nav-icon">🗂️</span>Autres</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');

        const params = new URLSearchParams(window.location.search);
        const editId = params.get('edit');
        let currentSha = null;
        let allSemences = [];

        async function init() {
            if (!token) { window.location.href = 'parametres.html'; return; }

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                currentSha = data.sha;
                allSemences = JSON.parse(decodeURIComponent(escape(atob(data.content))));

                if (editId) {
                    document.getElementById('form-title').innerText = "Modifier la fiche";
                    loadSeedToEdit(editId);
                }
            } catch (e) {
                console.error(e);
                document.getElementById('status-msg').innerText = "❌ Erreur de connexion au dépôt.";
            }
        }

        function loadSeedToEdit(id) {
            const seed = allSemences.find(s => String(s.id) === String(id));
            if (seed) {
                document.getElementById('nom_commun').value = seed.identite.nom_commun || "";
                document.getElementById('variete').value = seed.identite.variete || "";
                document.getElementById('provenance').value = seed.identite.provenance || "";
                document.getElementById('role').value = seed.identite.role || "";
                
                document.getElementById('exposition').value = seed.technique?.exposition || "Soleil";
                document.getElementById('eau').value = seed.technique?.eau || "Normal";
                document.getElementById('distance').value = seed.technique?.distance || "";

                document.getElementById('levee').value = seed.delais?.levee || "";
                document.getElementById('repiquage').value = seed.delais?.repiquage || "";
                document.getElementById('plantation').value = seed.delais?.plantation || "";
                document.getElementById('maturite').value = seed.delais?.maturite || "";
                
                document.getElementById('notes').value = seed.notes || "";
            }
        }

        function generateSlug(nom, variete) {
            let str = (nom + " " + variete).toLowerCase();
            str = str.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
            str = str.replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, ""); 
            let baseId = str || "semence-inconnue";
            let counter = 1;
            while(allSemences.some(s => String(s.id) === baseId)) {
                baseId = `${str}-${counter}`;
                counter++;
            }
            return baseId;
        }

        async function handleSave() {
            const btn = document.getElementById('btnSave');
            const status = document.getElementById('status-msg');
            
            const nomVal = document.getElementById('nom_commun').value.trim();
            const varVal = document.getElementById('variete').value.trim();

            if (!nomVal) {
                status.innerText = "⚠️ Le nom de la plante est requis.";
                return;
            }

            const newSeed = {
                id: editId ? editId : generateSlug(nomVal, varVal),
                identite: {
                    nom_commun: nomVal,
                    variete: varVal,
                    provenance: document.getElementById('provenance').value,
                    role: document.getElementById('role').value.trim()
                },
                technique: {
                    exposition: document.getElementById('exposition').value,
                    eau: document.getElementById('eau').value,
                    distance: parseInt(document.getElementById('distance').value) || 0
                },
                delais: {
                    levee: parseInt(document.getElementById('levee').value) || 0,
                    repiquage: parseInt(document.getElementById('repiquage').value) || 0,
                    plantation: parseInt(document.getElementById('plantation').value) || 0,
                    maturite: parseInt(document.getElementById('maturite').value) || 0
                },
                notes: document.getElementById('notes').value
            };

            btn.disabled = true;
            btn.innerText = "⏳ SYNCHRONISATION...";

            if (editId) {
                const index = allSemences.findIndex(s => String(s.id) === String(editId));
                if (index !== -1) allSemences[index] = newSeed;
            } else {
                allSemences.push(newSeed);
            }

            try {
                const contentJSON = JSON.stringify(allSemences, null, 2);
                const contentBase64 = btoa(unescape(encodeURIComponent(contentJSON)));

                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: editId ? `Maj semence : ${newSeed.identite.nom_commun}` : `Ajout semence : ${newSeed.identite.nom_commun}`,
                        content: contentBase64,
                        sha: currentSha
                    })
                });

                if (res.ok) {
                    status.style.color = "var(--accent-green)";
                    status.innerHTML = "✅ Enregistré avec succès !";
                    setTimeout(() => { 
                        window.location.href = 'repertoire.html'; 
                    }, 800);
                } else {
                    throw new Error("Erreur GitHub API");
                }
            } catch (e) {
                btn.disabled = false;
                btn.innerText = "RÉESSAYER";
                status.style.color = "var(--danger-red)";
                status.innerText = "❌ Erreur : " + e.message;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
