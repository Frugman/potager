<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajouter / Modifier - Potager 2026</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; padding-bottom: 40px; }
        
        header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { text-decoration: none; font-size: 24px; margin-right: 15px; color: var(--text); }
        h1 { font-size: 20px; margin: 0; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: bold; }
        
        input, select, textarea { 
            width: 100%; padding: 15px; background: var(--card-bg); color: #fff; 
            border: 1px solid var(--border); border-radius: 12px; font-size: 16px; 
            box-sizing: border-box; outline: none;
        }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .save-btn { 
            width: 100%; padding: 20px; background: var(--accent); color: #fff; 
            border: none; border-radius: 15px; font-weight: bold; font-size: 18px; 
            cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .save-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        #status-msg { text-align: center; margin-top: 15px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <header>
        <a href="repertoire.html" class="back-btn">←</a>
        <h1 id="form-title">Nouvelle Semence</h1>
    </header>

    <div class="form-container">
        <div class="form-group">
            <label>Plante (Nom commun)</label>
            <input type="text" id="nom_commun" placeholder="Ex: Bourrache, Tomate...">
        </div>

        <div class="form-group">
            <label>Variété</label>
            <input type="text" id="variete" placeholder="Ex: À fleurs bleues">
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>Provenance</label>
                <input type="text" id="provenance" placeholder="Kokopelli...">
            </div>
            <div class="form-group">
                <label>Type / Rôle</label>
                <input type="text" id="role" placeholder="Grimpante...">
            </div>
        </div>

        <label>Infos Techniques</label>
        <div class="grid-3" style="margin-bottom: 20px;">
            <select id="exposition">
                <option value="Soleil">☀️ Soleil</option>
                <option value="Mi-ombre">⛅ Mi-ombre</option>
                <option value="Ombre">☁️ Ombre</option>
            </select>
            <select id="eau">
                <option value="Normal">💧 Normal</option>
                <option value="Faible">💧 Faible</option>
                <option value="Important">💧💧💧 Élevé</option>
            </select>
            <input type="number" id="distance" placeholder="Dist. (cm)">
        </div>

        <label>Délais de croissance (jours)</label>
        <div class="grid-3" style="grid-template-columns: 1fr 1fr 1fr 1fr; margin-bottom: 20px;">
            <div class="form-group">
                <input type="number" id="levee" placeholder="Levée">
            </div>
            <div class="form-group">
                <input type="number" id="repiquage" placeholder="Repiq.">
            </div>
            <div class="form-group">
                <input type="number" id="plantation" placeholder="Plant.">
            </div>
            <div class="form-group">
                <input type="number" id="maturite" placeholder="Matur.">
            </div>
        </div>

        <div class="form-group">
            <label>Notes Culture & Entretien</label>
            <textarea id="notes" rows="4" placeholder="Conseils spécifiques..."></textarea>
        </div>

        <button class="save-btn" id="btnSave" onclick="handleSave()">ENREGISTRER</button>
        <div id="status-msg"></div>
    </div>

    <script>
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');

        const params = new URLSearchParams(window.location.search);
        const editId = params.get('edit');
        let currentSha = null;
        let allSemences = [];

        async function init() {
            if (!token) { window.location.href = 'parametres.html'; return; }

            try {
                // Forcer le no-cache pour être sûr d'avoir le dernier JSON avant modif
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                currentSha = data.sha;
                allSemences = JSON.parse(decodeURIComponent(escape(atob(data.content))));

                if (editId) {
                    document.getElementById('form-title').innerText = "Modifier la fiche";
                    loadSeedToEdit(editId);
                }
            } catch (e) {
                console.error(e);
                document.getElementById('status-msg').innerText = "Erreur de chargement des données.";
            }
        }

        function loadSeedToEdit(id) {
            const seed = allSemences.find(s => String(s.id) === String(id));
            if (seed) {
                document.getElementById('nom_commun').value = seed.identite.nom_commun || "";
                document.getElementById('variete').value = seed.identite.variete || "";
                document.getElementById('provenance').value = seed.identite.provenance || "";
                document.getElementById('role').value = seed.identite.role || "";
                
                // Champs techniques
                document.getElementById('exposition').value = seed.technique?.exposition || "Soleil";
                document.getElementById('eau').value = seed.technique?.eau || "Normal";
                document.getElementById('distance').value = seed.technique?.distance || "";

                // Délais
                document.getElementById('levee').value = seed.delais?.levee || "";
                document.getElementById('repiquage').value = seed.delais?.repiquage || "";
                document.getElementById('plantation').value = seed.delais?.plantation || "";
                document.getElementById('maturite').value = seed.delais?.maturite || "";
                
                document.getElementById('notes').value = seed.notes || "";
            }
        }

        async function handleSave() {
            const btn = document.getElementById('btnSave');
            const status = document.getElementById('status-msg');
            
            const newSeed = {
                id: editId ? parseInt(editId) : Date.now(),
                identite: {
                    nom_commun: document.getElementById('nom_commun').value,
                    variete: document.getElementById('variete').value,
                    provenance: document.getElementById('provenance').value,
                    role: document.getElementById('role').value.trim()
                },
                technique: {
                    exposition: document.getElementById('exposition').value,
                    eau: document.getElementById('eau').value,
                    distance: parseInt(document.getElementById('distance').value) || 0
                },
                delais: {
                    levee: parseInt(document.getElementById('levee').value) || 0,
                    repiquage: parseInt(document.getElementById('repiquage').value) || 0,
                    plantation: parseInt(document.getElementById('plantation').value) || 0,
                    maturite: parseInt(document.getElementById('maturite').value) || 0
                },
                notes: document.getElementById('notes').value
            };

            btn.disabled = true;
            btn.innerText = "Synchronisation...";

            if (editId) {
                const index = allSemences.findIndex(s => String(s.id) === String(editId));
                if (index !== -1) allSemences[index] = newSeed;
            } else {
                allSemences.push(newSeed);
            }

            try {
                // Encodage robuste avec gestion des accents (UTF-8)
                const contentJSON = JSON.stringify(allSemences, null, 2);
                const contentBase64 = btoa(unescape(encodeURIComponent(contentJSON)));

                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: editId ? `Maj semence : ${newSeed.identite.nom_commun}` : `Ajout semence : ${newSeed.identite.nom_commun}`,
                        content: contentBase64,
                        sha: currentSha
                    })
                });

                if (res.ok) {
                    status.innerHTML = "✅ Enregistré avec succès !";
                    setTimeout(() => { 
                        window.location.href = editId ? `fiche-semence.html?id=${editId}` : 'repertoire.html'; 
                    }, 800);
                } else {
                    throw new Error("Erreur GitHub API");
                }
            } catch (e) {
                btn.disabled = false;
                btn.innerText = "RÉESSAYER";
                status.innerText = "❌ Erreur : " + e.message;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
