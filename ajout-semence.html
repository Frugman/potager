<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ajouter une Semence</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #4CAF50;
            --border: #444;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 120px;
        }

        header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 30px;
            cursor: pointer;
            margin-right: 15px;
            padding: 0;
        }

        h1 { font-size: 22px; margin: 0; }

        section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        h2 { font-size: 18px; color: var(--accent); margin-top: 0; margin-bottom: 20px; text-transform: uppercase; }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 16px; color: #ffffff; }

        input, select {
            width: 100%;
            padding: 16px;
            background: #000;
            border: 2px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .month-btn {
            padding: 12px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
        }

        .month-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: bold;
        }

        .save-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 22px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            z-index: 100;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <h1>Nouvelle Semence</h1>
    </header>

    <form id="seedForm">
        <section>
            <h2>1. Identité</h2>
            <div class="form-group">
                <label>Nom commun (ex: Tomate)</label>
                <input type="text" id="nom_commun" required>
            </div>
            <div class="form-group">
                <label>Variété</label>
                <input type="text" id="variete" required>
            </div>
            <div class="form-group">
                <label>Provenance</label>
                <select id="provenance" onchange="toggleAutre(this)">
                    <option value="Kokopelli">Kokopelli</option>
                    <option value="Récolte personnelle">Récolte personnelle</option>
                    <option value="Autre">Ajout libre (préciser...)</option>
                </select>
                <input type="text" id="provenance_autre" class="hidden" style="margin-top:10px" placeholder="Ex: Don d'Anna">
            </div>
        </section>

        <section>
            <h2>2. Période de semis</h2>
            <div class="month-grid" id="semisMonths">
                <div class="month-btn" onclick="toggleMonth(this)">Jan</div>
                <div class="month-btn" onclick="toggleMonth(this)">Fév</div>
                <div class="month-btn" onclick="toggleMonth(this)">Mar</div>
                <div class="month-btn" onclick="toggleMonth(this)">Avr</div>
                <div class="month-btn" onclick="toggleMonth(this)">Mai</div>
                <div class="month-btn" onclick="toggleMonth(this)">Juin</div>
                <div class="month-btn" onclick="toggleMonth(this)">Juil</div>
                <div class="month-btn" onclick="toggleMonth(this)">Août</div>
                <div class="month-btn" onclick="toggleMonth(this)">Sep</div>
                <div class="month-btn" onclick="toggleMonth(this)">Oct</div>
                <div class="month-btn" onclick="toggleMonth(this)">Nov</div>
                <div class="month-btn" onclick="toggleMonth(this)">Déc</div>
            </div>
        </section>

        <button type="button" class="save-btn" id="submitBtn" onclick="saveNewSeed()">ENREGISTRER SUR GITHUB</button>
    </form>

    <script>
        function toggleMonth(btn) { btn.classList.toggle('active'); }
        function toggleAutre(select) {
            document.getElementById('provenance_autre').className = (select.value === 'Autre') ? '' : 'hidden';
        }

        async function saveNewSeed() {
            const btn = document.getElementById('submitBtn');
            const token = localStorage.getItem('gh_token');
            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');

            if(!token || !user || !repo) {
                alert("⚠️ Erreur : Identifiants absents. Va dans la page Paramètres !");
                return;
            }

            btn.innerText = "⏳ ENREGISTREMENT...";
            btn.disabled = true;

            const selectedMonths = Array.from(document.querySelectorAll('#semisMonths .month-btn.active')).map(b => b.innerText);
            
            const newSeed = {
                id: "seed-" + Date.now(),
                identite: {
                    nom_commun: document.getElementById('nom_commun').value,
                    variete: document.getElementById('variete').value,
                    provenance: document.getElementById('provenance').value === 'Autre' ? document.getElementById('provenance_autre').value : document.getElementById('provenance').value
                },
                culture: {
                    periode_semis: selectedMonths
                }
            };

            const path = "semences.json";
            const url = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;

            try {
                // 1. Lire le fichier actuel
                const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!getRes.ok) throw new Error("Fichier semences.json introuvable sur GitHub.");
                
                const fileData = await getRes.json();
                const sha = fileData.sha;
                const currentData = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

                // 2. Ajouter la nouvelle donnée
                currentData.push(newSeed);

                // 3. Renvoyer vers GitHub
                const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
                
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Ajout de ${newSeed.identite.variete}`,
                        content: updatedContent,
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    alert("✅ Enregistré avec succès !");
                    window.location.href = 'index.html';
                } else {
                    throw new Error("Erreur GitHub lors de l'écriture.");
                }
            } catch (e) {
                alert("❌ Erreur : " + e.message);
                btn.innerText = "ENREGISTRER SUR GITHUB";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
