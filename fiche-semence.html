<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Détail Semence - Potager 2026</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 110px; }
        
        /* Header avec bouton retour */
        header { display: flex; align-items: center; padding: 20px; background: #000; border-bottom: 1px solid var(--border); }
        .back-btn { text-decoration: none; font-size: 24px; margin-right: 15px; color: var(--text); }
        header h1 { margin: 0; font-size: 20px; flex: 1; }

        .container { padding: 20px; }
        
        /* Fiche Look */
        .info-card { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .info-group { margin-bottom: 15px; }
        .info-label { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }
        .info-value { font-size: 18px; color: #fff; }
        .info-sub { font-size: 14px; color: #aaa; font-style: italic; }

        /* Grid pour les délais */
        .delais-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .delai-item { background: #111; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .delai-days { display: block; font-size: 20px; font-weight: bold; color: var(--accent); }
        .delai-label { font-size: 10px; color: #888; text-transform: uppercase; }

        /* Navigation Basse */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #111; border-top: 2px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #fff; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .nav-icon { font-size: 26px; }
        .active-nav { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <a href="repertoire.html" class="back-btn">←</a>
        <h1 id="page-title">Chargement...</h1>
    </header>

    <div class="container" id="main-content">
        <div class="info-card">
            <div class="info-group">
                <span class="info-label">Variété</span>
                <div class="info-value" id="view-variete">-</div>
            </div>
            <div id="role-container" class="info-group">
                <span class="info-label">Rôle / Type</span>
                <div class="info-value" id="view-role">-</div>
            </div>
            <div class="info-group">
                <span class="info-label">Provenance</span>
                <div class="info-value" id="view-provenance">-</div>
            </div>
        </div>

        <h2 style="font-size: 14px; color: var(--accent); text-transform: uppercase;">⏱️ Délais (Jours)</h2>
        <div class="delais-grid">
            <div class="delai-item"><span class="delai-days" id="d-levee">-</span><span class="delai-label">Levée</span></div>
            <div class="delai-item"><span class="delai-days" id="d-repiquage">-</span><span class="delai-label">Repiquage</span></div>
            <div class="delai-item"><span class="delai-days" id="d-plantation">-</span><span class="delai-label">Plantation</span></div>
            <div class="delai-item"><span class="delai-days" id="d-maturite">-</span><span class="delai-label">Maturité</span></div>
        </div>

        <div class="info-card" style="margin-top:20px;">
            <span class="info-label">Description / Notes</span>
            <div id="view-notes" style="font-size: 14px; line-height: 1.5; color: #ccc; margin-top:10px;">-</div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item active-nav"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');

        // Récupérer l'ID dans l'URL (?id=...)
        const params = new URLSearchParams(window.location.search);
        const seedId = params.get('id');

        async function loadSeedDetails() {
            if(!token || !seedId) { window.location.href = 'repertoire.html'; return; }

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const data = await res.json();
                const seeds = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                
                // Trouver la bonne semence
                const seed = seeds.find(s => String(s.id) === String(seedId));

                if(seed) {
                    // Remplissage des champs
                    document.getElementById('page-title').innerText = seed.identite.nom_commun;
                    document.getElementById('view-variete').innerText = seed.identite.variete || 'N/C';
                    document.getElementById('view-provenance').innerText = seed.identite.provenance || 'N/C';
                    document.getElementById('view-notes').innerText = seed.notes || 'Aucune note particulière.';

                    // Gestion du rôle (caché si vide comme demandé)
                    if(seed.identite.role && seed.identite.role.trim() !== "") {
                        document.getElementById('view-role').innerText = seed.identite.role;
                    } else {
                        document.getElementById('role-container').style.display = 'none';
                    }

                    // Délais
                    document.getElementById('d-levee').innerText = seed.delais.levee || 0;
                    document.getElementById('d-repiquage').innerText = seed.delais.repiquage || 0;
                    document.getElementById('d-plantation').innerText = seed.delais.plantation || 0;
                    document.getElementById('d-maturite').innerText = seed.delais.maturite || 0;

                } else {
                    document.getElementById('main-content').innerHTML = "<p style='text-align:center;'>Semence introuvable.</p>";
                }

            } catch(e) {
                console.error(e);
                alert("Erreur lors du chargement des données.");
            }
        }

        window.onload = loadSeedDetails;
    </script>
</body>
</html>
