<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Détails Semence - Potager 2026</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; padding-bottom: 110px; font-size: 16px; }
        
        header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { background: none; border: none; color: #fff; font-size: 35px; margin-right: 15px; cursor: pointer; min-width: 44px; }
        h1 { font-size: 20px; margin: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        #editBtn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; min-height: 44px; }
        
        section { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }
        h2 { font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 15px; }
        .label { color: #888; }
        .value { color: #fff; text-align: right; font-weight: bold; }
        
        /* Bilan Récolte */
        .total-harvest { background: linear-gradient(135deg, #1a1a1a 0%, #0a2e0a 100%); border: 1px solid var(--accent); text-align: center; padding: 15px; border-radius: 16px; margin-bottom: 20px; }
        .total-val { font-size: 32px; font-weight: 900; color: var(--accent); display: block; }
        .total-label { font-size: 12px; color: #aaa; text-transform: uppercase; }

        /* Tâches entretien */
        .task-row { background: #000; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #222; }
        .task-text { font-size: 13px; color: #ccc; }
        .task-meta { font-size: 11px; color: var(--accent); font-weight: bold; display: block; margin-top: 3px; }

        /* Historique */
        .hist-card { background: #080808; border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #222; }
        .hist-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; color: var(--accent); font-weight: bold; }
        .hist-note { font-size: 13px; color: #aaa; font-style: italic; line-height: 1.4; white-space: pre-wrap; }
        .hist-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 8px; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: #111; border-top: 2px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #fff; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .nav-icon { font-size: 26px; }
        .active-nav { color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <button class="back-btn" onclick="window.location.href='repertoire.html'">←</button>
        <h1 id="seedTitle">Chargement...</h1>
        <button id="editBtn" class="hidden">MODIFIER</button>
    </header>

    <div id="content">
        <p style="text-align:center; padding:50px; color:#666;">Initialisation des données...</p>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item active-nav"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        // RÉCUPÉRATION DE L'ID IMMÉDIATE
        const params = new URLSearchParams(window.location.search);
        const seedId = params.get('id');
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');

        async function load() {
            // Sécurité 1 : ID manquant
            if (!seedId) {
                document.getElementById('content').innerHTML = `<p style="text-align:center; color:red; padding:20px;">⚠️ Erreur : Aucune semence sélectionnée.<br><br><a href="repertoire.html" style="color:white;">Retour au répertoire</a></p>`;
                return;
            }

            // Sécurité 2 : Pas de connexion
            if (!token) {
                window.location.href = 'parametres.html';
                return;
            }

            try {
                // Charger semences
                const resS = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { 
                    headers: { 'Authorization': `Bearer ${token}` },
                    cache: 'no-store' 
                });
                const seeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                const s = seeds.find(item => item.id === seedId);

                // Charger journal
                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { 
                    headers: { 'Authorization': `Bearer ${token}` },
                    cache: 'no-store'
                });
                const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));

                if (s) {
                    render(s, journal);
                } else {
                    document.getElementById('content').innerHTML = `<p style="text-align:center; color:#888; padding:20px;">Semence introuvable (ID: ${seedId}).</p>`;
                }
            } catch (e) {
                console.error(e);
                document.getElementById('content').innerHTML = `<p style="text-align:center; color:red; padding:20px;">Erreur de connexion GitHub.</p>`;
            }
        }

        function render(s, journal) {
            document.getElementById('seedTitle').innerText = s.identite.nom_commun;
            const editBtn = document.getElementById('editBtn');
            editBtn.classList.remove('hidden');
            editBtn.onclick = () => window.location.href = `modifier-semence.html?id=${s.id}`;

            const history = journal.filter(n => n.seedId === s.id).reverse();
            const total2026 = history
                .filter(n => n.action === 'Récolte' && n.date.startsWith('2026'))
                .reduce((sum, n) => sum + (parseInt(n.quantite) || 0), 0);

            let html = `
                <div class="total-harvest">
                    <span class="total-label">Bilan Récolte 2026</span>
                    <span class="total-val">${total2026}</span>
                    <span style="font-size:10px; color:var(--accent); opacity:0.7;">Unités récoltées</span>
                </div>

                <section>
                    <h2>Culture & Conseils</h2>
                    <div class="info-row"><span class="label">Variété</span><span class="value">${s.identite.variete}</span></div>
                    <div class="info-row"><span class="label">Exposition</span><span class="value">${s.culture?.exposition || '-'}</span></div>
                    <div class="info-row"><span class="label">Profondeur</span><span class="value">${s.culture?.profondeur || '-'}</span></div>
                    
                    ${s.taches_entretien && s.taches_entretien.length > 0 ? `
                        <div style="margin-top:15px; font-size:11px; color:#555; text-transform:uppercase;">🛠️ Entretien spécifique</div>
                        ${s.taches_entretien.map(te => `
                            <div class="task-row">
                                <div class="task-text">${te.label} <span class="task-meta">J+${te.delai} (${te.base})</span></div>
                            </div>
                        `).join('')}
                    ` : ''}
                </section>

                <section>
                    <h2>📜 Historique & Notes</h2>
                    ${history.length === 0 ? '<p style="font-size:13px; color:#555; text-align:center;">Aucune activité.</p>' : ''}
                    ${history.map(n => `
                        <div class="hist-card">
                            <div class="hist-header"><span>${n.action.toUpperCase()}</span><span>${n.date}</span></div>
                            ${n.quantite ? `<b style="display:block; margin-bottom:5px; color:#fff;">+ ${n.quantite}</b>` : ''}
                            ${n.note ? `<div class="hist-note">"${n.note}"</div>` : ''}
                            ${n.photo ? `<img src="${n.photo}" class="hist-img">` : ''}
                        </div>
                    `).join('')}
                </section>
            `;
            document.getElementById('content').innerHTML = html;
        }

        window.onload = load;
    </script>
</body>
</html>
