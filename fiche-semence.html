<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Détail Semence - Potager 2026</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #333; --edit: #FFC107; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 110px; }
        header { display: flex; align-items: center; padding: 20px; background: #000; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:10; }
        .back-btn { text-decoration: none; font-size: 24px; margin-right: 15px; color: var(--text); }
        header h1 { margin: 0; font-size: 18px; flex: 1; }
        .edit-btn { text-decoration: none; background: rgba(255, 193, 7, 0.15); color: var(--edit); padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; border: 1px solid var(--edit); }
        .container { padding: 15px; }
        .info-card { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .info-label { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }
        .info-value { font-size: 17px; color: #fff; }
        .tech-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .tech-item { background: var(--card-bg); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .tech-icon { font-size: 20px; display: block; margin-bottom: 5px; }
        .tech-val { font-size: 12px; font-weight: bold; color: #ccc; }
        
        /* Styles Récoltes */
        .recolte-year { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #222; }
        .year-label { color: var(--accent); font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; }
        .stat-row { display: flex; justify-content: space-between; font-size: 15px; padding: 4px 0; border-bottom: 1px solid #222; }
        .stat-row:last-child { border-bottom: none; }

        .history-section h2 { font-size: 14px; color: var(--accent); text-transform: uppercase; margin: 25px 0 15px; letter-spacing: 1px; }
        .journal-card { background: #111; border-left: 4px solid var(--accent); border-radius: 8px; padding: 15px; margin-bottom: 12px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #111; border-top: 2px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #fff; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .active-nav { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <a href="repertoire.html" class="back-btn">←</a>
        <h1 id="page-title">Chargement...</h1>
        <a href="#" id="link-edit" class="edit-btn">MODIFIER</a>
    </header>

    <div class="container">
        <div class="info-card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="info-group"><span class="info-label">Variété</span><div class="info-value" id="view-variete">N/C</div></div>
                <div class="info-group"><span class="info-label">Famille</span><div class="info-value" id="view-famille">N/C</div></div>
            </div>
            <div class="info-group"><span class="info-label">Description</span><div class="info-value" id="view-desc" style="font-size: 14px; color: #ccc;">-</div></div>
        </div>

        <div class="tech-grid">
            <div class="tech-item"><span class="tech-icon">☀️</span><span class="tech-val" id="view-soleil">-</span></div>
            <div class="tech-item"><span class="tech-icon">💧</span><span class="tech-val" id="view-eau">-</span></div>
            <div class="tech-item"><span class="tech-icon">📏</span><span class="tech-val" id="view-dist">-</span></div>
        </div>

        <div class="history-section">
            <h2>🧺 BILAN DES RÉCOLTES</h2>
            <div id="stats-recoltes">Aucune récolte enregistrée.</div>
        </div>

        <div class="history-section">
            <h2>📜 DERNIÈRES NOTES & PHOTOS</h2>
            <div id="journal-history">Chargement...</div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item active-nav"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        const params = new URLSearchParams(window.location.search);
        const seedId = params.get('id');

        async function init() {
            if(!token || !seedId) return;
            document.getElementById('link-edit').href = `ajout-semence.html?edit=${seedId}`;

            try {
                // 1. Infos Semence
                const resS = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const seeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                const seed = seeds.find(s => String(s.id) === String(seedId));

                if(seed) {
                    document.getElementById('page-title').innerText = seed.identite.nom_commun;
                    document.getElementById('view-variete').innerText = seed.identite.variete || 'N/C';
                    document.getElementById('view-famille').innerText = seed.identite.famille || 'N/C';
                    document.getElementById('view-desc').innerText = seed.identite.description || '-';
                    document.getElementById('view-soleil').innerText = seed.culture?.exposition || "N/C";
                    document.getElementById('view-eau').innerText = seed.culture?.eau || "N/C";
                    document.getElementById('view-dist').innerText = seed.culture?.dist_rang ? seed.culture.dist_rang + "cm" : "N/C";
                }

                // 2. Journal & Statistiques Récoltes
                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if(resJ.ok) {
                    const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
                    const entries = journal.filter(e => String(e.seedId) === String(seedId));

                    renderStats(entries);
                    renderJournal(entries);
                }
            } catch(e) { console.error(e); }
        }

        function renderStats(entries) {
            const harvestEntries = entries.filter(e => e.action === 'Récolte');
            if(harvestEntries.length === 0) return;

            const stats = {}; // { 2026: { 'kg': 5, 'unités': 12 } }

            harvestEntries.forEach(e => {
                const year = new Date(e.date).getFullYear();
                const unit = e.unite || 'unités'; // Fallback pour les anciennes notes
                const qty = parseFloat(e.quantite) || 0;

                if(!stats[year]) stats[year] = {};
                if(!stats[year][unit]) stats[year][unit] = 0;
                stats[year][unit] += qty;
            });

            const statsBox = document.getElementById('stats-recoltes');
            statsBox.innerHTML = Object.keys(stats).sort().reverse().map(year => `
                <div class="recolte-year">
                    <span class="year-label">Saison ${year}</span>
                    ${Object.keys(stats[year]).map(u => `
                        <div class="stat-row">
                            <span>Total ${u}</span>
                            <span style="font-weight:900; color:var(--accent);">${stats[year][u]} ${u}</span>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function renderJournal(entries) {
            const history = entries.reverse().slice(0, 10);
            document.getElementById('journal-history').innerHTML = history.map(entry => `
                <div class="journal-card">
                    <div style="font-size:11px; color:#777;">${entry.date}</div>
                    <div style="font-weight:bold; color:var(--accent); margin:4px 0;">${entry.action} ${entry.quantite ? `(${entry.quantite} ${entry.unite || ''})` : ''}</div>
                    <div style="font-size:14px; color:#ccc;">${entry.note || ''}</div>
                    ${entry.photo ? `<img src="${entry.photo}" style="width:100%; border-radius:10px; margin-top:10px;">` : ''}
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
