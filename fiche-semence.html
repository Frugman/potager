<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Détail Semence - Potager 2026</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #333; --edit: #FFC107; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 110px; }
        
        header { display: flex; align-items: center; padding: 20px; background: #000; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:10; }
        .back-btn { text-decoration: none; font-size: 24px; margin-right: 15px; color: var(--text); }
        header h1 { margin: 0; font-size: 18px; flex: 1; }
        
        .edit-btn { text-decoration: none; background: rgba(255, 193, 7, 0.15); color: var(--edit); padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; border: 1px solid var(--edit); }

        .container { padding: 15px; }
        
        /* Section Caractéristiques */
        .info-card { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .info-group { margin-bottom: 15px; }
        .info-label { font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }
        .info-value { font-size: 17px; color: #fff; }

        /* Grid Technique (Eau, Soleil, Distance) */
        .tech-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .tech-item { background: var(--card-bg); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .tech-icon { font-size: 20px; display: block; margin-bottom: 5px; }
        .tech-val { font-size: 12px; font-weight: bold; color: #ccc; }

        /* Délais */
        .delais-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 25px; }
        .delai-item { background: #111; padding: 10px 5px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .delai-days { display: block; font-size: 18px; font-weight: bold; color: var(--accent); }
        .delai-label { font-size: 9px; color: #777; text-transform: uppercase; }

        /* Historique / Journal */
        .history-section h2 { font-size: 14px; color: var(--accent); text-transform: uppercase; margin: 25px 0 15px; letter-spacing: 1px; }
        .journal-card { background: #111; border-left: 4px solid var(--accent); border-radius: 8px; padding: 15px; margin-bottom: 12px; position: relative; }
        .journal-date { font-size: 11px; color: #777; margin-bottom: 5px; }
        .journal-action { font-weight: bold; font-size: 14px; color: var(--accent); margin-bottom: 8px; display: block; }
        .journal-note { font-size: 14px; color: #ccc; line-height: 1.4; }
        .journal-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #333; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #111; border-top: 2px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #fff; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .nav-icon { font-size: 26px; }
        .active-nav { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <a href="repertoire.html" class="back-btn">←</a>
        <h1 id="page-title">Chargement...</h1>
        <a href="#" id="link-edit" class="edit-btn">MODIFIER</a>
    </header>

    <div class="container">
        <div class="info-card">
            <div class="info-group">
                <span class="info-label">Variété</span>
                <div class="info-value" id="view-variete">-</div>
            </div>
            <div class="info-group" id="role-container">
                <span class="info-label">Type / Port</span>
                <div class="info-value" id="view-role">-</div>
            </div>
        </div>

        <div class="tech-grid">
            <div class="tech-item"><span class="tech-icon">☀️</span><span class="tech-val" id="view-soleil">Soleil</span></div>
            <div class="tech-item"><span class="tech-icon">💧</span><span class="tech-val" id="view-eau">Normal</span></div>
            <div class="tech-item"><span class="tech-icon">📏</span><span class="tech-val" id="view-dist">30 cm</span></div>
        </div>

        <div class="delais-grid">
            <div class="delai-item"><span class="delai-days" id="d-levee">-</span><span class="delai-label">Levée</span></div>
            <div class="delai-item"><span class="delai-days" id="d-repiquage">-</span><span class="delai-label">Repiq.</span></div>
            <div class="delai-item"><span class="delai-days" id="d-plantation">-</span><span class="delai-label">Plant.</span></div>
            <div class="delai-item"><span class="delai-days" id="d-maturite">-</span><span class="delai-label">Récolte</span></div>
        </div>

        <div class="info-card">
            <span class="info-label">Culture & Entretien</span>
            <div id="view-notes" style="font-size: 14px; color: #ccc; margin-top:8px;">-</div>
        </div>

        <div class="history-section">
            <h2>📜 Historique & Photos</h2>
            <div id="journal-history">Chargement de l'historique...</div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item active-nav"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');

        const params = new URLSearchParams(window.location.search);
        const seedId = params.get('id');

        async function loadAllData() {
            if(!token || !seedId) return;
            document.getElementById('link-edit').href = `ajout-semence.html?edit=${seedId}`;

            try {
                // 1. Charger les données de la semence
                const resS = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const seeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                const seed = seeds.find(s => String(s.id) === String(seedId));

                if(seed) {
                    document.getElementById('page-title').innerText = seed.identite.nom_commun;
                    document.getElementById('view-variete').innerText = seed.identite.variete || 'N/C';
                    document.getElementById('view-provenance').innerText = seed.identite.provenance || 'N/C';
                    document.getElementById('view-notes').innerText = seed.notes || 'Aucune consigne spécifique.';
                    
                    // Règle spécifique : cacher rôle si vide
                    if(seed.identite.role) {
                        document.getElementById('view-role').innerText = seed.identite.role;
                    } else {
                        document.getElementById('role-container').style.display = 'none';
                    }

                    // Champs techniques (avec fallback)
                    document.getElementById('view-soleil').innerText = seed.technique?.exposition || "N/C";
                    document.getElementById('view-eau').innerText = seed.technique?.eau || "N/C";
                    document.getElementById('view-dist').innerText = seed.technique?.distance ? seed.technique.distance + " cm" : "N/C";

                    document.getElementById('d-levee').innerText = seed.delais.levee || 0;
                    document.getElementById('d-repiquage').innerText = seed.delais.repiquage || 0;
                    document.getElementById('d-plantation').innerText = seed.delais.plantation || 0;
                    document.getElementById('d-maturite').innerText = seed.delais.maturite || 0;
                }

                // 2. Charger l'historique du Journal
                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
                
                // Filtrer les entrées pour CETTE semence uniquement
                const filteredJournal = journal.filter(entry => String(entry.seedId) === String(seedId)).reverse();

                const historyBox = document.getElementById('journal-history');
                if(filteredJournal.length === 0) {
                    historyBox.innerHTML = "<p style='color:#666; font-size:14px;'>Aucune note ou photo pour le moment.</p>";
                } else {
                    historyBox.innerHTML = filteredJournal.map(entry => `
                        <div class="journal-card">
                            <div class="journal-date">${new Date(entry.date).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'})}</div>
                            <span class="journal-action">${entry.action}</span>
                            <div class="journal-note">${entry.note || ''}</div>
                            ${entry.photo ? `<img src="${entry.photo}" class="journal-img" onclick="window.open(this.src)">` : ''}
                        </div>
                    `).join('');
                }

            } catch(e) { console.error(e); }
        }

        window.onload = loadAllData;
    </script>
</body>
</html>
