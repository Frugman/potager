<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Note</title>
    <style>
        :root { --bg: #000; --card-bg: #1a1a1a; --text: #fff; --accent: #4CAF50; --border: #444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; padding-bottom: 60px; }
        section { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        label { display: block; margin: 15px 0 8px; font-weight: bold; color: var(--accent); text-transform: uppercase; font-size: 13px;}
        
        /* DatePicker Amélioré */
        input[type="date"] {
            width: 100%;
            padding: 18px;
            background: #080808;
            color: #fff;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            box-sizing: border-box;
            appearance: none; /* Supprime le style par défaut sur certains mobiles */
            -webkit-appearance: none;
        }
        
        input, select, textarea { width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        .save-btn { width: 100%; padding: 22px; background: var(--accent); color: #fff; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer;}
        .del-btn { width: 100%; padding: 15px; background: #400; color: #fff; border: none; border-radius: 15px; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 14px;}
    </style>
</head>
<body>
    <button onclick="window.location.href='journal.html'" style="background:none; border:none; color:#fff; font-size:40px; cursor:pointer;">←</button>
    <h1>Modifier la saisie</h1>

    <section>
        <label>Calendrier</label>
        <input type="date" id="edit-date">

        <div id="dynamic-area"></div>

        <label>Quantité</label>
        <input type="number" id="edit-qte">

        <label>Notes libres</label>
        <textarea id="edit-note" rows="4" placeholder="Observations..."></textarea>

        <button class="save-btn" onclick="updateJournal()">ENREGISTRER</button>
        <button class="del-btn" onclick="deleteEntry()">SUPPRIMER L'ENTRÉE</button>
    </section>

    <script>
        const params = new URLSearchParams(window.location.search);
        const entryId = params.get('id');
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        let journal = [], entryIndex = -1, sha = "";

        async function load() {
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json(); sha = data.sha;
            journal = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            entryIndex = journal.findIndex(e => e.id == entryId);
            const e = journal[entryIndex];
            if (!e) return;

            document.getElementById('edit-date').value = e.date;
            document.getElementById('edit-qte').value = e.quantite || '';
            document.getElementById('edit-note').value = e.note || '';
            
            // On peut ici charger l'emplacement ou le bac dynamiquement comme avant
            let html = "";
            if (e.bac) html += `<label>Bac</label><input type="text" id="edit-bac" value="${e.bac}">`;
            document.getElementById('dynamic-area').innerHTML = html;
        }

        async function updateJournal() {
            let e = journal[entryIndex];
            e.date = document.getElementById('edit-date').value;
            e.quantite = document.getElementById('edit-qte').value;
            e.note = document.getElementById('edit-note').value;
            if (document.getElementById('edit-bac')) e.bac = document.getElementById('edit-bac').value;
            
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2))));
            const url = `https://api.github.com/repos/${user}/${repo}/contents/journal.json`;
            await fetch(url, {
                method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update journal", content: content, sha: sha })
            });
            window.location.href = 'journal.html';
        }

        async function deleteEntry() { if(confirm("Supprimer ?")) { journal.splice(entryIndex, 1); updateJournal(); } }
        window.onload = load;
    </script>
</body>
</html>
