<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modifier l'action - Potager 2026</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/frugman/potager/main/favicon.png">
</head>
<body>

    <header>
        <a href="journal.html" class="back-btn">←</a>
        <h1>Modifier l'action</h1>
    </header>

    <div class="container">
        <div class="card">
            <div class="note-meta">Type d'événement</div>
            <div class="type-grid">
                <div class="type-btn" data-type="Semis" onclick="changeType('Semis')">Semis</div>
                <div class="type-btn" data-type="Repiquage" onclick="changeType('Repiquage')">Repiq.</div>
                <div class="type-btn" data-type="Plantation" onclick="changeType('Plantation')">Plant.</div>
                <div class="type-btn" data-type="Récolte" onclick="changeType('Récolte')">Récolte</div>
                <div class="type-btn" data-type="Arrachage" onclick="changeType('Arrachage')" style="color:var(--danger-red); border-color:var(--danger-red);">Arrach.</div>
                <div class="type-btn" data-type="Note" onclick="changeType('Note')">Note</div>
            </div>
        </div>

        <div class="card">
            <div class="note-meta">Informations</div>
            
            <label>Plante</label>
            <select id="val-seed"><option value="">Note générale</option></select>
            
            <label>Date</label>
            <input type="date" id="val-date">
            
            <div id="dynamic-fields"></div>

            <label>Commentaire / Observation</label>
            <textarea id="val-note" rows="4"></textarea>
        </div>

        <div class="card">
            <div class="note-meta">Illustration</div>
            <img id="current-img" style="display:none; width:100%; border-radius:12px; margin-bottom:15px; border:1px solid var(--border-color);">
            
            <div class="grid-2">
                <button type="button" class="filter-btn" onclick="document.getElementById('file-input').click()">📸 CHANGER</button>
                <button type="button" id="del-photo-btn" class="filter-btn hidden" style="color:var(--danger-red); border-color:var(--danger-red);" onclick="removePhoto()">SUPPRIMER</button>
            </div>
            
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="processNewPhoto(this)">
        </div>

        <button type="button" class="save-btn" id="btnSave" onclick="updateEntry()">ENREGISTRER LES MODIFICATIONS</button>
        
        <button type="button" style="width:100%; background:none; border:none; color:var(--danger-red); font-weight:bold; padding:20px; cursor:pointer;" onclick="deleteEntry()">
            🗑️ SUPPRIMER CETTE ENTRÉE
        </button>
    </div>

    <script>
        const entryId = parseInt(new URLSearchParams(window.location.search).get('id'));
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        let currentType = "", photoUrl = "", base64Photo = "", photoName = "";

        async function init() {
            if(!token || !entryId) return;
            
            try {
                // Charger semences pour le menu
                const resS = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const seeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                const sel = document.getElementById('val-seed');
                seeds.sort((a,b)=>a.identite.nom_commun.localeCompare(b.identite.nom_commun)).forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">${s.identite.nom_commun} - ${s.identite.variete}</option>`;
                });

                // Charger l'entrée du journal
                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
                const entry = journal.find(n => n.id === entryId);

                if(entry) fillForm(entry);
            } catch(e) { console.error(e); }
        }

        function fillForm(e) {
            document.getElementById('val-date').value = e.date;
            document.getElementById('val-seed').value = e.seedId || "";
            document.getElementById('val-note').value = e.note || "";
            
            if(e.photo) {
                photoUrl = e.photo;
                const img = document.getElementById('current-img');
                img.src = e.photo;
                img.style.display = 'block';
                document.getElementById('del-photo-btn').classList.remove('hidden');
            }

            changeType(e.action, e);
        }

        function changeType(type, entry = null) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => {
                b.classList.toggle('active', b.innerText.includes(type) || b.dataset.type === type);
            });

            const dyn = document.getElementById('dynamic-fields');
            let html = "";

            if(type === 'Semis' || type === 'Repiquage' || type === 'Plantation' || type === 'Arrachage') {
                const locHTML = `
                    <label>Lieu / Emplacement</label>
                    <select id="val-loc">
                        <option ${entry?.emplacement === 'Serre intérieure' || entry?.bac === 'Serre intérieure'?'selected':''}>Serre intérieure</option>
                        <option ${entry?.emplacement === 'Serre extérieure' || entry?.bac === 'Serre extérieure'?'selected':''}>Serre extérieure</option>
                        <option ${entry?.bac === 'Bac A' || entry?.emplacement === 'Bac A'?'selected':''}>Bac A</option>
                        <option ${entry?.bac === 'Bac B' || entry?.emplacement === 'Bac B'?'selected':''}>Bac B</option>
                        <option ${entry?.bac === 'Bac C' || entry?.emplacement === 'Bac C'?'selected':''}>Bac C</option>
                        <option ${entry?.bac === 'Bac D' || entry?.emplacement === 'Bac D'?'selected':''}>Bac D</option>
                        <option ${entry?.bac === 'Bac E' || entry?.emplacement === 'Bac E'?'selected':''}>Bac E</option>
                        <option ${entry?.emplacement === 'Pleine terre' || entry?.bac === 'Pleine terre'?'selected':''}>Pleine terre</option>
                        <option ${entry?.bac === 'Autre' || entry?.emplacement === 'Autre'?'selected':''}>Autre</option>
                    </select>
                `;
                
                let contHTML = "";
                if(type === 'Semis' || type === 'Repiquage') {
                    contHTML = `
                        <label>Contenant</label>
                        <select id="val-cont">
                            <option ${entry?.contenant === 'Pleine terre (sans contenant)'?'selected':''}>Pleine terre (sans contenant)</option>
                            <option ${entry?.contenant === 'Plaque de semis'?'selected':''}>Plaque de semis</option>
                            <option ${entry?.contenant === 'Godet'?'selected':''}>Godet</option>
                            <option ${entry?.contenant === 'Caissette'?'selected':''}>Caissette</option>
                            <option ${entry?.contenant === 'Pot individuel'?'selected':''}>Pot individuel</option>
                            <option ${entry?.contenant === 'Autre'?'selected':''}>Autre</option>
                        </select>
                    `;
                }

                html = locHTML + contHTML + `
                    <label>Quantité</label>
                    <input type="number" id="val-qty" value="${entry?.quantite || ''}" placeholder="${type === 'Arrachage' ? 'Vide = tout' : ''}">
                `;
            } else if(type === 'Récolte') {
                html = `
                    <label>Quantité</label>
                    <div class="grid-2">
                        <input type="number" id="val-qty" value="${entry?.quantite || ''}">
                        <select id="val-unit">
                            <option value="unités" ${entry?.unite==='unités'?'selected':''}>Produit(s)</option>
                            <option value="kg" ${entry?.unite==='kg'?'selected':''}>kg</option>
                            <option value="g" ${entry?.unite==='g'?'selected':''}>g</option>
                        </select>
                    </div>
                `;
            }
            dyn.innerHTML = html;
        }

        function processNewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height, max = 500;
                        if (width > height) { if (width > max) { height *= max / width; width = max; } }
                        else { if (height > max) { width *= max / height; height = max; } }
                        
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const data = canvas.toDataURL('image/jpeg', 0.7);
                        
                        const current = document.getElementById('current-img');
                        current.src = data;
                        current.style.display = 'block';
                        document.getElementById('del-photo-btn').classList.remove('hidden');
                        
                        base64Photo = data.split(',')[1];
                        photoName = `IMG_${Date.now()}.jpg`;
                        photoUrl = ""; 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removePhoto() {
            photoUrl = "";
            base64Photo = "";
            document.getElementById('current-img').src = "";
            document.getElementById('current-img').style.display = 'none';
            document.getElementById('del-photo-btn').classList.add('hidden');
        }

        async function updateEntry() {
            const btn = document.getElementById('btnSave'); btn.innerText = "⏳ SYNCHRONISATION..."; btn.disabled = true;

            try {
                let finalPhotoUrl = photoUrl;
                if(base64Photo) {
                    const path = `photos/${photoName}`;
                    await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
                        method: 'PUT', headers: { 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ message: "Photo mise à jour", content: base64Photo })
                    });
                    finalPhotoUrl = `https://raw.githubusercontent.com/${user}/${repo}/master/${path}`;
                }

                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const dataJ = await resJ.json();
                let journal = JSON.parse(decodeURIComponent(escape(atob(dataJ.content))));
                
                const index = journal.findIndex(n => n.id === entryId);
                if(index !== -1) {
                    journal[index] = {
                        ...journal[index],
                        date: document.getElementById('val-date').value,
                        action: currentType,
                        seedId: document.getElementById('val-seed').value,
                        note: document.getElementById('val-note').value,
                        photo: finalPhotoUrl,
                        quantite: parseInt(document.getElementById('val-qty')?.value) || 0,
                        bac: document.getElementById('val-bac')?.value,
                        emplacement: document.getElementById('val-loc')?.value,
                        contenant: document.getElementById('val-cont')?.value,
                        unite: document.getElementById('val-unit')?.value || ""
                    };
                }

                await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message: `Update entry ${entryId}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2)))), sha: dataJ.sha })
                });
                window.location.href = 'journal.html';
            } catch(e) { alert("Erreur MAJ"); btn.disabled = false; btn.innerText = "REESSAYER"; }
        }

        async function deleteEntry() {
            if(!confirm("Supprimer définitivement cette note ?")) return;
            try {
                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const dataJ = await resJ.json();
                let journal = JSON.parse(decodeURIComponent(escape(atob(dataJ.content))));
                
                const filtered = journal.filter(n => n.id !== entryId);
                await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message: `Delete entry ${entryId}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(filtered, null, 2)))), sha: dataJ.sha })
                });
                window.location.href = 'journal.html';
            } catch(e) { alert("Erreur suppression"); }
        }

        window.onload = init;
    </script>
</body>
</html>
