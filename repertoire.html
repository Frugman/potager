<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Répertoire - Semences</title>
    <style>
        :root {
            --bg: #000;
            --card-bg: #1a1a1a;
            --text: #fff;
            --accent: #4CAF50;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 110px;
            font-size: 16px;
        }

        header { margin-bottom: 20px; }
        h1 { font-size: 24px; margin: 0; }

        .search-container {
            position: sticky;
            top: 10px;
            z-index: 10;
            margin-bottom: 25px;
        }

        .search-bar {
            width: 100%;
            padding: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .grid { display: grid; gap: 12px; }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            min-height: 44px;
        }

        .card:active { background: #222; }

        .card-info h3 { margin: 0; font-size: 18px; color: var(--text); }
        .card-info p { margin: 4px 0 0; font-size: 14px; color: #888; font-style: italic; }

        .tag-provenance {
            font-size: 11px;
            padding: 5px 10px;
            background: #222;
            border-radius: 8px;
            color: var(--accent);
            font-weight: bold;
            text-transform: uppercase;
        }

        .fab {
            position: fixed;
            bottom: 105px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            text-decoration: none;
            z-index: 99;
        }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px;
            background: #111; border-top: 2px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { color: #fff; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .nav-icon { font-size: 26px; margin-bottom: 2px; }
        .active-nav { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>📚 Répertoire</h1>
    </header>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Rechercher une variété..." id="searchInput">
    </div>

    <div id="seedGrid" class="grid">
        <p style="text-align:center; padding:40px; color:#666;">Chargement de vos semences...</p>
    </div>

    <a href="ajout-semence.html" class="fab">+</a>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item active-nav"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        let allSemences = [];
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');

        async function loadSeeds() {
            if (!token) {
                document.getElementById('seedGrid').innerHTML = '<p style="text-align:center; padding:40px;">Session expirée. Reconnectez-vous sur l\'accueil.</p>';
                return;
            }
            try {
                // Ajout d'un paramètre timestamp pour éviter le cache GitHub
                const url = `https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`;
                const res = await fetch(url, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                
                if (!res.ok) throw new Error("Impossible de charger le fichier JSON");
                
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                allSemences = JSON.parse(content);
                
                // Tri alphabétique
                allSemences.sort((a, b) => {
                    const nomA = a.identite?.nom_commun || "";
                    const nomB = b.identite?.nom_commun || "";
                    return nomA.localeCompare(nomB);
                });
                
                renderSeeds(allSemences);
            } catch (e) {
                console.error(e);
                document.getElementById('seedGrid').innerHTML = `<p style="color:red; text-align:center; padding:20px;">Erreur : ${e.message}</p>`;
            }
        }

        function renderSeeds(data) {
            const grid = document.getElementById('seedGrid');
            if (data.length === 0) {
                grid.innerHTML = '<p style="text-align:center; padding:40px; color:#666;">Aucune semence trouvée.</p>';
                return;
            }

            grid.innerHTML = data.map(s => {
                // Utilise s.id ou un fallback si l'ID est ailleurs
                const seedId = s.id || (s.identite && s.identite.id);
                
                return `
                    <div class="card" onclick="window.location.href='fiche-semence.html?id=${seedId}'">
                        <div class="card-info">
                            <h3>${s.identite?.nom_commun || 'Nom inconnu'}</h3>
                            <p>${s.identite?.variete || ''}</p>
                        </div>
                        <span class="tag-provenance">${s.identite?.provenance || 'N/C'}</span>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allSemences.filter(s => 
                (s.identite?.nom_commun || "").toLowerCase().includes(val) || 
                (s.identite?.variete || "").toLowerCase().includes(val)
            );
            renderSeeds(filtered);
        });

        window.onload = loadSeeds;
    </script>
</body>
</html>
