<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Répertoire - Semences</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        /* Style spécifique pour le bouton flottant d'ajout */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: var(--accent-green);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 90;
            font-weight: bold;
        }
        .fab:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <header>
        <h1>📚 Répertoire</h1>
    </header>

    <div class="container">
        <div class="card" style="padding: 12px; margin-bottom: 20px;">
            <input type="text" id="searchInput" placeholder="Rechercher une plante ou une variété..." 
                   style="margin-bottom: 0; background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2220%22 height=%2220%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23555%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><circle cx=%2211%22 cy=%2211%22 r=%228%22></circle><line x1=%2221%22 y1=%2221%22 x2=%2216.65%22 y2=%2216.65%22></line></svg>'); background-repeat: no-repeat; background-position: 15px center; padding-left: 45px;">
        </div>

        <div id="seedGrid">
            <div class="empty-msg">Chargement de votre collection...</div>
        </div>
    </div>

    <a href="modifier-semence.html" class="fab">+</a>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item active-nav"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="autres.html" class="nav-item"><span class="nav-icon">🗂️</span>Autres</a>
    </nav>

    <script>
        let allSemences = [];
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');

        async function loadSeeds() {
            if (!token) {
                document.getElementById('seedGrid').innerHTML = '<div class="empty-msg">Veuillez vous connecter.</div>';
                return;
            }
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                
                if (!res.ok) throw new Error("Fichier introuvable");
                
                const data = await res.json();
                allSemences = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                
                // Tri alphabétique par nom commun
                allSemences.sort((a, b) => (a.identite?.nom_commun || "").localeCompare(b.identite?.nom_commun || ""));
                
                renderSeeds(allSemences);
            } catch (e) {
                console.error(e);
                document.getElementById('seedGrid').innerHTML = `<div class="empty-msg" style="color:var(--danger-red);">Erreur : ${e.message}</div>`;
            }
        }

        function renderSeeds(data) {
            const grid = document.getElementById('seedGrid');
            if (data.length === 0) {
                grid.innerHTML = '<div class="empty-msg">Aucune semence ne correspond.</div>';
                return;
            }

            grid.innerHTML = data.map(s => {
                const seedId = s.id;
                return `
                    <div class="card" onclick="window.location.href='fiche-semence.html?id=${seedId}'" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; cursor: pointer;">
                        <div>
                            <div style="font-weight: 800; font-size: 16px; color: var(--text-primary);">${s.identite?.nom_commun || 'Sans nom'}</div>
                            <div style="font-size: 13px; color: var(--text-secondary); margin-top: 2px;">${s.identite?.variete || ''}</div>
                        </div>
                        <span class="badge" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 10px;">
                            ${s.identite?.provenance || 'N/C'}
                        </span>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allSemences.filter(s => 
                (s.identite?.nom_commun || "").toLowerCase().includes(val) || 
                (s.identite?.variete || "").toLowerCase().includes(val)
            );
            renderSeeds(filtered);
        });

        window.onload = loadSeeds;
    </script>
</body>
</html>
