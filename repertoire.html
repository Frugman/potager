<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Répertoire - Semences</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>📚 Répertoire</h1>
    </header>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Rechercher une variété..." id="searchInput">
    </div>

    <div id="seedGrid" class="grid">
        <p style="text-align:center; padding:40px; color:#666;">Chargement de vos semences...</p>
    </div>

    <a href="ajout-semence.html" class="fab">+</a>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item active-nav"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        let allSemences = [];
        const user = localStorage.getItem('gh_user'), 
              repo = localStorage.getItem('gh_repo'), 
              token = localStorage.getItem('gh_token');

        async function loadSeeds() {
            if (!token) {
                document.getElementById('seedGrid').innerHTML = '<p style="text-align:center; padding:40px;">Session expirée. Reconnectez-vous sur l\'accueil.</p>';
                return;
            }
            try {
                // Ajout d'un paramètre timestamp pour éviter le cache GitHub
                const url = `https://api.github.com/repos/${user}/${repo}/contents/semences.json?t=${Date.now()}`;
                const res = await fetch(url, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                
                if (!res.ok) throw new Error("Impossible de charger le fichier JSON");
                
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                allSemences = JSON.parse(content);
                
                // Tri alphabétique
                allSemences.sort((a, b) => {
                    const nomA = a.identite?.nom_commun || "";
                    const nomB = b.identite?.nom_commun || "";
                    return nomA.localeCompare(nomB);
                });
                
                renderSeeds(allSemences);
            } catch (e) {
                console.error(e);
                document.getElementById('seedGrid').innerHTML = `<p style="color:red; text-align:center; padding:20px;">Erreur : ${e.message}</p>`;
            }
        }

        function renderSeeds(data) {
            const grid = document.getElementById('seedGrid');
            if (data.length === 0) {
                grid.innerHTML = '<p style="text-align:center; padding:40px; color:#666;">Aucune semence trouvée.</p>';
                return;
            }

            grid.innerHTML = data.map(s => {
                // Utilise s.id ou un fallback si l'ID est ailleurs
                const seedId = s.id || (s.identite && s.identite.id);
                
                return `
                    <div class="card" onclick="window.location.href='fiche-semence.html?id=${seedId}'">
                        <div class="card-info">
                            <h3>${s.identite?.nom_commun || 'Nom inconnu'}</h3>
                            <p>${s.identite?.variete || ''}</p>
                        </div>
                        <span class="tag-provenance">${s.identite?.provenance || 'N/C'}</span>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allSemences.filter(s => 
                (s.identite?.nom_commun || "").toLowerCase().includes(val) || 
                (s.identite?.variete || "").toLowerCase().includes(val)
            );
            renderSeeds(filtered);
        });

        window.onload = loadSeeds;
    </script>
</body>
</html>
