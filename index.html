<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Potager - Répertoire</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --accent: #4CAF50;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding-bottom: 100px; /* Espace pour la nav large */
        }

        /* En-tête avec recherche */
        .header {
            padding: 20px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        .search-bar {
            width: 100%;
            padding: 18px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: #ffffff;
            font-size: 18px;
            outline: none;
            box-sizing: border-box;
        }

        .search-bar:focus { border-color: var(--accent); }

        /* Grille des semences */
        .grid {
            padding: 0 20px;
            display: grid;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .card-info h3 { margin: 0; font-size: 20px; font-weight: bold; color: #ffffff; }
        .card-info p { margin: 6px 0 0; font-size: 16px; color: #ffffff; }

        .tag-provenance {
            font-size: 13px;
            padding: 6px 10px;
            background: #333;
            border-radius: 8px;
            color: var(--accent);
            font-weight: bold;
            white-space: nowrap;
        }

        /* Bouton flottant Ajouter */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 65px;
            height: 65px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border: none;
            cursor: pointer;
            z-index: 99;
            text-decoration: none;
        }

        /* Barre de navigation basse */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: #111;
            border-top: 2px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .nav-item.active { color: var(--accent); }

        .nav-icon {
            font-size: 32px; /* Icônes agrandies */
            margin-bottom: 4px;
        }

        .loading { padding: 40px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" class="search-bar" placeholder="Rechercher une variété..." id="searchInput">
    </div>

    <div id="seedGrid" class="grid">
        <div class="loading">Chargement du potager...</div>
    </div>

    <a href="ajout-semence.html" class="fab">+</a>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>Accueil
        </a>
        <a href="index.html" class="nav-item active">
            <span class="nav-icon">🌱</span>Semences
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">📖</span>Journal
        </a>
        <a href="parametres.html" class="nav-item">
            <span class="nav-icon">⚙️</span>Réglages
        </a>
    </nav>

    <script>
        let allSemences = [];

        async function loadSeeds() {
            const grid = document.getElementById('seedGrid');
            const user = localStorage.getItem('gh_user');
            const repo = localStorage.getItem('gh_repo');
            const token = localStorage.getItem('gh_token');

            if (!user || !repo || !token) {
                grid.innerHTML = `
                    <div class="loading">
                        <p>Configuration manquante</p>
                        <a href="parametres.html" style="color:var(--accent); text-decoration:none; font-weight:bold;">Aller aux réglages →</a>
                    </div>`;
                return;
            }

            try {
                const url = `https://api.github.com/repos/${user}/${repo}/contents/semences.json`;
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!res.ok) throw new Error("Fichier semences.json introuvable");

                const data = await res.json();
                allSemences = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                renderSeeds(allSemences);

            } catch (e) {
                grid.innerHTML = `<div class="loading" style="color:#ff4444;">❌ Erreur : ${e.message}</div>`;
            }
        }

        function renderSeeds(data) {
        const grid = document.getElementById('seedGrid');
        grid.innerHTML = "";
    
        if (data.length === 0) {
            // C'est ici qu'il manquait les guillemets autour de "loading" !
            grid.innerHTML = '<div class="loading">Aucune semence trouvée.</div>';
            return;
        }
    
        data.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-info">
                    <h3>${s.identite.nom_commun}</h3>
                    <p>${s.identite.variete}</p>
                </div>
                <span class="tag-provenance">${s.identite.provenance || 'N/C'}</span>
            `;
            grid.appendChild(card);
        });
    }

        // Filtrage en temps réel
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allSemences.filter(s => 
                s.identite.nom_commun.toLowerCase().includes(val) || 
                s.identite.variete.toLowerCase().includes(val)
            );
            renderSeeds(filtered);
        });

        // Lancement au chargement
        window.onload = loadSeeds;
    </script>
</body>
</html>
