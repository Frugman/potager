<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Potager - Dashboard</title>
    <style>
        :root { --bg: #000000; --card-bg: #1a1a1a; --text: #ffffff; --accent: #4CAF50; --border: #333; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 110px; font-size: 16px; }
        
        select, input, textarea { width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        input[type="date"] { font-weight: bold; border-color: var(--accent); }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: var(--accent); text-transform: uppercase; }

        #action-express { background: #111; padding: 20px; border-bottom: 2px solid var(--border); }
        .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .type-btn { padding: 15px; background: #222; border: 1px solid var(--border); border-radius: 12px; color: #fff; font-weight: bold; text-align: center; min-height: 44px; display: flex; align-items: center; justify-content: center; }
        .type-btn.active { background: var(--accent); border-color: var(--accent); }
        .save-action-btn { width: 100%; padding: 20px; background: var(--accent); color: #fff; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; }

        .widget { padding: 20px 20px 0; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; border: 1px solid var(--border); margin-bottom: 10px; min-height: 44px; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #111; border-top: 2px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #fff; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .nav-icon { font-size: 26px; margin-bottom: 2px; }
        .active-nav { color: var(--accent); }
        .hidden { display: none; }

        .urgent-tag { color: var(--accent); font-weight: bold; font-size: 12px; margin-bottom: 4px; display: block; }
        .urgent-title { font-size: 15px; font-weight: bold; display: block; }
        .urgent-subtitle { font-size: 13px; color: #888; }
    </style>
</head>
<body>

    <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #000;">
        <h1 style="margin: 0; font-size: 22px;">Mon Potager 2026</h1>
        <a href="parametres.html" style="text-decoration: none; font-size: 24px;">⚙️</a>
    </header>

    <section id="action-express">
        <h2>🌱 Action Express</h2>
        
        <label>Semence</label>
        <select id="select-seed"><option value="">Choisir...</option></select>

        <label>Date</label>
        <input type="date" id="val-date">

        <div class="type-grid">
            <div class="type-btn" onclick="selectAction(this, 'Semis')">Semis</div>
            <div class="type-btn" onclick="selectAction(this, 'Repiquage')">Repiquage</div>
            <div class="type-btn" onclick="selectAction(this, 'Plantation')">Plantation</div>
            <div class="type-btn" onclick="selectAction(this, 'Récolte')">Récolte</div>
        </div>

        <div id="dynamic-fields" class="hidden">
            <div id="fields-semis" class="hidden">
                <label>Emplacement</label>
                <select id="val-emplacement">
                    <option value="Serre intérieure">Serre intérieure</option>
                    <option value="Serre extérieure">Serre extérieure</option>
                </select>
                <label>Contenant</label>
                <select id="val-contenant">
                    <option>Plaque 40 alvéoles</option>
                    <option>Godet 7cm</option>
                    <option>Godet 9cm</option>
                    <option>Sac 5cm</option>
                    <option>Sac 10cm</option>
                </select>
            </div>

            <div id="fields-plantation" class="hidden">
                <label>Destination</label>
                <select id="val-bac" onchange="document.getElementById('val-bac-autre').classList.toggle('hidden', this.value !== 'Autre')">
                    <option>Bac A</option><option>Bac B</option><option>Bac C</option><option>Bac D</option><option>Bac E</option>
                    <option value="Autre">Autre (préciser...)</option>
                </select>
                <input type="text" id="val-bac-autre" class="hidden" placeholder="Ex: Bordure Sud, Grand Pot...">
                <label style="display:flex; align-items:center; margin-top:10px; color:#fff; text-transform:none;">
                    <input type="checkbox" id="val-filet" style="width:25px; height:25px; margin-right:15px;"> Sous filet ?
                </label>
            </div>

            <label id="label-qte">Quantité / Nombre</label>
            <input type="number" id="val-qte" placeholder="Nombre">

            <label>Notes / Observations</label>
            <textarea id="val-note" rows="2" placeholder="Commentaire libre..."></textarea>
            
            <button class="save-action-btn" id="btnSaveAction" onclick="saveJournalAction()">ENREGISTRER</button>
        </div>
    </section>

    <div class="widget">
        <h2 style="font-size:14px; color:var(--accent); text-transform:uppercase;">📅 À faire (7 prochains jours)</h2>
        <div id="agenda-mini">
            <p style="font-size:14px; color:#666; padding: 10px;">Calcul des priorités...</p>
        </div>
    </div>

    <div class="widget" style="padding-bottom: 20px;">
        <h2 style="font-size:14px; color:var(--accent); text-transform:uppercase;">📝 Dernières Notes</h2>
        <div id="last-notes"></div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item active-nav"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        let allSemences = [];
        let currentAction = "";

        async function init() {
            if (!token) return;
            document.getElementById('val-date').valueAsDate = new Date();
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                allSemences = JSON.parse(decodeURIComponent(escape(atob((await res.json()).content))));
                const select = document.getElementById('select-seed');
                allSemences.sort((a,b) => a.identite.nom_commun.localeCompare(b.identite.nom_commun)).forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.identite.nom_commun} - ${s.identite.variete}</option>`;
                });
                loadWidgets();
            } catch (e) { console.error(e); }
        }

        function selectAction(btn, type) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentAction = type;
            document.getElementById('dynamic-fields').classList.remove('hidden');
            document.getElementById('fields-semis').classList.toggle('hidden', !['Semis', 'Repiquage'].includes(type));
            document.getElementById('fields-plantation').classList.toggle('hidden', type !== 'Plantation');
        }

        async function saveJournalAction() {
            const seedId = document.getElementById('select-seed').value;
            if (!seedId || !currentAction) return;
            const btn = document.getElementById('btnSaveAction');
            btn.innerText = "⏳..."; btn.disabled = true;

            const entry = {
                id: Date.now(),
                date: document.getElementById('val-date').value,
                seedId: seedId,
                action: currentAction,
                quantite: document.getElementById('val-qte').value,
                note: document.getElementById('val-note').value
            };
            if (currentAction === 'Semis' || currentAction === 'Repiquage') {
                entry.emplacement = document.getElementById('val-emplacement').value;
                entry.contenant = document.getElementById('val-contenant').value;
            } else if (currentAction === 'Plantation') {
                const b = document.getElementById('val-bac').value;
                entry.bac = (b === 'Autre') ? document.getElementById('val-bac-autre').value : b;
                entry.filet = document.getElementById('val-filet').checked;
            }

            try {
                const url = `https://api.github.com/repos/${user}/${repo}/contents/journal.json`;
                const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const fileData = await getRes.json();
                let journal = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
                journal.push(entry);
                await fetch(url, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Note ${currentAction}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2)))), sha: fileData.sha })
                });
                location.reload();
            } catch (e) { alert(e.message); btn.disabled = false; }
        }

        function addDays(date, days) {
            const result = new Date(date);
            result.setDate(result.getDate() + parseInt(days));
            return result;
        }

        async function loadWidgets() {
            try {
                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
                
                // 1. Widget Notes
                document.getElementById('last-notes').innerHTML = journal.slice(-3).reverse().map(n => `
                    <div class="card" onclick="window.location.href='modifier-journal.html?id=${n.id}'">
                        <b style="color:var(--accent)">${n.date}</b> - ${n.action} : ${n.seedId}
                    </div>`).join('');

                // 2. Widget Agenda 7 jours
                const today = new Date();
                today.setHours(0,0,0,0);
                const limit = addDays(today, 7);
                let urgentTasks = [];

                journal.forEach(entry => {
                    if (entry.action === 'Semis') {
                        const seed = allSemences.find(s => s.id === entry.seedId);
                        if (!seed || !seed.delais) return;

                        const dSemis = new Date(entry.date);
                        const steps = [
                            { date: addDays(dSemis, seed.delais.levee), task: "🌱 Levée attendue" },
                            { date: addDays(addDays(dSemis, seed.delais.levee), seed.delais.repiquage), task: "🪴 Repiquage" },
                            { date: addDays(addDays(addDays(dSemis, seed.delais.levee), seed.delais.repiquage), seed.delais.plantation), task: "🚜 Plantation" },
                            { date: addDays(addDays(addDays(addDays(dSemis, seed.delais.levee), seed.delais.repiquage), seed.delais.plantation), seed.delais.maturite), task: "🧺 Récolte" }
                        ];

                        steps.forEach(s => {
                            if (s.date >= today && s.date <= limit) {
                                urgentTasks.push({ ...s, plant: `${seed.identite.nom_commun} - ${seed.identite.variete}` });
                            }
                        });
                    }
                });

                const agendaMini = document.getElementById('agenda-mini');
                if (urgentTasks.length === 0) {
                    agendaMini.innerHTML = `<div class="card" style="color:#666; font-style:italic;">Aucune tâche urgente cette semaine.</div>`;
                } else {
                    urgentTasks.sort((a, b) => a.date - b.date);
                    agendaMini.innerHTML = urgentTasks.map(u => `
                        <div class="card">
                            <span class="urgent-tag">${u.date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' })}</span>
                            <span class="urgent-title">${u.task}</span>
                            <span class="urgent-subtitle">${u.plant}</span>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error(e); }
        }

        window.onload = init;
    </script>
</body>
</html>
