<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Potager 2026</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#0c1015">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Potager 2026</h1>
        <a href="parametres.html" style="text-decoration:none; font-size:24px; color:#fff;">⚙️</a>
    </header>

    <div class="container">
        <section id="action-express">
            <div class="type-grid">
                <div class="type-btn" onclick="selectAction(this, 'Semis')"><span>🌱</span>Semis</div>
                <div class="type-btn" onclick="selectAction(this, 'Repiquage')"><span>🪴</span>Repiq.</div>
                <div class="type-btn" onclick="selectAction(this, 'Plantation')"><span>🚜</span>Plant.</div>
                <div class="type-btn" onclick="selectAction(this, 'Récolte')"><span>🧺</span>Récolte</div>
                <div class="type-btn" onclick="selectAction(this, 'Arrachage')" style="color:var(--danger-red); border-color:var(--danger-red);"><span>🗑️</span>Arrachage</div>
                <div class="type-btn" onclick="selectAction(this, 'Note')"><span>📝</span>Note</div>
            </div>

            <div id="express-form" class="card hidden">
                <div class="note-meta">Action Express</div>
                <label>Plante concernée</label>
                <select id="val-seed" onchange="checkAssociations()"><option value="">📝 Note générale</option></select>
                <label>Date</label>
                <input type="date" id="val-date">
                <div id="extra-fields"></div>
                <label>Commentaire</label>
                <textarea id="val-note" rows="2" placeholder="Observations..."></textarea>
                <div onclick="document.getElementById('file-input').click()" class="photo-btn">📸 Ajouter une photo</div>
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="processPhoto(this)">
                <img id="preview-img" style="display:none;">
                <button class="save-btn" id="btnSave" onclick="saveEntry()">ENREGISTRER</button>
            </div>
        </section>

        <section class="widget">
            <div class="section-title">🌤️ MÉTÉO <a href="meteo.html" style="font-size:10px; color:var(--text-secondary); text-decoration:none; margin-left:10px;">Prévisions 7j ↗</a></div>
            <div class="weather-scroll" id="weather-box" onclick="window.location.href='meteo.html'" style="cursor: pointer;">Chargement...</div>
        </section>

        <section class="widget" id="sprouts-section" style="display:none; margin-bottom:15px;">
            <div class="section-title" style="color:#f1c40f; border-left-color:#f1c40f;">👀 LEVÉES SOUS SURVEILLANCE</div>
            <div id="sprouts-box" style="display:flex; flex-wrap:wrap; gap:8px; background:var(--card-bg); padding:15px; border-radius:12px; border:1px solid var(--border-color);"></div>
        </section>

        <section class="widget">
            <div class="section-title">📅 PROCHAINES ACTIONS</div>
            <div id="agenda-box" class="card">Calcul de votre calendrier...</div>
        </section>

        <section class="widget" style="padding-bottom:20px;">
            <div class="section-title">📖 DERNIÈRES NOTES</div>
            <div id="notes-box"></div>
        </section>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item active-nav"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="autres.html" class="nav-item"><span class="nav-icon">🗂️</span>Autres</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        let globalSeeds = [], globalJournal = [];
        let currentType = "", base64Photo = "", photoName = "";

        function addDays(date, days) {
            let res = new Date(date);
            res.setDate(res.getDate() + parseInt(days));
            return res;
        }

        const glossaryWords = ['stratifier', 'scarifier', 'poquet', 'plomber', 'gourmand', 'ébourgeonner', 'pincer', 'étêter', 'étreter', 'éclaircir', 'diriger', 'butter', 'biner', 'sarcler', 'pailler', 'arroser', 'nettoyer', 'palisser'];
        function getClosestSaturday(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = day === 6 ? 0 : (day <= 2 ? -day - 1 : 6 - day);
            date.setDate(date.getDate() + diff);
            date.setHours(0,0,0,0);
            return date;
        }

        function getLexiqueBadge(text) {
            if(!text) return "";
            if(glossaryWords.some(w => text.toLowerCase().includes(w))) {
                return ` <a href="lexique.html" title="Voir l'Antisèche" style="text-decoration:none; filter:grayscale(100%); font-size:12px;" onclick="event.stopPropagation();">💡</a>`;
            }
            return "";
        }

        async function init() {
            if(!token) { window.location.href = 'parametres.html'; return; }
            document.getElementById('val-date').valueAsDate = new Date();
            loadWeather();
            try {
                const resS = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const seeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                globalSeeds = seeds;
                const sel = document.getElementById('val-seed');
                seeds.sort((a,b)=>a.identite.nom_commun.localeCompare(b.identite.nom_commun)).forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">${s.identite.nom_commun} - ${s.identite.variete}</option>`;
                });
                loadWidgets(seeds);
            } catch(e) { console.error(e); }
        }

        async function loadWidgets(seeds) {
            const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
            globalJournal = journal;
            
            // 1. DERNIÈRES NOTES
            document.getElementById('notes-box').innerHTML = journal.slice(-3).reverse().map(n => {
                const s = seeds.find(i => String(i.id) === String(n.seedId)) || {identite:{nom_commun:"Note Générale", variete:""}};
                return `
                <div class="journal-card" onclick="window.location.href='modifier-journal.html?id=${n.id}'">
                    <div class="note-meta">${n.date} • ${n.action}</div>
                    <div class="note-title">${s.identite.nom_commun}</div>
                    ${n.quantite ? `<div style="margin: 8px 0;"><span class="badge">+ ${n.quantite} ${n.unite || 'unité(s)'}</span></div>` : ''}
                    <p class="note-content">${n.note || ''}</p>
                    ${n.photo ? `<img src="${n.photo}" class="journal-img">` : ''}
                </div>`;
            }).join('');

            // 2. PROCHAINES ACTIONS (REPRISE LOGIQUE AGENDA)
            let allTasks = [];
            let allSprouts = [];
            const today = new Date(); today.setHours(0,0,0,0);
            // 1. Calculs depuis les Semis
            journal.filter(j => j.action === 'Semis').forEach(entry => {
                const seed = seeds.find(s => String(s.id) === String(entry.seedId));
                if (!seed) return;
                const semisDate = entry.date;
                const isDirectSowing = entry.contenant === 'Pleine terre (sans contenant)';
                const stages = [];
                
                if (seed.delais?.levee > 0) {
                    allSprouts.push({ date: addDays(semisDate, seed.delais.levee), plant: seed.identite.nom_commun });
                }
                if (!isDirectSowing && seed.delais?.repiquage > 0) {
                    stages.push({ d: (seed.delais?.levee || 0) + seed.delais.repiquage, t: "🪴 Repiquage" });
                }
                if (!isDirectSowing && seed.delais?.plantation > 0) {
                    stages.push({ d: (seed.delais?.levee || 0) + (seed.delais?.repiquage || 0) + seed.delais.plantation, t: "🚜 Plantation" });
                }
                if (seed.delais?.maturite > 0) {
                    stages.push({ d: (seed.delais?.levee || 0) + (isDirectSowing ? 0 : seed.delais?.repiquage || 0) + (isDirectSowing ? 0 : seed.delais?.plantation || 0) + seed.delais.maturite, t: "🧺 Récolte estimée" });
                }
                
                stages.forEach(st => {
                    if(st.d > 0) allTasks.push({ date: getClosestSaturday(addDays(semisDate, st.d)), title: st.t, plant: seed.identite.nom_commun });
                });
                if (seed.taches_entretien) {
                    seed.taches_entretien.forEach(te => {
                        let baseDate = semisDate;
                        if (te.base === 'plantation') {
                            const realPlant = journal.find(j => String(j.seedId) === String(entry.seedId) && j.action === 'Plantation');
                            if (realPlant) baseDate = realPlant.date;
                            else baseDate = addDays(semisDate, (seed.delais?.levee || 0) + (seed.delais?.repiquage || 0) + (seed.delais?.plantation || 0));
                        } else if (te.base === 'levee') {
                            baseDate = addDays(semisDate, seed.delais?.levee || 0);
                        }
                        
                        const occ = te.occurences || 1;
                        const freq = te.frequence || 0;
                        const badge = getLexiqueBadge(te.label);
                        for(let i=0; i<occ; i++) {
                            allTasks.push({ date: getClosestSaturday(addDays(baseDate, te.delai + (i * freq))), title: `✂️ ${te.label}${badge}`, plant: seed.identite.nom_commun });
                        }
                    });
                }
            });

            // 2. Calculs depuis les Plantations directes (plants achetés sans semis)
            journal.filter(j => j.action === 'Plantation').forEach(entry => {
                const seed = seeds.find(s => String(s.id) === String(entry.seedId));
                if (!seed) return;
                const planDate = new Date(entry.date);
                const hasRecentSemis = journal.some(s => s.action === 'Semis' && String(s.seedId) === String(entry.seedId) && 
                                      new Date(s.date) <= planDate && (planDate - new Date(s.date)) < 100 * 24 * 60 * 60 * 1000);
                if(!hasRecentSemis) {
                    if (seed.delais?.maturite > 0) {
                        allTasks.push({ date: getClosestSaturday(addDays(entry.date, seed.delais.maturite)), title: "🧺 Récolte estimée (Achat)", plant: seed.identite.nom_commun });
                    }
                    if (seed.taches_entretien) {
                        seed.taches_entretien.filter(te => te.base === 'plantation').forEach(te => {
                            const occ = te.occurences || 1;
                            const freq = te.frequence || 0;
                            const badge = getLexiqueBadge(te.label);
                            for(let i=0; i<occ; i++) {
                                allTasks.push({ date: getClosestSaturday(addDays(entry.date, te.delai + (i * freq))), title: `✂️ ${te.label}${badge}`, plant: seed.identite.nom_commun });
                            }
                        });
                    }
                }
            });

            // 3. Semis idéal conseillé
            const recoGroups = {};
            const cy = today.getFullYear();
            seeds.forEach(s => {
                if(s.conseil_semis && s.conseil_semis.date) {
                    const hasSemis = journal.some(j => j.action === 'Semis' && String(j.seedId) === String(s.id) && new Date(j.date).getFullYear() === cy);
                    if(!hasSemis) {
                        const d = new Date(s.conseil_semis.date); d.setFullYear(cy);
                        const k = d.getTime() + "|" + s.conseil_semis.texte;
                        if(!recoGroups[k]) recoGroups[k] = { date: d, t: s.conseil_semis.texte, p: [] };
                        recoGroups[k].p.push(s.identite.nom_commun);
                    }
                }
            });
            Object.values(recoGroups).forEach(g => {
                allTasks.push({ date: getClosestSaturday(g.date), title: "🎯 Faire Semis", plant: [...new Set(g.p)].join(', '), desc: g.t });
            });

            const nextSprouts = allSprouts.filter(t => t.date >= today && t.date <= addDays(today, 14)).sort((a,b)=>a.date-b.date);
            if(nextSprouts.length > 0) {
                const spHTML = nextSprouts.map(s => `<span class="badge" style="background:rgba(241,196,15,0.1); color:#f1c40f; border:1px solid #f1c40f;">🌱 ${s.plant} (${s.date.getDate()}/${s.date.getMonth()+1})</span>`).join(' ');
                document.getElementById('sprouts-box').innerHTML = spHTML;
                document.getElementById('sprouts-section').style.display = 'block';
            } else {
                document.getElementById('sprouts-section').style.display = 'none';
            }

            const nextTasks = allTasks.filter(t => t.date >= today).sort((a, b) => a.date - b.date);
            const grouped = {};
            nextTasks.forEach(t => {
                const k = t.date.getTime();
                if(!grouped[k]) grouped[k] = { date: t.date, items: [] };
                grouped[k].items.push(t);
            });

            const saturdays = Object.values(grouped).slice(0, 5);
            document.getElementById('agenda-box').innerHTML = saturdays.map(g => `
                <div class="item" style="flex-direction:column; align-items:flex-start; background:rgba(0,0,0,0.2); border:1px solid var(--border-color); border-left:3px solid var(--accent-green); padding:15px; border-radius:8px;">
                    <div style="font-weight:900; font-size:16px; margin-bottom:12px; color:var(--accent-green); display:flex; align-items:center; gap:8px;">
                        <span>📆 Samedi ${g.date.toLocaleDateString('fr-FR', {day:'numeric', month:'long'})}</span>
                    </div>
                    <ul style="margin:0; padding-left:20px; list-style-type:circle;">
                        ${g.items.map(i => `<li style="margin-bottom:6px;"><b>${i.title}</b> : ${i.plant} ${i.desc ? `<div style="font-size:11.5px; color:#FFA500; font-style:italic; margin-top:2px;">💡 ${i.desc}</div>` : '' }</li>`).join('')}
                    </ul>
                </div>
            `).join('') || `<div class="empty-msg">Aucune action physique au jardin prévue.</div>`;
        }

        function processPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height, max = 500;
                        if (width > height) { if (width > max) { height *= max / width; width = max; } }
                        else { if (height > max) { width *= max / height; height = max; } }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const data = canvas.toDataURL('image/jpeg', 0.7);
                        const preview = document.getElementById('preview-img');
                        preview.src = data; preview.style.display = 'block';
                        base64Photo = data.split(',')[1];
                        photoName = `IMG_${Date.now()}.jpg`;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function checkAssociations() {
            const seedId = document.getElementById('val-seed').value;
            const locEl = document.getElementById('val-loc');
            let alertEl = document.getElementById('assoc-alert');
            
            if(!alertEl) {
                alertEl = document.createElement('div');
                alertEl.id = 'assoc-alert';
                alertEl.style.display = 'none';
                alertEl.style.background = 'rgba(255,82,82,0.1)';
                alertEl.style.borderLeft = '4px solid var(--danger-red)';
                alertEl.style.padding = '10px';
                alertEl.style.marginTop = '15px';
                alertEl.style.marginBottom = '15px';
                alertEl.style.borderRadius = '4px';
                alertEl.style.fontSize = '12px';
                const ef = document.getElementById('extra-fields');
                if(ef) ef.insertAdjacentElement('afterend', alertEl);
            }
            
            if(!seedId || !locEl || !locEl.value || (currentType !== 'Semis' && currentType !== 'Plantation' && currentType !== 'Repiquage')) {
                alertEl.style.display = 'none';
                return;
            }

            const currentSeed = globalSeeds.find(s => String(s.id) === String(seedId));
            if(!currentSeed) { alertEl.style.display = 'none'; return; }

            const loc = locEl.value;
            const currentYear = new Date().getFullYear();
            
            // Trouver les plantes actives dans ce bac cette année
            const activePlantsInLoc = [];
            globalJournal.forEach(j => {
                if(j.bac === loc && new Date(j.date).getFullYear() === currentYear && j.seedId) {
                    if(j.action === 'Semis' || j.action === 'Plantation' || j.action === 'Repiquage') {
                        activePlantsInLoc.push(j.seedId);
                    }
                    if(j.action === 'Arrachage' || j.action === 'Récolte') {
                        const idx = activePlantsInLoc.lastIndexOf(j.seedId);
                        if(idx > -1) activePlantsInLoc.splice(idx, 1);
                    }
                }
            });

            if(activePlantsInLoc.length === 0) { alertEl.style.display = 'none'; return; }

            let conflicts = [];
            const activeSeeds = activePlantsInLoc.map(id => globalSeeds.find(s => String(s.id) === String(id))).filter(Boolean);
            
            activeSeeds.forEach(aS => {
                let nameA = aS.identite.nom_commun.toLowerCase();
                let nameCur = currentSeed.identite.nom_commun.toLowerCase();
                
                // seed courante déteste la seed existante
                if(currentSeed.particularites?.mauvais_compagnons?.some(m => nameA.includes(m.toLowerCase()) || m.toLowerCase().includes(nameA))) {
                    conflicts.push(aS.identite.nom_commun);
                }
                // seed existante déteste la seed courante (réciprocité)
                else if(aS.particularites?.mauvais_compagnons?.some(m => nameCur.includes(m.toLowerCase()) || m.toLowerCase().includes(nameCur))) {
                    conflicts.push(aS.identite.nom_commun);
                }
            });

            if(conflicts.length > 0) {
                const uniq = [...new Set(conflicts)].join(', ');
                alertEl.innerHTML = `<strong style="color:var(--danger-red);">⚠️ ALERTE COMPAGNONNAGE</strong><br>L'ajout de <b>${currentSeed.identite.nom_commun}</b> est une très mauvaise idée à côté de : <b>${uniq}</b> (actuellement présente(s) dans <b>${loc}</b>). Leurs croissances risquent de se perturber fortement.`;
                alertEl.style.display = 'block';
            } else {
                alertEl.style.display = 'none';
            }
        }

        function selectAction(btn, type) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentType = type;
            document.getElementById('express-form').classList.remove('hidden');
            let html = "";
            if(type === 'Semis' || type === 'Repiquage' || type === 'Plantation' || type === 'Arrachage') {
                html = `
                    <label>Lieu / Destination</label>
                    <select id="val-loc" onchange="checkAssociations()">
                        <option>Serre intérieure</option><option>Serre extérieure</option>
                        <option>Bac A</option><option>Bac B</option><option>Bac C</option>
                        <option>Bac D</option><option>Bac E</option><option>Pleine terre</option><option>Autre</option>
                    </select>
            `;
                if(type === 'Semis' || type === 'Repiquage') {
                    html += `
                        <label>Contenant</label>
                        <select id="val-cont">
                            <option>Pleine terre (sans contenant)</option><option>Plaque de semis</option>
                            <option>Godet</option><option>Caissette</option><option>Pot individuel</option><option>Autre</option>
                        </select>
                    `;
                }
                html += `
                    <label>Quantité</label>
                    <input type="number" id="val-qty" placeholder="${type === 'Arrachage' ? 'Vide = vider tout' : 'Nombre'}">
                `;
            } else if(type === 'Récolte') {
                html = `
                    <label>Quantité récoltée</label>
                    <div class="grid-2">
                        <input type="number" id="val-qty" placeholder="Nombre">
                        <select id="val-unit">
                            <option value="unités">Produit(s)</option>
                            <option value="kg">kg</option>
                            <option value="g">g</option>
                        </select>
                    </div>
                `;
            }
            document.getElementById('extra-fields').innerHTML = html;
            checkAssociations();
        }

        async function saveEntry() {
            const btn = document.getElementById('btnSave'); btn.innerText = "⏳ ENREGISTREMENT..."; btn.disabled = true;
            try {
                let photoUrl = "";
                if(base64Photo) {
                    const path = `photos/${photoName}`;
                    await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ message: "Photo Express", content: base64Photo }) });
                    photoUrl = `https://raw.githubusercontent.com/${user}/${repo}/master/${path}`;
                }
                const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const dataJ = await resJ.json();
                let journal = JSON.parse(decodeURIComponent(escape(atob(dataJ.content))));
                journal.push({ id: Date.now(), date: document.getElementById('val-date').value, action: currentType, seedId: document.getElementById('val-seed').value, note: document.getElementById('val-note').value, photo: photoUrl, quantite: parseInt(document.getElementById('val-qty')?.value) || 0, bac: document.getElementById('val-bac')?.value, emplacement: document.getElementById('val-loc')?.value, contenant: document.getElementById('val-cont')?.value, unite: document.getElementById('val-unit')?.value || "" });
                await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ message: "Update Express", content: btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2)))), sha: dataJ.sha }) });
                location.reload();
            } catch(e) { alert("Erreur"); btn.disabled = false; btn.innerText = "ENREGISTRER"; }
        }

        async function loadWeather() {
            try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=46.67&longitude=-1.43&daily=weathercode,temperature_2m_max&timezone=Europe%2FParis");
                const data = await res.json();
                const getWeatherIcon = (code) => {
                    if (code === 0) return "☀️"; if (code <= 3) return "🌤️";
                    if (code >= 51 && code <= 67) return "🌧️";
                    if (code >= 80 && code <= 82) return "🌦️";
                    if (code >= 95) return "⛈️"; return "☁️";
                };
                document.getElementById('weather-box').innerHTML = data.daily.time.map((t, i) => `<div class="weather-day"><small>${i===0?"Auj.":new Date(t).toLocaleDateString('fr-FR',{weekday:'short'})}</small><div style="font-size:24px; margin:5px 0;">${getWeatherIcon(data.daily.weathercode[i])}</div><strong>${Math.round(data.daily.temperature_2m_max[i])}°</strong></div>`).join('');
            } catch(e) { document.getElementById('weather-box').innerText = "Erreur météo"; }
        }
        window.onload = init;
    </script>
</body>
</html>
