<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Potager - Répertoire</title>
    <style>
        :root {
            --bg: #000000; /* Noir pur pour encore plus de contraste */
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --text-dim: #ffffff; /* Tout en blanc comme demandé */
            --accent: #4CAF50;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 90px;
        }

        .header {
            padding: 20px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        .search-bar {
            width: 100%;
            padding: 16px;
            background: var(--card-bg);
            border: 2px solid var(--border); /* Bordure un peu plus épaisse */
            border-radius: 12px;
            color: white;
            font-size: 18px; /* Texte plus grand pour la saisie */
            outline: none;
            box-sizing: border-box;
        }

        .grid {
            padding: 10px 20px;
            display: grid;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-info h3 { margin: 0; font-size: 20px; font-weight: bold; }
        .card-info p { margin: 6px 0 0; font-size: 16px; color: var(--text); }

        .tag-famille {
            font-size: 14px;
            padding: 6px 10px;
            background: #333;
            border-radius: 8px;
            color: var(--accent);
            font-weight: bold;
        }

        /* Navigation Basse Corrigée */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 80px; /* Plus haute pour plus de confort */
            background: #111;
            border-top: 2px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            color: var(--text);
            text-decoration: none;
            font-size: 14px; /* Libellé plus grand */
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .nav-item.active { color: var(--accent); }

        .nav-icon {
            font-size: 30px; /* Icônes nettement plus grandes */
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" class="search-bar" placeholder="Rechercher..." id="searchInput">
    </div>

    <div id="seedGrid" class="grid">
        </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item">
            <span class="nav-icon">🏠</span>Accueil
        </a>
        <a href="#" class="nav-item active">
            <span class="nav-icon">🌱</span>Semences
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">📖</span>Journal
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">📦</span>Bacs
        </a>
    </nav>

    <script>
        async function loadAndRenderSeeds() {
        const grid = document.getElementById('seedGrid');
        const user = localStorage.getItem('gh_user');
        const repo = localStorage.getItem('gh_repo');
        const token = localStorage.getItem('gh_token');
    
        if (!user || !repo) {
            grid.innerHTML = "<p style='padding:20px;'>⚠️ Configurez les paramètres pour voir vos semences.</p>";
            return;
        }
    
        try {
            const url = `https://api.github.com/repos/${user}/${repo}/contents/semences.json`;
            const res = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            const data = await res.json();
            // Décodage du contenu GitHub
            const semences = JSON.parse(decodeURIComponent(escape(atob(data.content))));
    
            grid.innerHTML = "";
            semences.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-info">
                        <h3>${s.identite.nom_commun}</h3>
                        <p>${s.identite.variete}</p>
                    </div>
                    <span class="tag-famille">${s.identite.provenance}</span>
                `;
                grid.appendChild(card);
            });
        } catch (e) {
            grid.innerHTML = "<p style='padding:20px;'>❌ Erreur de chargement : " + e.message + "</p>";
        }
    }
    
    // Lancer le chargement
    loadAndRenderSeeds();
    </script>
</body>
</html>
