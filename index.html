<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Potager - Dashboard</title>
    <style>
        :root { --bg: #000000; --card-bg: #1a1a1a; --text: #ffffff; --accent: #4CAF50; --border: #333; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Module Action Express */
        #action-express { background: #111; padding: 20px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        h2 { font-size: 14px; color: var(--accent); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        select, input { width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        
        .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .type-btn { padding: 12px; background: #222; border: 1px solid var(--border); border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; text-align: center; }
        .type-btn.active { background: var(--accent); border-color: var(--accent); }

        #dynamic-fields { background: #080808; padding: 15px; border-radius: 12px; border: 1px dashed #444; margin-bottom: 15px; display: none; }
        .save-action-btn { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; }

        /* Répertoire */
        .header { padding: 0 20px 10px; }
        .search-bar { width: 100%; padding: 15px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 16px; box-sizing: border-box; }
        .grid { padding: 0 20px; display: grid; gap: 12px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card h3 { margin: 0; font-size: 18px; }
        .card p { margin: 4px 0 0; font-size: 14px; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #111; border-top: 2px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #fff; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .nav-icon { font-size: 28px; margin-bottom: 2px; }
        .active-nav { color: var(--accent); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <section id="action-express">
        <h2>🌱 Action Express</h2>
        
        <select id="select-seed"><option value="">Choisir une semence...</option></select>

        <div class="type-grid">
            <div class="type-btn" onclick="selectAction(this, 'Semis')">Semis</div>
            <div class="type-btn" onclick="selectAction(this, 'Repiquage')">Repiquage</div>
            <div class="type-btn" onclick="selectAction(this, 'Plantation')">Plantation</div>
            <div class="type-btn" onclick="selectAction(this, 'Récolte')">Récolte</div>
        </div>

        <div id="dynamic-fields">
            <div id="field-contenant" class="hidden">
                <label>Contenant</label>
                <select id="val-contenant">
                    <option>Plaque 40 alvéoles</option><option>Godet 7cm</option><option>Godet 9cm</option><option>Sac 5cm</option><option>Sac 10cm</option>
                </select>
            </div>
            <div id="field-bac" class="hidden">
                <label>Bac de destination</label>
                <select id="val-bac">
                    <option>Bac A</option><option>Bac B</option><option>Bac C</option><option>Bac D</option><option>Bac E</option>
                </select>
                <label style="display:flex; align-items:center; margin-top:10px;">
                    <input type="checkbox" id="val-filet" style="width:20px; height:20px; margin-right:10px;"> Sous filet ?
                </label>
            </div>
            <label id="label-qte" style="display:block; margin-top:10px;">Quantité</label>
            <input type="number" id="val-qte" placeholder="Nombre / Grammes">
            
            <button class="save-action-btn" id="btnSaveAction" onclick="saveJournalAction()">ENREGISTRER</button>
        </div>
    </section>

    <div class="header">
        <input type="text" class="search-bar" placeholder="Rechercher dans mes graines..." id="searchInput">
    </div>
    <div id="seedGrid" class="grid"></div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item active-nav"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="ajout-semence.html" class="nav-item"><span class="nav-icon">➕</span>Ajouter</a>
        <a href="journal.html" class="nav-item"><span class="nav-icon">📖</span>Journal</a>
        <a href="parametres.html" class="nav-item"><span class="nav-icon">⚙️</span>Réglages</a>
    </nav>

    <script>
        let allSemences = [];
        let currentAction = "";
        const user = localStorage.getItem('gh_user');
        const repo = localStorage.getItem('gh_repo');
        const token = localStorage.getItem('gh_token');

        // 1. CHARGEMENT
        async function init() {
            if (!token) return;
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                allSemences = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                
                // Remplir le sélecteur
                const select = document.getElementById('select-seed');
                allSemences.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.identite.nom_commun} (${s.identite.variete})</option>`;
                });
                
                renderSeeds(allSemences);
            } catch (e) { console.error(e); }
        }

        function renderSeeds(data) {
            const grid = document.getElementById('seedGrid');
            grid.innerHTML = data.map(s => `
                <div class="card" onclick="window.location.href='fiche-semence.html?id=${s.id}'">
                    <div><h3>${s.identite.nom_commun}</h3><p>${s.identite.variete}</p></div>
                    <span class="tag-provenance">${s.identite.provenance || 'N/C'}</span>
                </div>
            `).join('');
        }

        // 2. LOGIQUE ACTION EXPRESS
        function selectAction(btn, type) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentAction = type;
            
            document.getElementById('dynamic-fields').style.display = 'block';
            document.getElementById('field-contenant').classList.toggle('hidden', !['Semis', 'Repiquage'].includes(type));
            document.getElementById('field-bac').classList.toggle('hidden', type !== 'Plantation');
            document.getElementById('label-qte').innerText = (type === 'Récolte') ? 'Poids / Quantité' : 'Nombre de plants/graines';
        }

        async function saveJournalAction() {
            const seedId = document.getElementById('select-seed').value;
            if (!seedId || !currentAction) { alert("Sélectionne une plante et une action !"); return; }

            const btn = document.getElementById('btnSaveAction');
            btn.innerText = "⏳ ENREGISTREMENT...";
            btn.disabled = true;

            // ON AJOUTE UN ID UNIQUE (TIMESTAMP) ICI
            const entry = {
                id: Date.now(), 
                date: new Date().toISOString().split('T')[0],
                seedId: seedId,
                action: currentAction,
                quantite: document.getElementById('val-qte').value
            };

            if (currentAction === 'Semis' || currentAction === 'Repiquage') {
                entry.contenant = document.getElementById('val-contenant').value;
            } else if (currentAction === 'Plantation') {
                entry.bac = document.getElementById('val-bac').value;
                entry.filet = document.getElementById('val-filet').checked;
            }

            try {
                const url = `https://api.github.com/repos/${user}/${repo}/contents/journal.json`;
                const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const fileData = await getRes.json();
                const sha = fileData.sha;
                let journal = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

                journal.push(entry);

                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Journal : ${currentAction} de ${seedId}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2)))),
                        sha: sha
                    })
                });

                if (putRes.ok) { alert("✅ Action notée !"); location.reload(); }
            } catch (e) { alert("Erreur : " + e.message); btn.disabled = false; }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            renderSeeds(allSemences.filter(s => s.identite.nom_commun.toLowerCase().includes(val) || s.identite.variete.toLowerCase().includes(val)));
        });

        window.onload = init;
    </script>
</body>
</html>
