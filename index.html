<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Potager - Dashboard</title>
    <style>
        :root { --bg: #000000; --card-bg: #1a1a1a; --text: #ffffff; --accent: #4CAF50; --border: #333; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; font-size: 16px; }
        h2 { font-size: 14px; color: var(--accent); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Formulaires */
        select, input, textarea { width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        textarea { font-family: inherit; resize: none; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #aaa; }

        /* Action Express */
        #action-express { background: #111; padding: 20px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .type-btn { padding: 15px; background: #222; border: 1px solid var(--border); border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; text-align: center; min-height: 44px; }
        .type-btn.active { background: var(--accent); border-color: var(--accent); }
        .save-action-btn { width: 100%; padding: 20px; background: var(--accent); color: #fff; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* Widgets */
        .widget { padding: 0 20px 20px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer; }
        
        /* Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #111; border-top: 2px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #fff; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; flex: 1; font-weight: bold; }
        .nav-icon { font-size: 30px; }
        .active-nav { color: var(--accent); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <section id="action-express">
        <h2>🌱 Action Express</h2>
        
        <label>Semence concernée</label>
        <select id="select-seed"><option value="">Choisir...</option></select>

        <label>Date de l'action</label>
        <input type="date" id="val-date">

        <div class="type-grid">
            <div class="type-btn" onclick="selectAction(this, 'Semis')">Semis</div>
            <div class="type-btn" onclick="selectAction(this, 'Repiquage')">Repiquage</div>
            <div class="type-btn" onclick="selectAction(this, 'Plantation')">Plantation</div>
            <div class="type-btn" onclick="selectAction(this, 'Récolte')">Récolte</div>
        </div>

        <div id="dynamic-fields" class="hidden">
            <div id="field-emplacement" class="hidden">
                <label>Emplacement</label>
                <select id="val-emplacement">
                    <option value="Serre intérieure">Serre intérieure</option>
                    <option value="Serre extérieure">Serre extérieure</option>
                </select>
            </div>

            <div id="field-contenant" class="hidden">
                <label>Contenant</label>
                <select id="val-contenant">
                    <option>Plaque 40 alvéoles</option><option>Godet 7cm</option><option>Godet 9cm</option><option>Sac 5cm</option><option>Sac 10cm</option>
                </select>
            </div>

            <div id="field-bac" class="hidden">
                <label>Bac de destination</label>
                <select id="val-bac">
                    <option>Bac A</option><option>Bac B</option><option>Bac C</option><option>Bac D</option><option>Bac E</option>
                </select>
                <label style="display:flex; align-items:center; margin-top:10px; color:#fff;">
                    <input type="checkbox" id="val-filet" style="width:25px; height:25px; margin-right:15px;"> Sous filet ?
                </label>
            </div>

            <label id="label-qte">Quantité</label>
            <input type="number" id="val-qte" placeholder="Nombre">

            <label>Note libre</label>
            <textarea id="val-note" rows="2" placeholder="Une observation ?"></textarea>
            
            <button class="save-action-btn" id="btnSaveAction" onclick="saveJournalAction()">ENREGISTRER</button>
        </div>
    </section>

    <div class="widget">
        <h2>📅 Agenda (7j)</h2>
        <div id="agenda-mini" class="card" style="font-size:14px; color:#aaa;">Chargement de l'agenda...</div>
    </div>

    <div class="widget">
        <h2>📝 Dernières Notes</h2>
        <div id="last-notes"></div>
    </div>

    <nav class="nav-bar">
    <a href="index.html" class="nav-item">
        <span class="nav-icon">🏠</span>Accueil
    </a>
    <a href="bacs.html" class="nav-item">
        <span class="nav-icon">🍱</span>Bacs
    </a>
    <a href="agenda.html" class="nav-item">
        <span class="nav-icon">📅</span>Agenda
    </a>
    <a href="journal.html" class="nav-item">
        <span class="nav-icon">📖</span>Journal
    </a>
    <a href="parametres.html" class="nav-item">
        <span class="nav-icon">⚙️</span>Réglages
    </a>
</nav>

    <script>
        let allSemences = [];
        let currentAction = "";
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');

        async function init() {
            if (!token) return;
            document.getElementById('val-date').valueAsDate = new Date();
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                allSemences = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                const select = document.getElementById('select-seed');
                allSemences.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.identite.nom_commun} (${s.identite.variete})</option>`;
                });
                loadWidgets();
            } catch (e) { console.error(e); }
        }

        function selectAction(btn, type) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentAction = type;
            document.getElementById('dynamic-fields').classList.remove('hidden');
            const isSeedAction = (type === 'Semis' || type === 'Repiquage');
            document.getElementById('field-emplacement').classList.toggle('hidden', !isSeedAction);
            document.getElementById('field-contenant').classList.toggle('hidden', !isSeedAction);
            document.getElementById('field-bac').classList.toggle('hidden', type !== 'Plantation');
            document.getElementById('label-qte').innerText = (type === 'Récolte') ? 'Poids / Quantité récoltée' : 'Nombre de plants/graines';
        }

        async function saveJournalAction() {
            const seedId = document.getElementById('select-seed').value;
            if (!seedId || !currentAction) { alert("Champs manquants !"); return; }
            const btn = document.getElementById('btnSaveAction');
            btn.innerText = "⏳..."; btn.disabled = true;

            const entry = {
                id: Date.now(),
                date: document.getElementById('val-date').value,
                seedId: seedId,
                action: currentAction,
                quantite: document.getElementById('val-qte').value,
                note: document.getElementById('val-note').value
            };

            if (currentAction === 'Semis' || currentAction === 'Repiquage') {
                entry.emplacement = document.getElementById('val-emplacement').value;
                entry.contenant = document.getElementById('val-contenant').value;
            } else if (currentAction === 'Plantation') {
                entry.bac = document.getElementById('val-bac').value;
                entry.filet = document.getElementById('val-filet').checked;
            }

            try {
                const url = `https://api.github.com/repos/${user}/${repo}/contents/journal.json`;
                const getRes = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const fileData = await getRes.json();
                let journal = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
                journal.push(entry);
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Note : ${currentAction} ${seedId}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2)))), sha: fileData.sha })
                });
                if (putRes.ok) location.reload();
            } catch (e) { alert(e.message); btn.disabled = false; }
        }

        async function loadWidgets() {
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            const journal = JSON.parse(decodeURIComponent(escape(atob((await res.json()).content))));
            const last3 = journal.slice(-3).reverse();
            document.getElementById('last-notes').innerHTML = last3.map(n => `
                <div class="card" onclick="window.location.href='modifier-journal.html?id=${n.id}'">
                    <b style="color:var(--accent)">${n.date}</b> - ${n.action} : ${n.seedId}
                </div>`).join('');
            document.getElementById('agenda-mini').innerText = "Semis de mars : Tomates, Poivrons, Aubergines en serre intérieure.";
        }

        window.onload = init;
    </script>
</body>
</html>
