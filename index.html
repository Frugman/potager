<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Potager 2026</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#4CAF50">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Potager 2026</h1><a href="parametres.html" style="text-decoration:none; font-size:24px;">⚙️</a></header>

    <section id="action-express">
        <div class="type-grid">
            <div class="type-btn" onclick="selectAction(this, 'Semis')">Semis</div>
            <div class="type-btn" onclick="selectAction(this, 'Repiquage')">Repiq.</div>
            <div class="type-btn" onclick="selectAction(this, 'Plantation')">Plant.</div>
            <div class="type-btn" onclick="selectAction(this, 'Récolte')">Récolte</div>
            <div class="type-btn" onclick="selectAction(this, 'Note')" style="grid-column: span 2;">📝 Note Libre</div>
        </div>
        <div id="express-form" class="hidden">
            <label>Plante concernée</label>
            <select id="val-seed"><option value="">📝 Note générale</option></select>
            <label>Date</label><input type="date" id="val-date">
            <div id="extra-fields"></div>
            <label>Commentaire</label><textarea id="val-note" rows="2" placeholder="Observations..."></textarea>
            <div onclick="document.getElementById('file-input').click()" class="photo-btn">📸 Ajouter une photo</div>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="processPhoto(this)">
            <img id="preview-img" src="">
            <button class="save-btn" id="btnSave" onclick="saveEntry()">ENREGISTRER</button>
        </div>
    </section>

    <section class="widget">
        <h2>🌤️ MÉTÉO <a href="https://meteofrance.com/previsions-meteo-france/la-roche-sur-yon/85000" target="_blank" style="font-size:10px; color:#666; text-decoration:none; font-weight:normal;">La Roche ↗</a></h2>
        <div class="weather-scroll" id="weather-box">Chargement...</div>
    </section>

    <section class="widget">
        <h2>📅 URGENT (7 JOURS)</h2>
        <div id="agenda-box" class="card">Calcul des tâches...</div>
    </section>

    <section class="widget" style="padding-bottom:20px;">
        <h2>📝 DERNIÈRES NOTES</h2>
        <div id="notes-box"></div>
    </section>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item active-nav"><span class="nav-icon">🏠</span>Accueil</a>
        <a href="repertoire.html" class="nav-item"><span class="nav-icon">📚</span>Semences</a>
        <a href="bacs.html" class="nav-item"><span class="nav-icon">🍱</span>Bacs</a>
        <a href="agenda.html" class="nav-item"><span class="nav-icon">📅</span>Agenda</a>
        <a href="journal.html" class="nav-item"><span class="nav-icon">📖</span>Journal</a>
    </nav>

    <script>
        const user = localStorage.getItem('gh_user'), repo = localStorage.getItem('gh_repo'), token = localStorage.getItem('gh_token');
        let currentType = "", base64Photo = "", photoName = "";

        function addDays(date, days) {
            let res = new Date(date);
            res.setDate(res.getDate() + parseInt(days));
            return res;
        }

        async function init() {
            if(!token) { window.location.href = 'parametres.html'; return; }
            document.getElementById('val-date').valueAsDate = new Date();
            loadWeather();
            try {
                const resS = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/semences.json`, { headers: { 'Authorization': `Bearer ${token}` } });
                const seeds = JSON.parse(decodeURIComponent(escape(atob((await resS.json()).content))));
                const sel = document.getElementById('val-seed');
                seeds.sort((a,b)=>a.identite.nom_commun.localeCompare(b.identite.nom_commun)).forEach(s => {
                    sel.innerHTML += `<option value="${s.id}">${s.identite.nom_commun} - ${s.identite.variete}</option>`;
                });
                loadWidgets(seeds);
            } catch(e) { console.error(e); }
        }

        function processPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height, max = 1024;
                        if (width > max) { height *= max / width; width = max; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const data = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('preview-img').src = data;
                        document.getElementById('preview-img').style.display = 'block';
                        base64Photo = data.split(',')[1];
                        photoName = `IMG_${Date.now()}.jpg`;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function selectAction(btn, type) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentType = type;
            document.getElementById('express-form').classList.remove('hidden');
            let html = "";
            if(type === 'Semis' || type === 'Repiquage') html = `<label>Lieu</label><select id="val-loc"><option>Serre intérieure</option><option>Serre extérieure</option></select><label>Contenant</label><input type="text" id="val-cont" placeholder="Godet, plaque...">`;
            else if(type === 'Plantation') html = `<label>Bac</label><select id="val-bac"><option>Bac A</option><option>Bac B</option><option>Bac C</option><option>Bac D</option><option>Bac E</option><option>Autre</option></select>`;
            else if(type === 'Récolte') {
            html = `
                <label>Quantité récoltée</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" id="val-qty" placeholder="Nombre">
                    <select id="val-unit">
                        <option value="unités">Produit(s)</option>
                        <option value="kg">kg</option>
                        <option value="g">grammes</option>
                    </select>
                </div>
            `;
        }
            document.getElementById('extra-fields').innerHTML = html;
        }

        async function saveEntry() {
            const btn = document.getElementById('btnSave'); btn.innerText = "⏳..."; btn.disabled = true;
            let photoUrl = "";
            if(base64Photo) {
                const path = `photos/${photoName}`;
                await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ message: "Photo", content: base64Photo }) });
                photoUrl = `https://raw.githubusercontent.com/${user}/${repo}/master/${path}`;
            }
            const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            const dataJ = await resJ.json();
            let journal = JSON.parse(decodeURIComponent(escape(atob(dataJ.content))));
            journal.push({ id: Date.now(), date: document.getElementById('val-date').value, action: currentType, seedId: document.getElementById('val-seed').value, note: document.getElementById('val-note').value, photo: photoUrl, quantite: parseInt(document.getElementById('val-qty')?.value) || 0, bac: document.getElementById('val-bac')?.value, emplacement: document.getElementById('val-loc')?.value, unite: document.getElementById('val-unit')?.value || "" });
            await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ message: "Update", content: btoa(unescape(encodeURIComponent(JSON.stringify(journal, null, 2)))), sha: dataJ.sha }) });
            location.reload();
        }

        async function loadWeather() {
            try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=46.67&longitude=-1.43&daily=weathercode,temperature_2m_max&timezone=Europe%2FParis");
                const data = await res.json();
                const getWeatherIcon = (code) => {
                    if (code === 0) return "☀️"; if (code <= 3) return "🌤️";
                    if (code >= 51 && code <= 67) return "🌧️";
                    if (code >= 80 && code <= 82) return "🌦️";
                    if (code >= 95) return "⛈️"; return "☁️";
                };
                document.getElementById('weather-box').innerHTML = data.daily.time.map((t, i) => `
                    <div class="weather-day"><b>${i===0?"Auj.":new Date(t).toLocaleDateString('fr-FR',{weekday:'short'})}</b><br>${getWeatherIcon(data.daily.weathercode[i])}<br><b>${Math.round(data.daily.temperature_2m_max[i])}°</b></div>
                `).join('');
            } catch(e) { document.getElementById('weather-box').innerText = "Erreur météo"; }
        }

        async function loadWidgets(seeds) {
            const resJ = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/journal.json`, { headers: { 'Authorization': `Bearer ${token}` } });
            const journal = JSON.parse(decodeURIComponent(escape(atob((await resJ.json()).content))));
            
            // Notes
            document.getElementById('notes-box').innerHTML = journal.slice(-3).reverse().map(n => {
                const s = seeds.find(i=>i.id===n.seedId) || {identite:{nom_commun:"Note Générale", variete:""}};
                return `<div class="card note-card" onclick="window.location.href='journal.html'"><b>${n.date}</b> - ${s.identite.nom_commun}<br>${n.photo?`<img src="${n.photo}" class="note-img">`:''}<p style="font-size:12px;color:#888;">${n.note||''}</p></div>`;
            }).join('');

            // Agenda Urgent complet
            const today = new Date(); today.setHours(0,0,0,0);
            const in7Days = new Date(); in7Days.setDate(today.getDate() + 7);
            let urgentTasks = [];

            journal.forEach(entry => {
                if(entry.action === 'Semis') {
                    const s = seeds.find(i => i.id === entry.seedId);
                    if(!s) return;
                    const dSemis = new Date(entry.date);
                    const steps = [
                        { d: s.delais.levee, t: "🌱 Levée" },
                        { d: s.delais.levee + s.delais.repiquage, t: "🪴 Repiquage" },
                        { d: s.delais.levee + s.delais.repiquage + s.delais.plantation, t: "🚜 Plantation" },
                        { d: s.delais.levee + s.delais.repiquage + s.delais.plantation + s.delais.maturite, t: "🧺 Récolte" }
                    ];
                    steps.forEach(st => {
                        const target = addDays(dSemis, st.d);
                        if(target >= today && target <= in7Days) urgentTasks.push({ date: target, title: st.t, plant: s.identite.nom_commun });
                    });
                    if(s.taches_entretien) {
                        s.taches_entretien.forEach(te => {
                            const target = addDays(dSemis, te.delai);
                            if(target >= today && target <= in7Days) urgentTasks.push({ date: target, title: te.label, plant: s.identite.nom_commun });
                        });
                    }
                }
            });

            urgentTasks.sort((a,b) => a.date - b.date);
            document.getElementById('agenda-box').innerHTML = urgentTasks.map(t => `
                <div class="agenda-item">
                    <span>${t.title} : <b>${t.plant}</b></span>
                    <span class="agenda-date">${t.date.toLocaleDateString('fr-FR', {day:'numeric', month:'short'})}</span>
                </div>
            `).join('') || "Aucune tâche urgente.";
        }
        window.onload = init;
    </script>
</body>
</html>
